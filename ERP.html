          otroSKUs.filter(function(s){return s.cat===cat;}).forEach(function(s){html+='<option value="'+s.sku+'"'+(otroSKU===s.sku?" selected":"")+'>'+s.sku+' — '+s.desc+'</option>';});
          html+='</optgroup>';
        });
        html+='</select></div>';
        if(otroSKU){
          html+=fi("CANTIDAD PRODUCIDA",'<input id="potrocant" type="number" min="0" value="'+otroCant+'" oninput="otroCant=parseFloat(this.value)||1" style="'+si+'">');
          // Insumos usados
          html+='<div style="height:1px;background:#30363D;margin:12px 0"></div>';
          html+='<div style="font-size:10px;color:#8B949E;letter-spacing:.1em;margin-bottom:8px;font-weight:700">INSUMOS UTILIZADOS <span style="color:#30363D">(opcional)</span></div>';
          html+='<table style="width:100%"><thead><tr><th style="min-width:130px">SKU Insumo</th><th style="text-align:right;min-width:80px">Cantidad</th><th style="text-align:right;min-width:80px">Costo/u</th><th style="text-align:right;min-width:80px">Costo total</th><th></th></tr></thead><tbody id="otro_ins_body"></tbody></table>';
          html+='<button onclick="pOtroAddIns()" class="btn btn-o btn-s" style="border-color:#C084FC;color:#C084FC;margin-top:8px">+ Insumo</button>';
          // Resumen costos
          html+='<div style="height:1px;background:#30363D;margin:12px 0"></div>';
          html+='<div id="otro_costo_res" style="display:flex;gap:20px;font-size:12px;color:#8B949E"></div>';
          setTimeout(function(){renderOtroIns();},30);
        }
      }

      html+='</div>';
      html+='<div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px"><button class="btn btn-g" onclick="goMod(&apos;produccion&apos;)">Cancelar</button><button class="btn btn-p" onclick="pGuardar()">Registrar →</button></div></div>';
      document.getElementById("main").innerHTML=html;
    }

    function pUpdateCostoBar(){
      var cuFlor=invStock[florSKU]?invStock[florSKU].cu:0;
      lineas.forEach(function(l,i){
        var gr=isHGP(l.sku||"")?1:grPorSKU(l.sku||"1");
        var cant=parseFloat(l.cantidad)||0;
        var grTot=cant*gr;
        var cf=grTot*cuFlor;
        var envCU=l.envase&&invStock[l.envase]?invStock[l.envase].cu:0;
        var ce=cant*envCU;
        var cu=cant>0?(cf+ce)/cant:0;
        var flEl=document.getElementById("pfl_c"+i);var envEl=document.getElementById("penv_c"+i);var cuEl=document.getElementById("pcu_c"+i);
        if(flEl)flEl.textContent=cant>0?fmt(cf):"—";
        if(envEl)envEl.textContent=(l.envase&&cant>0)?fmt(ce):"—";
        if(cuEl)cuEl.textContent=cant>0?fmt(cu):"—";
      });
    }
    function updateGrBar(){
      var grU=calcGrTotal();
      var stock=invStock[florSKU]?Math.round(invStock[florSKU].cantidad):0;
      var grR=stock-grU;
      var gu=document.getElementById("pgu");var gr=document.getElementById("pgr");
      if(gu)gu.textContent=grU.toFixed(1)+"g";
      if(gr){gr.textContent=grR.toFixed(1)+"g";gr.style.color=grR<0?"#F85149":grR<100?"#E3B341":"#00C896";}
    }

    window.pSetModo=function(m){modo=m;florSKU="";lineas=[{sku:"",cantidad:0}];render();};
    window.pSetFlor=function(sku){
      florSKU=sku;
      var PRES_GR=["1","1.5","3.5","5","7","10","14","28","50","100"];
      lineas=PRES_GR.map(function(p){return{sku:p+sku,cantidad:0};});
      // Add HGP lines
      var HGP_P=["HONGO","GUARUMO","PRERROL"];
      HGP_P.forEach(function(p){lineas.push({sku:p+sku,cantidad:0});});
      render();
    };
    var otroInsumos=[{sku:"",cantidad:0}];
    window.pSetOtro=function(sku){otroSKU=sku;otroInsumos=[{sku:"",cantidad:0}];render();};
    function renderOtroIns(){
      var tb=document.getElementById("otro_ins_body");if(!tb)return;
      var allIns=inv.filter(function(x){return true;}); // all with stock
      var si2="background:#0D1117;border:1px solid #30363D;border-radius:2px;padding:4px 7px;font-size:11px;color:#E6EDF3";
      var pbody="";
      var costoTotal=0;
      otroInsumos.forEach(function(ins,i){
        var cu=ins.sku&&invStock[ins.sku]?invStock[ins.sku].cu:0;
        var ct=(parseFloat(ins.cantidad)||0)*cu;
        costoTotal+=ct;
        pbody+='<tr style="vertical-align:middle">';
        pbody+='<td style="padding:4px 6px"><select onchange="pOtroSetSKU('+i+',this.value)" style="'+si2+';min-width:130px;cursor:pointer"><option value="">— Insumo —</option>';
        allIns.forEach(function(x){pbody+='<option value="'+x.sku+'"'+(ins.sku===x.sku?" selected":"")+'>'+x.sku+(x.desc?' — '+x.desc:'')+'</option>';});
        pbody+='</select></td>';
        pbody+='<td style="padding:4px 6px"><input type="number" min="0" value="'+(ins.cantidad||"")+'" placeholder="0" onchange="pOtroSetCant('+i+',this.value)" style="'+si2+';width:75px;text-align:right"></td>';
        pbody+='<td style="padding:4px 8px;text-align:right;color:#FB923C;font-size:11px">'+fmt(cu)+'</td>';
        pbody+='<td style="padding:4px 8px;text-align:right;color:#E3B341;font-weight:700">'+fmt(ct)+'</td>';
        pbody+='<td style="padding:4px 4px">'+(otroInsumos.length>1?'<button onclick="pOtroRemIns('+i+')" style="background:transparent;border:none;color:#F85149;cursor:pointer;font-size:14px">✕</button>':'')+'</td></tr>';
      });
      tb.innerHTML=pbody;
      // Costo resumen
      var res=document.getElementById("otro_costo_res");
      if(res)res.innerHTML='<span>Costo insumos: <b style="color:#E3B341">'+fmt(costoTotal)+'</b></span>'+(otroCant>0?'<span>Costo/unidad: <b style="color:#FB923C">'+fmt(costoTotal/otroCant)+'</b></span>':'');
    }
    window.pOtroAddIns=function(){otroInsumos.push({sku:"",cantidad:0});renderOtroIns();};
    window.pOtroRemIns=function(i){otroInsumos.splice(i,1);renderOtroIns();};
    window.pOtroSetSKU=function(i,sku){otroInsumos[i].sku=sku;renderOtroIns();};
    window.pOtroSetCant=function(i,v){otroInsumos[i].cantidad=parseFloat(v)||0;renderOtroIns();};
    window.pAddLin=function(){lineas.push({sku:"",cantidad:0});render();};
    window.pRemLin=function(i){lineas.splice(i,1);render();};
    window.pSetLinSKU=function(i,sku){
      lineas[i].sku=sku;
      var ci2=CATALOGO_SKU.find(function(s){return s.sku===sku;});
      var isHGPLine=isHGP(sku);
      var m=sku.match(/^(\d+(?:\.\d+)?)/);
      var gr=isHGPLine?1:(m?parseFloat(m[1]):1);
      var desc=document.getElementById("pldesc"+i);var gru=document.getElementById("plgru"+i);var grt=document.getElementById("plgrt"+i);
      if(desc)desc.textContent=ci2?ci2.desc:"—";
      if(gru)gru.textContent=isHGPLine?"1g":gr+"g";
      if(grt)grt.textContent=((parseFloat(lineas[i].cantidad)||0)*gr).toFixed(1)+"g";
      updateGrBar();
    };
    window.pSetLinEnvase=function(i,v){
      lineas[i].envase=v;
      
      var envC=document.getElementById("penv_c"+i);
      if(envC){var cu=v&&invStock[v]?invStock[v].cu:0;envC.textContent=v?fmt((parseFloat(lineas[i].cantidad)||0)*cu):"—";}
      pUpdateCostoBar();
    };
    window.pSetLinCant=function(i,v){
      lineas[i].cantidad=parseFloat(v)||0;
      var isHGPLine=isHGP(lineas[i].sku||"");
      var gr=isHGPLine?1:grPorSKU(lineas[i].sku||"1");
      var grt=document.getElementById("plgrt"+i);
      if(grt)grt.textContent=((parseFloat(v)||0)*gr).toFixed(1)+"g";
      // Update envase cost for this line
      var envC=document.getElementById("penv_c"+i);
      if(envC&&lineas[i].envase){var cu=invStock[lineas[i].envase]?invStock[lineas[i].envase].cu:0;envC.textContent=fmt((parseFloat(v)||0)*cu);}
      updateGrBar();
      pUpdateCostoBar();
    };

    window.pGuardar=function(){
      var fecha=($("pfecha")||{}).value||hoy();
      var resp=($("presp")||{}).value||"";
      if(!modo){alert("Elige el tipo de producción");return;}

      // Si es edición, borrar registros viejos primero
      var deleteProm=esEd?
        sGET("produccion","num_lote=eq."+autoL).then(function(rows){
          var ids=(rows||[]).map(function(r){return r.id;});
          return Promise.all([
            ...ids.map(function(id){return sDEL("produccion","id=eq."+id);}),
            sDEL("lotes","tipo=eq.produccion&ref_id=eq."+autoL)
          ]);
        }):Promise.resolve();

      deleteProm.then(function(){

      if(modo==="kilos"){
        if(!florSKU){alert("Selecciona la flor utilizada");return;}
        var validas=lineas.filter(function(l){return l.sku&&parseFloat(l.cantidad)>0;});
        if(!validas.length){alert("Agrega al menos una línea de salida");return;}
        var cu=invStock[florSKU]?invStock[florSKU].cu:0;
        var grTotal=calcGrTotal();
        var costoTotal=grTotal*cu; // cu en $/g
        var saves=validas.map(function(l){
          var isHGPLine=isHGP(l.sku);
          var gr=isHGPLine?1:grPorSKU(l.sku);
          var grLinea=(parseFloat(l.cantidad)||0)*gr;
          var cuFlor=grTotal>0?(costoTotal*(grLinea/grTotal)/(parseFloat(l.cantidad)||1)):0;
          var envCU=l.envase&&invStock[l.envase]?invStock[l.envase].cu:0;
          var cuLinea=cuFlor+envCU;
          var costoLinea=cuLinea*(parseFloat(l.cantidad)||1);
          return sPOST("produccion",{
            num_lote:autoL,fecha:fecha,responsable:resp,
            producto_sku_id:0,producto_nombre:l.sku,
            piezas:parseFloat(l.cantidad),
            mano_obra_unit:0,
            costo_unitario:parseFloat(cuLinea.toFixed(4)),
            costo_total:parseFloat(costoLinea.toFixed(2)),
            tipo_inv:"terminado",modo_prod:"kilos",
            insumos:[{sku:florSKU,nombre:invStock[florSKU]?invStock[florSKU].desc:florSKU,cant:grLinea,costo_unit:cu}].concat(l.envase?[{sku:l.envase,nombre:l.envase,cant:parseFloat(l.cantidad)||0,costo_unit:0}]:[])
          });
        });
        Promise.all(saves).then(function(savedRows){
          var lotesP=[];
          // SALIDA: insumo flor usado
          var grUsadoTotal=calcGrTotal();
          if(florSKU&&grUsadoTotal>0){
            lotesP.push(sPostLote({sku:florSKU,tipo:"produccion",movimiento:"salida",ref_id:autoL,fecha:fecha,cantidad:grUsadoTotal,costo_unit:cu,concepto:"Produccion lote #"+autoL,num_ref:"P-"+autoL}));
          }
          // SALIDA: envases usados
          validas.forEach(function(l){
            if(l.envase&&parseFloat(l.cantidad)>0){
              var envCU=invStock[l.envase]?invStock[l.envase].cu:0;
              lotesP.push(sPostLote({sku:l.envase,tipo:"produccion",movimiento:"salida",ref_id:autoL,fecha:fecha,cantidad:parseFloat(l.cantidad),costo_unit:envCU,concepto:"Envase prod lote #"+autoL,num_ref:"P-"+autoL}));
            }
          });
          // ENTRADA: terminados producidos (costo flor + envase)
          validas.forEach(function(l){
            var gr=isHGP(l.sku)?1:grPorSKU(l.sku);
            var grLinea=(parseFloat(l.cantidad)||0)*gr;
            var cuFlor=grTotal>0?(costoTotal*(grLinea/grTotal)/(parseFloat(l.cantidad)||1)):0;
            var envCU=l.envase&&invStock[l.envase]?invStock[l.envase].cu:0;
            var cuLinea=cuFlor+envCU; // costo flor + costo envase por unidad
            lotesP.push(sPostLote({sku:l.sku,tipo:"produccion",movimiento:"entrada",ref_id:autoL,fecha:fecha,cantidad:parseFloat(l.cantidad),costo_unit:parseFloat(cuLinea.toFixed(4)),concepto:"Produccion lote #"+autoL,num_ref:"P-"+autoL}));
          });
          Promise.all(lotesP).then(function(){load();goMod("produccion");toast("Lote #"+autoL+" — "+validas.length+" salidas");});
        });

      } else if(modo==="otro"){
        var sku2=($("potro")||{}).value||otroSKU;
        var cant2=parseFloat(($("potrocant")||{}).value)||otroCant;
        if(!sku2){alert("Selecciona el SKU");return;}
        var insValidas=otroInsumos.filter(function(x){return x.sku&&parseFloat(x.cantidad)>0;});
        var costoIns=insValidas.reduce(function(a,x){var cu=invStock[x.sku]?invStock[x.sku].cu:0;return a+(parseFloat(x.cantidad)||0)*cu;},0);
        var cuUnit=cant2>0?costoIns/cant2:0;
        sPOST("produccion",{
          num_lote:autoL,fecha:fecha,responsable:resp,
          producto_sku_id:0,producto_nombre:sku2,piezas:cant2,
          mano_obra_unit:0,costo_unitario:parseFloat(cuUnit.toFixed(4)),costo_total:parseFloat(costoIns.toFixed(2)),
          tipo_inv:"terminado",modo_prod:"otro",
          insumos:insValidas.map(function(x){return{sku:x.sku,nombre:invStock[x.sku]?invStock[x.sku].desc:x.sku,cant:x.cantidad,costo_unit:invStock[x.sku]?invStock[x.sku].cu:0};})
        }).then(function(savedOtro){
          var lotesO=[];
          // SALIDA: insumos usados
          insValidas.forEach(function(x){
            var cuX=invStock[x.sku]?invStock[x.sku].cu:0;
            lotesO.push(sPostLote({sku:x.sku,tipo:"produccion",movimiento:"salida",ref_id:autoL,fecha:fecha,cantidad:parseFloat(x.cantidad),costo_unit:cuX,concepto:"Insumo prod lote #"+autoL,num_ref:"P-"+autoL}));
          });
          // ENTRADA: terminado producido
          lotesO.push(sPostLote({sku:sku2,tipo:"produccion",movimiento:"entrada",ref_id:autoL,fecha:fecha,cantidad:cant2,costo_unit:parseFloat(cuUnit.toFixed(4)),concepto:"Produccion lote #"+autoL,num_ref:"P-"+autoL}));
          Promise.all(lotesO).then(function(){load();goMod("produccion");toast("Lote #"+autoL+(esEd?" actualizado":" registrado"));});
        });
      }
      }); // end deleteProm.then
    };

    render();
  }

  load();
}

/* ── ENVÍOS ──────────────────────────────────────────────────────────── */
function rEnvios(el){
  var envios=[],ventas=[];
  function load(){
    sGET("envios","order=num_envio.desc").then(function(d){envios=Array.isArray(d)?d:[];renderList()});
    sGET("ventas","order=ticket.desc").then(function(d){ventas=Array.isArray(d)?d:[]});
  }
  var SC={en_espera:"#C084FC",en_camino:"#4A9EFF",entregado:"#00C896"};
  var SI={en_espera:"⏳",en_camino:"🚚",entregado:"✅"};
  function renderList(){
    var html='<div class="mod"><div style="display:flex;justify-content:space-between;margin-bottom:20px"><h1 style="font-size:18px;font-weight:700">Envíos</h1><button class="btn btn-p" onclick="eNuevo()">+ Nuevo envío</button></div>';
    if(!envios.length){html+='<div class="empty">Sin envíos.</div></div>';el.innerHTML=html;return}
    html+='<table><thead><tr><th>#</th><th>Ruta</th><th>Fecha</th><th>Repartidor</th><th>Pedidos</th><th>Estado</th><th></th></tr></thead><tbody>';
    envios.forEach(function(env){
      var col=SC[env.status]||"#30363D";
      var peds=(env.pedidos||[]).map(function(p){return'<span style="font-size:10px;background:#21262D;border:1px solid #30363D;border-radius:2px;padding:2px 6px;color:'+(p.origen==="tienda"?"#C084FC":"#4A9EFF")+'">'+(p.origen==="tienda"?"🛍":"#")+p.ticket+' '+( p.cliente||"")+'</span>'}).join(" ");
      html+='<tr>';
      html+='<td style="color:#FB923C;font-weight:700">'+env.num_envio+'</td>';
      html+='<td style="font-weight:700">'+(env.ruta||"Ruta #"+env.num_envio)+'</td>';
      html+='<td style="color:#8B949E">'+env.fecha+'</td>';
      html+='<td>'+(env.repartidor||"—")+'</td>';
      html+='<td>'+peds+'</td>';
      html+='<td>'+bdg((SI[env.status]||"")+" "+(env.status||"").replace("_"," "),col)+'</td>';
      html+='<td><div style="display:flex;gap:6px">';
      if(env.status==="en_espera")html+='<button class="btn btn-p btn-s" style="background:#4A9EFF" onclick="eCambiarStatus('+env.id+',&apos;en_camino&apos;)">🚚 Salió</button>';
      html+='<button class="btn btn-o btn-s" style="border-color:#4A9EFF;color:#4A9EFF" onclick="eEdit('+env.id+')">editar</button>';
      html+='<button class="btn btn-o btn-s" style="border-color:#F85149;color:#F85149" onclick="eDel('+env.id+')">✕</button>';
      html+='</div></td></tr>';
    });
    html+='</tbody></table>';
    html+='</div>';
    el.innerHTML=html;
  }
  window.eCambiarStatus=function(id,st){
    sPATCH("envios","id=eq."+id,{status:st}).then(function(){
      if(st==="en_camino"){
        var env=envios.find(function(e){return e.id===id});
        if(env){
          var fecha2=new Date().toLocaleDateString("es-MX");
          // Update all seguimientos linked to this envio
          sGET("seguimientos","order=id").then(function(allSegs){
            allSegs=Array.isArray(allSegs)?allSegs:[];
            allSegs.forEach(function(s){
              // Match by pedido_id, ticket, or num_envio
              var match=(env.pedidos||[]).some(function(p){
                return String(p.pedido_id)===String(s.pedido_id)||
                       String(p.ticket)===String(s.pedido_ticket)||
                       String(p.venta_id)===String(s.venta_id);
              })||String(s.num_envio)===String(env.num_envio);
              if(match){
                var hist=(s.historial||[]).concat([{estado:"en_camino",fecha:fecha2}]);
                sPATCH("seguimientos","id=eq."+s.id,{estado:"en_camino",num_envio:env.num_envio,historial:hist});
              }
            });
          });
        }
      }
      load();toast("Envío actualizado");
    });
  };
  window.eNuevo=function(){eForm(null)};
  window.eEdit=function(id){eForm(envios.find(function(e){return e.id===id}))};
  window.eDel=function(id){sDEL("envios","id=eq."+id).then(function(){load();toast("Eliminado","err")})};

  function eForm(ee){
    var esEd=!!ee;
    // Número de ruta diario
    var todayStr=hoy();
    var enviosHoy=envios.filter(function(e){return(e.fecha||"").slice(0,10)===todayStr});
    var maxE=enviosHoy.length?Math.max.apply(null,enviosHoy.map(function(x){return x.num_envio||0})):0;
    var autoE=esEd?ee.num_envio:maxE+1;
    var peds=esEd&&ee.pedidos&&ee.pedidos.length?JSON.parse(JSON.stringify(ee.pedidos)):[{venta_id:""}];

    function calcPro(){var n=peds.filter(function(p){return p.venta_id}).length,c=parseFloat(($("ecosto")||{}).value)||0;return n>0?c/n:0}
    function renderPeds(){
      if(!$("epedrows"))return;
      var html="";
      peds.forEach(function(p,i){
        html+='<div style="display:flex;gap:8px;margin-bottom:8px"><select onchange="eSetPed('+i+',this.value)" style="flex:1;background:#0D1117;border:1px solid #30363D;border-radius:2px;padding:8px 10px;font-size:12px;color:#E6EDF3"><option value="">— Ticket —</option>';
        var vErp=ventas.filter(function(v){return!v.origen||v.origen==="erp"});
        var vTienda=ventas.filter(function(v){return v.origen==="tienda"});
        vErp.forEach(function(v){html+='<option value="'+v.id+'"'+(String(p.venta_id)===String(v.id)?" selected":"")+'>  #'+v.ticket+' · '+v.cliente_nombre+' · '+fmt(v.monto_venta)+'</option>'});
        if(vTienda.length){html+='<option disabled>── Pedidos Tienda ──</option>';vTienda.forEach(function(v){html+='<option value="'+v.id+'"'+(String(p.venta_id)===String(v.id)?" selected":"")+'>🛍 #'+v.ticket+' · '+v.cliente_nombre+' · '+fmt(v.monto_venta)+'</option>'})}
        html+='</select>'+(peds.length>1?'<button onclick="eRemPed('+i+')" style="background:transparent;border:none;color:#8B949E;cursor:pointer;font-size:16px">✕</button>':'')+'</div>';
      });
      $("epedrows").innerHTML=html;
      var pro=$("epro");if(pro)pro.textContent="Costo por pedido: "+fmt(calcPro());
    }

    var html='<div class="mod"><div style="display:flex;justify-content:space-between;margin-bottom:20px"><h1 style="font-size:18px;font-weight:700">'+(esEd?"Editar":"Nuevo")+' Envío</h1><button class="btn btn-g" onclick="goMod(\'envios\')">← Cancelar</button></div>';
    html+='<div class="grid2"><div class="card">';
    html+='<div class="fi"><label>RUTA #</label><div class="fi-ro">'+autoE+' 🔒 (reinicia cada día)</div></div>';
    html+=fi("FECHA",'<input id="efecha" type="date" value="'+(esEd?ee.fecha:hoy())+'">');
    // Recargar REPS frescos de Supabase antes de renderizar
    sGET("repartidores","activo=eq.true&order=id").then(function(freshReps){
      if(freshReps&&freshReps.length) REPS=freshReps.map(function(r){return{id:r.id,n:r.nombre};});
      var repSel=document.getElementById("erep");
      if(repSel){
        repSel.innerHTML='<option value="">— Seleccionar —</option>';
        REPS.forEach(function(r){
          var opt=document.createElement("option");
          opt.value=r.n;opt.textContent=r.n;
          if(esEd&&ee.repartidor===r.n)opt.selected=true;
          repSel.appendChild(opt);
        });
      }
    });
    html+='<div class="fi"><label>REPARTIDOR</label><select id="erep" style="width:100%;background:#0D1117;border:1px solid #30363D;border-radius:2px;padding:9px 11px;font-size:13px;color:#E6EDF3"><option value="">Cargando...</option></select></div>';
    html+=fi("COSTO TOTAL ($)",'<input id="ecosto" type="number" value="'+(esEd?ee.costo_total:0)+'" oninput="eRecalc()">');
    html+='<div id="epro" style="font-size:11px;color:#E3B341;margin-top:4px"></div>';
    html+='</div><div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:12px"><div style="font-size:10px;color:#8B949E;letter-spacing:.12em">PEDIDOS EN ESTA RUTA</div><button class="btn btn-o btn-s" style="border-color:#FB923C;color:#FB923C" onclick="eAddPed()">+ Agregar</button></div><div id="epedrows"></div></div></div>';
    html+='<div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px"><button class="btn btn-g" onclick="goMod(\'envios\')">Cancelar</button><button class="btn btn-p" onclick="eGuardar('+(esEd?ee.id:"null")+')">'+(esEd?"Actualizar →":"Registrar →")+'</button></div></div>';
    el.innerHTML=html;

    window.eRecalc=function(){var p=$("epro");if(p)p.textContent="Costo por pedido: "+fmt(calcPro())};
    window.eSetPed=function(i,v){peds[i].venta_id=v;renderPeds()};
    window.eAddPed=function(){peds.push({venta_id:""});renderPeds()};
    window.eRemPed=function(i){peds.splice(i,1);renderPeds()};
    var _eGuardando=false;
    window.eGuardar=function(eid){
      if(_eGuardando)return;
      _eGuardando=true;
      var pro=calcPro();
      var pedsMapped=peds.filter(function(p){return p.venta_id}).map(function(p){
        var v=ventas.find(function(x){return String(x.id)===String(p.venta_id)});
        return{venta_id:parseInt(p.venta_id),ticket:v?v.ticket:"?",cliente:v?v.cliente_nombre:"?",origen:v?v.origen:"erp",pedido_id:v?v.pedido_id:null,monto_asignado:pro};
      });
      var body={num_envio:autoE,fecha:($("efecha")||{}).value||hoy(),repartidor:($("erep")||{}).value||"",ruta:($("eruta")||{}).value||"",costo_total:parseFloat(($("ecosto")||{}).value)||0,status:esEd?ee.status:"en_espera",pedidos:pedsMapped};
      var save=eid?sPATCH("envios","id=eq."+eid,body):sPOST("envios",body);
      save.then(function(res){
        if(!eid){
          // Create deuda for repartidor
          var repNom=($("erep")||{}).value||"";
          var costoEnvio=parseFloat(($("ecosto")||{}).value)||0;
          if(repNom&&costoEnvio>0){
            sGET("compras","order=num_compra.desc&limit=1").then(function(rows){
              var maxNC=rows&&rows[0]&&rows[0].num_compra?rows[0].num_compra:0;
              sPOST("compras",{
                num_compra:maxNC+1,
                fecha:($("efecha")||{}).value||hoy(),
                proveedor:repNom,
                proveedor_id:0,
                producto_nombre:"Servicio de envío",
                descripcion:"Ruta #"+autoE+" · "+pedsMapped.length+" pedido(s)",
                tipo_inv:"servicio",
                cantidad:1,
                pu:costoEnvio,
                total:costoEnvio,
                responsable:repNom
              });
            });
          }
          var pedIds=pedsMapped.filter(function(p){return p.pedido_id}).map(function(p){return p.pedido_id});
          pedIds.forEach(function(pid){
            sGET("seguimientos","pedido_id=eq."+pid).then(function(rows){
              if(rows&&rows[0]){
                var hist=(rows[0].historial||[]).concat([{estado:"en_espera",fecha:new Date().toLocaleDateString("es-MX")}]);
                sPATCH("seguimientos","id=eq."+rows[0].id,{estado:"en_espera",num_envio:autoE,historial:hist});
              }
            });
          });
        }
        load();goMod("envios");toast("Envío #"+autoE+(eid?" actualizado":" registrado"));
      });
    };
    renderPeds();
  }
  load();
}

/* ── INVENTARIO ─────────────────────────────────────────────────────── */
function rInventario(el){
  var tabInv=0, catFiltro="", soloStock=false;

  function loadInv(){
    el.innerHTML='<div class="mod"><h1 style="font-size:18px;font-weight:700;margin-bottom:12px">Inventario</h1><div class="spin">Calculando...</div></div>';
    sGET("lotes","order=fecha,id").then(function(lotes){
      lotes=Array.isArray(lotes)?lotes:[];
      var stock={};
      function ensure(sku,tipo,cat){
        if(!stock[sku])stock[sku]={tipo:tipo||"insumo",categoria:cat||"",cantidad:0,entradas:0,salidas:0,costoUnit:0,lotesDetalle:[]};
      }
      syncCatalogo(function(){
        CATALOGO_SKU.forEach(function(s){ensure(s.sku,s.tipo,s.cat);});
        lotes.forEach(function(lt){
          if(!lt.sku)return;
          var ci=CATALOGO_SKU.find(function(s){return s.sku===lt.sku;});
          ensure(lt.sku,ci?ci.tipo:"insumo",ci?ci.cat:"");
          var cant=parseFloat(lt.cantidad)||0;
          var cu=parseFloat(lt.costo_unit)||0;
          if(lt.movimiento==="entrada"){
            stock[lt.sku].cantidad+=cant;
            stock[lt.sku].entradas+=cant;
            if(cu>0)stock[lt.sku].costoUnit=cu;
            stock[lt.sku].lotesDetalle.push({id:lt.id,num_ref:lt.num_ref||"",fecha:lt.fecha,tipo:lt.tipo,movimiento:"entrada",cantidad:cant,cu:cu,concepto:lt.concepto||""});
          } else {
            stock[lt.sku].cantidad-=cant;
            stock[lt.sku].salidas+=cant;
            stock[lt.sku].lotesDetalle.push({id:lt.id,num_ref:lt.num_ref||"",fecha:lt.fecha,tipo:lt.tipo,movimiento:"salida",cantidad:cant,cu:cu,concepto:lt.concepto||""});
          }
        });
        var terminados=[],insumos=[],fijos=[],todos=[];
        Object.keys(stock).sort().forEach(function(nom){
          var s=stock[nom];
          s.costoTotal=Math.max(0,s.cantidad)*s.costoUnit;
          var obj=Object.assign({nombre:nom},s);
          todos.push(obj);
          if(s.tipo==="terminado")terminados.push(obj);
          else if(s.tipo==="otro")fijos.push(obj);
          else insumos.push(obj);
        });
        renderInvUI(terminados,insumos,fijos,todos);
      });
    });
  }

  function renderInvUI(terminados,insumos,fijos,todos){
    var allCats=[];
    todos.forEach(function(i){if(i.categoria&&allCats.indexOf(i.categoria)<0)allCats.push(i.categoria);});
    allCats.sort();
    var TABS=[
      {l:"📦 Terminado",items:terminados},
      {l:"⚗️ Insumos",items:insumos},
      {l:"🏭 Activos Fijos",items:fijos},
      {l:"📊 Todos",items:todos}
    ];
    var html='<div class="mod"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h1 style="font-size:18px;font-weight:700">Inventario</h1></div>';
    html+='<div class="tab-nav" style="margin-bottom:12px">';
    TABS.forEach(function(t,i){html+='<button class="tab-btn'+(tabInv===i?" on":"")+'" onclick="invTab('+i+')">'+t.l+' ('+t.items.length+')</button>';});
    html+='</div>';
    html+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">';
    html+='<button id="invfiltstock" onclick="toggleInvStock()" style="padding:6px 14px;border-radius:2px;font-family:monospace;font-size:11px;cursor:pointer;background:'+(soloStock?"rgba(0,200,150,.2)":"transparent")+';border:1px solid '+(soloStock?"#00C896":"#30363D")+';color:'+(soloStock?"#00C896":"#8B949E")+'">Solo con stock</button>';
    html+='<select id="invcatfilt" onchange="setInvCat(this.value)" style="background:#0D1117;border:1px solid #30363D;border-radius:2px;padding:6px 10px;font-size:11px;color:#E6EDF3"><option value="">Todas las categorías</option>';
    allCats.forEach(function(cat){html+='<option value="'+cat+'"'+(catFiltro===cat?" selected":"")+'>'+cat+'</option>';});
    html+='</select>';
    // Tab "Todos": checkboxes to exclude types
    if(tabInv===3){
      html+='<label style="font-size:11px;color:#8B949E;display:flex;align-items:center;gap:4px"><input type="checkbox" id="chk_term" checked onchange="invFiltTodos()"> Terminado</label>';
      html+='<label style="font-size:11px;color:#8B949E;display:flex;align-items:center;gap:4px"><input type="checkbox" id="chk_ins" checked onchange="invFiltTodos()"> Insumos</label>';
      html+='<label style="font-size:11px;color:#8B949E;display:flex;align-items:center;gap:4px"><input type="checkbox" id="chk_fijo" checked onchange="invFiltTodos()"> Activos Fijos</label>';
    }
    html+='</div>';
    html+='<div id="invtabla"></div></div>';
    el.innerHTML=html;

    window.invTab=function(i){tabInv=i;document.querySelectorAll(".tab-btn").forEach(function(b,j){b.className="tab-btn"+(j===i?" on":"")});renderInvTable(TABS[i].items);if(i===3){window.invFiltTodos&&window.invFiltTodos();}};
    window.toggleInvStock=function(){soloStock=!soloStock;var b=document.getElementById("invfiltstock");if(b){b.style.background=soloStock?"rgba(0,200,150,.2)":"transparent";b.style.borderColor=soloStock?"#00C896":"#30363D";b.style.color=soloStock?"#00C896":"#8B949E";}renderInvTable(TABS[tabInv].items);};
    window.setInvCat=function(v){catFiltro=v;renderInvTable(TABS[tabInv].items);};
    window.invFiltTodos=function(){
      var ct=document.getElementById("chk_term"),ci=document.getElementById("chk_ins"),cf=document.getElementById("chk_fijo");
      var tipos=[];
      if(ct&&ct.checked)tipos.push("terminado");
      if(ci&&ci.checked){tipos.push("insumo");tipos.push("mixto");}
      if(cf&&cf.checked)tipos.push("otro");
      var f=todos.filter(function(i){return tipos.indexOf(i.tipo)>=0;});
      renderInvTable(f,true);
    };
    renderInvTable(TABS[tabInv].items);
  }

  function renderInvTable(items,skipCatFilter){
    var itbl=document.getElementById("invtabla");if(!itbl)return;
    var f=items.filter(function(i){
      if(soloStock&&i.cantidad<=0)return false;
      if(!skipCatFilter&&catFiltro&&i.categoria!==catFiltro)return false;
      return true;
    });
    if(!f.length){itbl.innerHTML='<div class="empty">Sin items'+(soloStock?" con stock":"")+'.</div>';return;}
    var totalVal=f.reduce(function(a,i){return a+(i.cantidad>0?i.costoTotal:0);},0);
    var html='<div style="font-size:11px;color:#8B949E;margin-bottom:10px">'+f.length+' items · Valor en stock: <span style="color:#00C896;font-weight:700">'+fmt(totalVal)+'</span></div>';
    html+='<table><thead><tr><th>SKU / Nombre</th><th>Categoría</th><th>Tipo</th><th style="text-align:right">Entradas</th><th style="text-align:right">Salidas</th><th style="text-align:right">Stock</th><th style="text-align:right">Costo unit.</th><th style="text-align:right">Valor</th></tr></thead><tbody>';
    f.forEach(function(item){
      var col=item.cantidad<=0?"#F85149":item.cantidad<=5?"#E3B341":"#E6EDF3";
      var tipoColor={insumo:"#4A9EFF",terminado:"#00C896",mixto:"#E3B341",otro:"#C084FC"}[item.tipo]||"#8B949E";
      var catEntry=CATALOGO_SKU.find(function(s){return s.sku===item.nombre;});
      // Check if multiple lotes with different prices
      var detalle=item.lotesDetalle||[];
      var tieneMovs=detalle.length>0;
      html+='<tr style="cursor:'+(tieneMovs?"pointer":"default")+'" onclick="'+(tieneMovs?"toggleLotes('"+item.nombre+"')":"")+'">';
      html+='<td><div style="font-weight:700;color:#E6EDF3">'+item.nombre+(tieneMovs?' <span style="font-size:9px;color:#4A9EFF;background:rgba(74,158,255,.1);padding:1px 5px;border-radius:2px">'+detalle.length+' movs ▾</span>':'')+'</div>'+(catEntry&&catEntry.desc?'<div style="font-size:10px;color:#8B949E">'+catEntry.desc+'</div>':'')+'</td>';
      html+='<td style="font-size:11px;color:#C084FC">'+(item.categoria||"—")+'</td>';
      html+='<td>'+bdg(item.tipo,tipoColor)+'</td>';
      html+='<td style="text-align:right;color:#00C896">+'+item.entradas.toFixed(1)+'</td>';
      html+='<td style="text-align:right;color:#F85149">-'+(item.salidas||0).toFixed(1)+'</td>';
      html+='<td style="text-align:right;font-weight:700;color:'+col+'">'+Math.round(Math.max(0,item.cantidad))+'</td>';
      html+='<td style="text-align:right;color:#FB923C">'+fmt(item.costoUnit)+'</td>';
      html+='<td style="text-align:right;color:#00C896;font-weight:700">'+fmt(item.cantidad>0?item.costoTotal:0)+'</td>';
      html+='</tr>';
      if(tieneMovs){
        html+='<tr id="lotes_'+item.nombre+'" style="display:none"><td colspan="8" style="padding:4px 0 10px 24px">';
        html+='<table style="width:100%"><thead><tr style="font-size:10px;color:#8B949E">';
        html+='<th style="padding:3px 8px">#Mov</th><th>Fecha</th><th>Tipo</th><th>Ref</th><th>Entrada/Salida</th><th style="text-align:right">Cantidad</th><th style="text-align:right">$/u</th></tr></thead><tbody>';
        detalle.forEach(function(mv){
          var mvColor=mv.movimiento==="entrada"?"#00C896":"#F85149";
          var mvSign=mv.movimiento==="entrada"?"+":"-";
          html+='<tr style="font-size:11px">';
          html+='<td style="padding:3px 8px;color:#E3B341;font-weight:700">#'+mv.id+'</td>';
          html+='<td style="color:#8B949E">'+mv.fecha+'</td>';
          html+='<td style="color:#4A9EFF">'+mv.tipo+'</td>';
          html+='<td style="color:#C084FC;font-weight:700">'+(mv.num_ref||'—')+'</td>';
          html+='<td><span style="color:'+mvColor+';font-weight:700">'+mv.movimiento+'</span></td>';
          html+='<td style="text-align:right;color:'+mvColor+';font-weight:700">'+mvSign+mv.cantidad+'</td>';
          html+='<td style="text-align:right;color:#FB923C">'+fmt(mv.cu)+'</td>';
          html+='</tr>';
        });
        html+='</tbody></table></td></tr>';
      }
    });
    html+='</tbody></table>';
    itbl.innerHTML=html;
  }
  window.toggleLotes=function(sku){
    var row=document.getElementById("lotes_"+sku);
    if(row)row.style.display=row.style.display==="none"?"table-row":"none";
  };
  loadInv();
}

/* ── CATÁLOGO ────────────────────────────────────────────────────────── */
function rProductos(el){
  var prods=[];
  var TIPOS=[
    {v:"insumo",l:"Insumo"},
    {v:"terminado",l:"Producto Terminado"},
    {v:"mixto",l:"Mixto"},
    {v:"otro",l:"Activos Fijos"}
  ];

  function syncCatalogoSKU(){
    // Sync Supabase productos into CATALOGO_SKU memory array
    prods.forEach(function(p){
      var idx=CATALOGO_SKU.findIndex(function(s){return s.sku===(p.sku||p.nombre);});
      var entry={sku:p.sku||p.nombre,desc:p.descripcion||(p.sku||p.nombre),cat:p.categoria||"",tipo:p.tipo||"insumo"};
      if(idx>=0){CATALOGO_SKU[idx]=entry;}else{CATALOGO_SKU.push(entry);}
    });
  }

  function seedFromCatalogo(){
    CATALOGO_SKU.reduce(function(p,prod){
      return p.then(function(){return sPOST("productos",{sku:prod.sku,tipo:prod.tipo,categoria:prod.cat,descripcion:prod.desc});});
    },Promise.resolve()).then(function(){load();});
  }
  function load(){
    sGET("productos","order=sku").then(function(cat){
      cat=Array.isArray(cat)?cat:[];
      if(!cat.length){seedFromCatalogo();return;}
      var seen={},dupes=[];
      cat.forEach(function(p){var k=p.sku||p.nombre;if(!k)return;if(seen[k])dupes.push(p.id);else{p.sku=k;seen[k]=p;}});
      dupes.forEach(function(id){sDEL("productos","id=eq."+id);});
      prods=Object.keys(seen).sort().map(function(n){var p=seen[n];p.sku=p.sku||p.nombre||n;return p;});
      syncCatalogoSKU();
      renderList();
    });
  }

  function renderList(){
    var filtroTipo="", filtroCat="", filtroQ="";
    var allCats=[];
    prods.forEach(function(p){if(p.categoria&&allCats.indexOf(p.categoria)<0)allCats.push(p.categoria);});
    allCats.sort();

    function render(){
      var f=prods.filter(function(p){
        if(filtroTipo&&p.tipo!==filtroTipo)return false;
        if(filtroCat&&p.categoria!==filtroCat)return false;
        if(filtroQ&&((p.sku||p.nombre||'')+p.descripcion+p.categoria).toLowerCase().indexOf(filtroQ.toLowerCase())<0)return false;
        return true;
      });
      var tbody=document.getElementById("cat_tbody");if(!tbody)return;
      if(!f.length){tbody.innerHTML='<tr><td colspan="5" style="text-align:center;color:#8B949E;padding:30px">Sin productos con ese filtro.</td></tr>';return;}
      tbody.innerHTML=f.map(function(p){
        var tipoLabel=TIPOS.find(function(t){return t.v===p.tipo;});
        var tipoColor={insumo:"#4A9EFF",terminado:"#00C896",mixto:"#E3B341",otro:"#C084FC"}[p.tipo]||"#8B949E";
        var idx=prods.indexOf(p);
        var visLabel=p.visible_tienda?'<span style="color:#00C896;font-weight:700">SI</span>':'<span style="color:#F85149">NO</span>';
        return '<tr>'+
          '<td style="font-weight:700;color:#E6EDF3">'+(p.sku||p.nombre)+'</td>'+
          '<td style="color:#8B949E;font-size:11px">'+(p.descripcion||"—")+'</td>'+
          '<td style="font-size:11px;color:#C084FC">'+(p.categoria||"—")+'</td>'+
          '<td>'+bdg(tipoLabel?tipoLabel.l:p.tipo,tipoColor)+'</td>'+
          '<td style="text-align:right;color:#E3B341">'+((p.precio_menu)?fmt(p.precio_menu):"—")+'</td>'+
          '<td style="font-size:11px;color:#E6EDF3">'+(p.nombre_tienda&&p.nombre_tienda!=="NA"?p.nombre_tienda:'<span style="color:#8B949E">—</span>')+'</td>'+
          '<td style="text-align:center">'+visLabel+'</td>'+
          '<td><div style="display:flex;gap:6px">'+
          '<button class="btn btn-o btn-s" style="border-color:#4A9EFF;color:#4A9EFF" onclick="prEditIdx('+idx+')">editar</button>'+
          '<button class="btn btn-o btn-s" style="border-color:#F85149;color:#F85149" onclick="prDelId('+p.id+')">✕</button>'+
          '</div></td></tr>';
      }).join("");
    }

    var html='<div class="mod">';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">';
    html+='<h1 style="font-size:18px;font-weight:700">Catálogo <span style="font-size:12px;color:#8B949E;font-weight:400">('+prods.length+' SKUs)</span></h1>';
    html+='<button class="btn btn-p" onclick="prNuevo()">+ Nuevo SKU</button></div>';
    // Filters
    html+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">';
    html+='<input id="cat_q" placeholder="Buscar SKU o descripción..." oninput="catFiltQ(this.value)" style="flex:1;min-width:200px;background:#0D1117;border:1px solid #30363D;border-radius:2px;padding:8px 10px;font-size:12px;color:#E6EDF3">';
    html+='<select id="cat_ftipo" onchange="catFiltTipo(this.value)" style="background:#0D1117;border:1px solid #30363D;border-radius:2px;padding:8px 10px;font-size:12px;color:#E6EDF3"><option value="">Todos los tipos</option>';
    TIPOS.forEach(function(t){html+='<option value="'+t.v+'">'+t.l+'</option>';});
    html+='</select>';
    html+='<select id="cat_fcat" onchange="catFiltCat(this.value)" style="background:#0D1117;border:1px solid #30363D;border-radius:2px;padding:8px 10px;font-size:12px;color:#E6EDF3"><option value="">Todas las categorías</option>';
    allCats.forEach(function(cat){html+='<option value="'+cat+'">'+cat+'</option>';});
    html+='</select></div>';
    html+='<div style="overflow-x:auto"><table><thead><tr><th>SKU</th><th>Descripción</th><th>Categoría</th><th>Tipo</th><th style="text-align:right">Precio Menú</th><th>Nombre Tienda</th><th style="text-align:center">Tienda</th><th></th></tr></thead><tbody id="cat_tbody"></tbody></table></div></div>';
    el.innerHTML=html;

    window.catFiltQ=function(v){filtroQ=v;render();};
    window.catFiltTipo=function(v){filtroTipo=v;render();};
    window.catFiltCat=function(v){filtroCat=v;render();};
    render();
  }

  window.prNuevo=function(){prForm(null)};
  window.prEditIdx=function(idx){var p=prods[idx];if(p)prForm(p);};
  window.prDelId=function(id){
    if(!confirm("¿Eliminar este SKU del catálogo?"))return;
    sDEL("productos","id=eq."+id).then(function(){
      // Also remove from CATALOGO_SKU memory
      var p=prods.find(function(x){return x.id===id;});
      if(p){var si=CATALOGO_SKU.findIndex(function(s){return s.sku===(p.sku||p.nombre);});if(si>=0)CATALOGO_SKU.splice(si,1);}
      load();toast("SKU eliminado","err");
    });
  };

  function prForm(pe){
    var esEd=!!pe;
    var allCats2=[];
    prods.forEach(function(p){if(p.categoria&&allCats2.indexOf(p.categoria)<0)allCats2.push(p.categoria);});
    allCats2.sort();

    var html='<div class="mod"><div style="display:flex;justify-content:space-between;margin-bottom:20px">';
    html+='<h1 style="font-size:18px;font-weight:700">'+(esEd?"Editar":"Nuevo")+" SKU"+(esEd?" — "+(pe.sku||pe.nombre):"")+'</h1>';
    html+='<button class="btn btn-g" onclick="goMod(&apos;productos&apos;)">← Cancelar</button></div>';
    html+='<div class="card" style="max-width:600px">';
    html+=fi("SKU (código único)",'<input id="prnombre" type="text" value="'+(esEd?pe.sku||"":"")+'" placeholder="Ej: P1, GALLOEX, BHO1..." autofocus style="text-transform:uppercase">');
    html+=fi("DESCRIPCIÓN",'<input id="prdesc" type="text" value="'+(esEd?pe.descripcion||"":"")+'" placeholder="Nombre completo del producto">');
    // Category: select existing + option to write new
    html+='<div class="fi"><label>CATEGORÍA</label>';
    html+='<input id="prcat" list="prcat_list" value="'+(esEd?pe.categoria||"":"")+'" placeholder="Selecciona o escribe una categoría" style="width:100%;background:#0D1117;border:1px solid #30363D;border-radius:2px;padding:9px 11px;font-size:13px;color:#E6EDF3">';
    html+='<datalist id="prcat_list">'+allCats2.map(function(c){return'<option value="'+c+'">';}).join("")+'</datalist></div>';
    html+='<div class="fi"><label>PRECIO MENÚ ($)</label><input id="prprecio_menu" type="number" min="0" step="0.01" value="'+(esEd&&pe.precio_menu?pe.precio_menu:"0")+'" placeholder="0.00"></div>';
    html+='<div class="fi"><label>NOMBRE EN TIENDA</label><input id="prnombre_tienda" type="text" value="'+(esEd&&pe.nombre_tienda&&pe.nombre_tienda!=="NA"?pe.nombre_tienda:"")+'" placeholder="Nombre que verá el cliente"></div>';
    html+='<div class="fi"><label>SUBTÍTULO <span style="color:#8B949E;font-size:10px">(tipo · sabor · etc.)</span></label><input id="prsubtitulo" type="text" value="'+(esEd&&pe.subtitulo?pe.subtitulo:"")+'" placeholder="Ej: Híbrido · Limón Ácido · Aceite Cítrico"></div>';
    html+='<div class="fi"><label>DESCRIPCIÓN LARGA <span style="color:#8B949E;font-size:10px">(texto épico para la tienda)</span></label><textarea id="prdesc_larga" rows="3" style="width:100%;background:#0D1117;border:1px solid #30363D;border-radius:2px;padding:9px 11px;font-size:12px;color:#E6EDF3;resize:vertical" placeholder="Descripción que verá el cliente en la tienda...">'+(esEd&&pe.descripcion_larga?pe.descripcion_larga:"")+'</textarea></div>';
    html+='<div class="fi"><label>EMOJI / ÍCONO</label><input id="premoji" type="text" value="'+(esEd&&pe.emoji?pe.emoji:"🌿")+'" placeholder="🏛️" style="width:80px"></div>';
    html+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">';
    html+='<div class="fi" style="margin:0"><label>PODER</label><input id="prpoder" type="number" min="0" max="10" value="'+(esEd&&pe.poder?pe.poder:0)+'" style="width:100%"></div>';
    html+='<div class="fi" style="margin:0"><label>FUERZA</label><input id="prfuerza" type="number" min="0" max="10" value="'+(esEd&&pe.fuerza?pe.fuerza:0)+'" style="width:100%"></div>';
    html+='<div class="fi" style="margin:0"><label>ESENCIA</label><input id="presencia" type="number" min="0" max="10" value="'+(esEd&&pe.esencia?pe.esencia:0)+'" style="width:100%"></div>';
    html+='</div>';
    html+='<div class="fi"><label>VISIBLE EN TIENDA</label><select id="prvisible_tienda" style="width:100%;background:#0D1117;border:1px solid #30363D;border-radius:2px;padding:9px 11px;font-size:13px;color:#E6EDF3"><option value="false"'+(esEd&&pe.visible_tienda?'':' selected')+'>NO</option><option value="true"'+(esEd&&pe.visible_tienda?' selected':'')+'>SI</option></select></div>';
    html+='<div class="fi"><label>TIPO</label><select id="prtipo" onchange="prTipoChange()" style="width:100%;background:#0D1117;border:1px solid #30363D;border-radius:2px;padding:9px 11px;font-size:13px;color:#E6EDF3">';
    TIPOS.forEach(function(t){html+='<option value="'+t.v+'"'+(esEd&&pe.tipo===t.v?' selected':(!esEd&&t.v==='insumo'?' selected':''))+'>'+t.l+'</option>';});
    html+='</select></div>';
    html+='</div>';
    html+='<div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px">';
    html+='<button class="btn btn-g" onclick="goMod(&apos;productos&apos;)">Cancelar</button>';
    html+='<button class="btn btn-p" onclick="prGuardar('+(esEd?pe.id:"null")+')">'+(esEd?"Actualizar →":"Crear SKU →")+'</button>';
    html+='</div></div>';
    el.innerHTML=html;
  }

  window.prTipoChange=function(){
    var tipo=($("prtipo")||{}).value||"";
    var wrap=document.getElementById("pr_pm_wrap");
    // precio_menu siempre visible
  };
  // Trigger on load
  setTimeout(function(){window.prTipoChange&&window.prTipoChange();},100);
  window.prGuardar=function(pid){
    var sku=($("prnombre")||{}).value||"";
    var desc=($("prdesc")||{}).value||"";
    var cat=($("prcat")||{}).value||"";
    var tipo=($("prtipo")||{}).value||"insumo";
    if(!sku.trim()){alert("El SKU es obligatorio");return;}
    if(!desc.trim()){alert("La descripción es obligatoria");return;}
    var pm=parseFloat(($("prprecio_menu")||{}).value)||0;
    var nomTienda=($("prnombre_tienda")||{}).value||"NA";
    var visTienda=($("prvisible_tienda")||{}).value==="true";
    var subtitulo=($("prsubtitulo")||{}).value||"";
    var descLarga=($("prdesc_larga")||{}).value||"";
    var emoji=($("premoji")||{}).value||"🌿";
    var poder=parseInt(($("prpoder")||{}).value)||0;
    var fuerza=parseInt(($("prfuerza")||{}).value)||0;
    var esencia=parseInt(($("presencia")||{}).value)||0;
    var body={sku:sku.trim().toUpperCase(),descripcion:desc.trim(),categoria:cat.trim(),tipo:tipo,
      precio_menu:pm>0?pm:null,nombre_tienda:nomTienda||"NA",visible_tienda:visTienda,
      subtitulo:subtitulo||null,descripcion_larga:descLarga||null,emoji:emoji||null,
      poder:poder,fuerza:fuerza,esencia:esencia};
    var save=pid?sPATCH("productos","id=eq."+pid,body):sPOST("productos",body);
    save.then(function(){
      // Update CATALOGO_SKU in memory
      var idx=CATALOGO_SKU.findIndex(function(s){return s.sku===body.nombre;});
      var entry={sku:body.nombre,desc:body.descripcion,cat:body.categoria,tipo:body.tipo,precio_menu:body.precio_menu||null};
      if(idx>=0){CATALOGO_SKU[idx]=entry;}else{CATALOGO_SKU.push(entry);}
      load();goMod("productos");toast(pid?"SKU actualizado":"SKU creado");
    });
  };

  load();
}

/* ── CLIENTES ────────────────────────────────────────────────────────── */
function rClientes(el){
  var clientes=[];
  function load(){
    sGET("clientes","order=codigo").then(function(d){clientes=Array.isArray(d)?d:[];renderList()});
  }
  function renderList(){
    var html='<div class="mod"><div style="display:flex;justify-content:space-between;margin-bottom:16px"><h1 style="font-size:18px;font-weight:700">👥 Clientes</h1><button class="btn btn-p" onclick="clNuevo()">+ Nuevo cliente</button></div>';
    html+='<input id="clbusq" placeholder="Buscar por nombre, código, teléfono..." style="width:100%;background:#0D1117;border:1px solid #30363D;border-radius:2px;padding:8px 11px;font-size:12px;color:#E6EDF3;margin-bottom:16px;box-sizing:border-box" oninput="clFiltrar(this.value)">';
    html+='<div id="clform" style="display:none"></div>';
    if(!clientes.length){html+='<div class="empty">Sin clientes registrados.</div></div>';el.innerHTML=html;return}
    html+='<div style="overflow-x:auto"><table><thead><tr><th>Código</th><th>Nombre</th><th>Apodo</th><th>Teléfono</th><th>Dirección</th><th>Contraseña</th><th>Facebook</th><th style="text-align:right">Coins</th><th style="text-align:right">Gastado</th><th></th></tr></thead><tbody id="cltbody">';
    clientes.forEach(function(c){
      html+='<tr data-search="'+(c.nombre||"")+" "+(c.codigo||"")+" "+(c.telefono||"")+'"><td style="color:#C084FC;font-weight:700">'+c.codigo+'</td>';
      html+='<td style="font-weight:600">'+c.nombre+(c.apodo?'<br><span style="font-size:10px;color:#8B949E">"'+c.apodo+'"</span>':"")+'</td>';
      html+='<td style="color:#4A9EFF">'+c.telefono+'</td>';
      html+='<td style="color:#8B949E;max-width:150px;overflow:hidden;text-overflow:ellipsis">'+(c.direccion||"")+'</td>';
      html+='<td style="color:#FB923C;font-family:monospace">'+(c.password||"")+'</td>';
      html+='<td>'+(c.facebook?'<a href="'+c.facebook+'" target="_blank" style="font-size:11px;color:#4A9EFF">Ver perfil</a>':"—")+'</td>';
      html+='<td style="text-align:right;color:#E3B341;font-weight:700">'+(c.coins>0?"🪙 "+c.coins:"—")+'</td>';
      html+='<td style="text-align:right;color:#00C896;font-weight:700">'+fmt(c.gastado||0)+'</td>';
      html+='<td><div style="display:flex;gap:6px"><button class="btn btn-o btn-s" style="border-color:#4A9EFF;color:#4A9EFF" onclick="clEdit('+c.id+')">editar</button><button class="btn btn-o btn-s" style="border-color:#E3B341;color:#E3B341" onclick="clOpenCoins('+c.id+')">🪙</button></div></td></tr>';
    });
    html+='</tbody></table></div></div>';
    el.innerHTML=html;
  }
  window.clFiltrar=function(q){
    var rows=document.querySelectorAll("#cltbody tr");
    rows.forEach(function(r){r.style.display=(r.dataset.search||"").toLowerCase().indexOf(q.toLowerCase())>=0?"":"none"});
  };
  window.clNuevo=function(){clForm(null)};
  window.clEdit=function(id){clForm(clientes.find(function(c){return c.id===id}))};
  window.clOpenCoins=function(id){
    var ce=clientes.find(function(x){return x.id===id||x.id===parseInt(id)});
    if(ce)clCoins(ce);
    else{
      sGET("clientes","id=eq."+id).then(function(rows){
        if(rows&&rows[0])clCoins(rows[0]);
      });
    }
  };
  function clCoins(ce){
    // Show coins history and allow add/remove
    var html='<div class="mod"><div style="display:flex;justify-content:space-between;margin-bottom:20px">';
    html+='<div><h1 style="font-size:18px;font-weight:700">🪙 Coins — '+ce.nombre+'</h1><p style="color:#8B949E;font-size:11px;margin-top:3px">'+bdg(ce.codigo,"#C084FC")+' · Saldo actual: <span style="color:#E3B341;font-weight:700">'+( ce.coins||0)+' coins</span></p></div>';
    html+='<button class="btn btn-g" onclick="goMod(&apos;clientes&apos;)">← Volver</button></div>';
    // Historial
    var hist=[];try{hist=JSON.parse(ce.coins_historial||"[]")}catch(e){}
    html+='<div class="grid2">';
    // Form para agregar/quitar
    html+='<div class="card"><div style="font-size:10px;color:#8B949E;letter-spacing:.12em;margin-bottom:12px">AGREGAR / QUITAR COINS</div>';
    html+='<div class="fi"><label>CANTIDAD</label><input id="cqcant" type="number" value="0" min="1"></div>';
    html+='<div class="fi"><label>CONCEPTO</label><input id="cqconc" type="text" placeholder="Ej: Compra, Bono, Ajuste..."></div>';
    html+='<div style="display:flex;gap:8px;margin-top:8px">';
    html+='<button class="btn btn-p" style="flex:1" id="coinsbtn_add">+ Agregar</button>';
    html+='<button class="btn btn-o" style="flex:1;border-color:#F85149;color:#F85149" id="coinsbtn_sub">− Quitar</button>';
    html+='</div></div>';
    // Historial
    html+='<div class="card"><div style="font-size:10px;color:#8B949E;letter-spacing:.12em;margin-bottom:12px">HISTORIAL</div>';
    if(!hist.length){html+='<div style="color:#8B949E;font-size:12px">Sin movimientos de coins.</div>'}
    else{
      hist.slice().reverse().forEach(function(h){
        html+='<div style="display:flex;justify-content:space-between;font-size:12px;padding:6px 0;border-bottom:1px solid #30363D">';
        html+='<div><span style="color:'+(h.op==="add"?"#00C896":"#F85149")+';font-weight:700">'+(h.op==="add"?"+":"-")+h.cant+' coins</span><span style="color:#8B949E;margin-left:8px">'+h.conc+'</span></div>';
        html+='<span style="color:#8B949E;font-size:10px">'+h.fecha+'</span></div>';
      });
    }
    html+='</div></div></div>';
    el.innerHTML=html;
    function wireCoins(){
      var badd=document.getElementById("coinsbtn_add");
      var bsub=document.getElementById("coinsbtn_sub");
      if(badd)badd.onclick=function(){doCoinsOp("add")};
      if(bsub)bsub.onclick=function(){doCoinsOp("sub")};
    }
    function doCoinsOp(op){
      var cant=parseInt((document.getElementById("cqcant")||{}).value)||0;
      var conc=(document.getElementById("cqconc")||{}).value||"Ajuste";
      var actual=ce.coins||0;
      if(cant<=0){alert("Ingresa una cantidad mayor a 0");return}
      var nuevo=op==="add"?actual+cant:Math.max(0,actual-cant);
      var hist2=[];try{hist2=JSON.parse(ce.coins_historial||"[]")}catch(e){}
      hist2.push({op:op,cant:cant,conc:conc,saldo:nuevo,fecha:new Date().toLocaleDateString("es-MX")});
      sPATCH("clientes","id=eq."+ce.id,{coins:nuevo,coins_historial:JSON.stringify(hist2)}).then(function(){
        ce.coins=nuevo;ce.coins_historial=JSON.stringify(hist2);
        // Update in local clientes array too
        if(typeof clientes!=="undefined"){
          var idx=clientes.findIndex(function(x){return x.id===ce.id});
          if(idx>=0){clientes[idx].coins=nuevo;clientes[idx].coins_historial=JSON.stringify(hist2)}
        }
        toast((op==="add"?"+":"-")+cant+" coins → saldo: "+nuevo);
        clCoins(ce);
      });
    }
    wireCoins();
    window.coinsOp=function(op,cid,actual){
// handled by doCoinsOp
    };
  }
  function clForm(ce){
    var esEd=!!ce;
    var html='<div class="mod"><div style="display:flex;justify-content:space-between;margin-bottom:20px"><h1 style="font-size:18px;font-weight:700">'+(esEd?"Editar":"Nuevo")+' Cliente</h1><button class="btn btn-g" onclick="goMod(\'clientes\')">← Cancelar</button></div>';
    html+='<div class="grid2 card">';
    html+=fi("NOMBRE *",'<input id="clnom" type="text" value="'+(esEd?ce.nombre||"":"")+'" autofocus>');
    html+=fi("APODO",'<input id="clap" type="text" value="'+(esEd?ce.apodo||"":"")+'">');
    html+=fi("TELÉFONO *",'<input id="cltel" type="tel" value="'+(esEd?ce.telefono||"":"")+'">');
    html+=fi("DIRECCIÓN",'<input id="cldir" type="text" value="'+(esEd?ce.direccion||"":"")+'">');
    html+=fi("FACEBOOK",'<input id="clfb" type="text" value="'+(esEd?ce.facebook||"":"")+'">');
    html+=fi("CONTRASEÑA",'<input id="clpw" type="text" value="'+(esEd?ce.password||"":"")+'">');
    html+='</div>';
    html+='<div style="display:flex;gap:10px;margin-top:16px"><button class="btn btn-g" onclick="goMod(\'clientes\')">Cancelar</button><button class="btn btn-p" onclick="clGuardar('+(esEd?ce.id:"null")+')">'+(esEd?"Actualizar →":"Guardar →")+'</button></div></div>';
    el.innerHTML=html;
    window.clGuardar=function(cid){
      var nom=($("clnom")||{}).value||"";
      var tel=($("cltel")||{}).value||"";
      if(!nom.trim()){alert("Ingresa el nombre");return}
      if(!tel.trim()){alert("Ingresa el teléfono");return}
      var body;
      if(cid){
        body={nombre:nom.trim(),apodo:($("clap")||{}).value||"",telefono:tel.trim(),direccion:($("cldir")||{}).value||"",facebook:($("clfb")||{}).value||"",password:($("clpw")||{}).value||""};
        sPATCH("clientes","id=eq."+cid,body).then(function(){load();goMod("clientes");toast("Cliente actualizado")});
      } else {
        var maxCod=0;clientes.forEach(function(x){var n=parseInt((x.codigo||"CLI000").replace("CLI",""));if(n>maxCod)maxCod=n});
        var num=maxCod+1;var codigo="CLI"+(num<10?"00":num<100?"0":"")+num;
        body={codigo:codigo,nombre:nom.trim(),apodo:($("clap")||{}).value||"",telefono:tel.trim().replace(/\D/g,"").slice(-10),direccion:($("cldir")||{}).value||"",facebook:($("clfb")||{}).value||"",password:($("clpw")||{}).value||"",coins:0,gastado:0,pedidos_count:0};
        sPOST("clientes",body).then(function(){load();goMod("clientes");toast("Cliente "+codigo+" registrado")});
      }
    };
  }
  load();
}

/* ── REPORTES ────────────────────────────────────────────────────────── */
function rReportes(el){
  var ventas=[],movs=[],inv=[];
  var tabActual=0;
  var hoyDate=new Date(),anio=String(hoyDate.getFullYear()),mes=String(hoyDate.getMonth()+1),dia="";
  var fechaDesde="",fechaHasta="",modoFiltro="mes"; // mes|semana|dia|rango
  var comprasRep=[], movsRep=[];
  var enviosRep=[], prodRepLotes=[], lotesRep=[];
  function load(){
    Promise.all([
      sGET("ventas","order=ticket"),
      sGET("movimientos","order=fecha"),
      sGET("compras","order=num_compra"),
      sGET("envios","order=num_envio"),
      sGET("produccion","order=id"),
      sGET("lotes","order=fecha,id")
    ]).then(function(res){
      ventas=Array.isArray(res[0])?res[0]:[];
      movs=Array.isArray(res[1])?res[1]:[];
      comprasRep=Array.isArray(res[2])?res[2]:[];
      enviosRep=Array.isArray(res[3])?res[3]:[];
      prodRepLotes=Array.isArray(res[4])?res[4]:[];
      lotesRep=Array.isArray(res[5])?res[5]:[];
      // Calcular inventario real
      var stock={};
      function ensR(n,t,cu){if(!stock[n])stock[n]={tipo:t||"insumo",cantidad:0,cu:cu||0};}
      comprasRep.forEach(function(co){
        if(co.tipo_inv==="servicio")return;
        var lineas=co.lineas&&co.lineas.length?co.lineas:[{nombre:co.producto_nombre,tipo_inv:co.tipo_inv,cantidad:parseFloat(co.cantidad)||0,pu:parseFloat(co.pu)||0}];
        lineas.forEach(function(l){if(!l.nombre)return;ensR(l.nombre,l.tipo_inv,parseFloat(l.pu)||0);stock[l.nombre].cantidad+=parseFloat(l.cantidad)||0;if(parseFloat(l.pu)>0)stock[l.nombre].cu=parseFloat(l.pu);});
      });
      prodRepLotes.forEach(function(p){
        if(p.producto_nombre&&p.piezas){ensR(p.producto_nombre,"terminado",parseFloat(p.costo_unitario)||0);stock[p.producto_nombre].cantidad+=parseFloat(p.piezas)||0;if(parseFloat(p.costo_unitario)>0)stock[p.producto_nombre].cu=parseFloat(p.costo_unitario);}
        (Array.isArray(p.insumos)?p.insumos:[]).forEach(function(ins){var n=ins.nombre;if(!n)return;ensR(n,"insumo",0);stock[n].cantidad-=parseFloat(ins.cant||ins.cantidad||0);});
      });
      ventas.forEach(function(v){
        (Array.isArray(v.lineas)?v.lineas:[]).forEach(function(l){var n=l.desc||l.nombre;if(!n)return;ensR(n,"terminado",0);stock[n].cantidad-=parseFloat(l.cant||l.cantidad||0);});
      });
      inv=Object.keys(stock).map(function(n){var s=stock[n];return{nombre:n,tipo:s.tipo,cantidad:Math.max(0,s.cantidad),costo_unit:s.cu,costo_total:Math.max(0,s.cantidad)*s.cu};});
      renderRep();
    });
  }
  var TABS=["Estado de Resultados","Balance General","Flujo de Efectivo","KPIs","Clientes Deudores","Pasivos"];

  var diasEnMes=new Date(parseInt(anio),parseInt(mes),0).getDate();
  var si="background:#0D1117;border:1px solid #30363D;border-radius:2px;padding:8px 10px;font-size:12px;color:#E6EDF3";

  function getWeekRange(){
    var d=new Date();var day=d.getDay()||7;
    var mon=new Date(d);mon.setDate(d.getDate()-day+1);
    var sun=new Date(mon);sun.setDate(mon.getDate()+6);
    return{desde:mon.toISOString().slice(0,10),hasta:sun.toISOString().slice(0,10)};
  }

  function buildFilterUI(){
    var w=getWeekRange();
    return '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">'+
      '<select id="ranio" onchange="setAnio(this.value)" style="'+si+'">'+
        ['2025','2026','2027'].map(function(y){return'<option value="'+y+'"'+(anio===y?' selected':'')+'>'+y+'</option>'}).join('')+
      '</select>'+
      '<select id="rmes" onchange="setMes(this.value)" style="'+si+'">'+
        '<option value="">Año completo</option>'+
        MESES.map(function(m,i){return'<option value="'+(i+1)+'"'+(String(i+1)===mes?' selected':'')+'>'+m+'</option>'}).join('')+
      '</select>'+
      '<select id="rmodo" onchange="setModo(this.value)" style="'+si+'">'+
        '<option value="mes"'+(modoFiltro==='mes'?' selected':'')+'>Mes completo</option>'+
        '<option value="semana"'+(modoFiltro==='semana'?' selected':'')+'>Esta semana</option>'+
        '<option value="dia"'+(modoFiltro==='dia'?' selected':'')+'>Día específico</option>'+
        '<option value="rango"'+(modoFiltro==='rango'?' selected':'')+'>Rango de fechas</option>'+
      '</select>'+
      (modoFiltro==='dia'?'<input type="date" id="rfechaD" value="'+(fechaDesde||new Date().toISOString().slice(0,10))+'" onchange="setFechaD(this.value)" style="'+si+'">':'')+
      (modoFiltro==='rango'?
        '<input type="date" id="rfechaDesde" value="'+(fechaDesde||'')+'" onchange="setDesde(this.value)" style="'+si+'"> <span style="color:#8B949E">→</span> <input type="date" id="rfechaHasta" value="'+(fechaHasta||'')+'" onchange="setHasta(this.value)" style="'+si+'">':'')+
      (modoFiltro==='semana'?'<span style="font-size:11px;color:#8B949E">'+w.desde+' — '+w.hasta+'</span>':'')+
      '</div>';
  }

  el.innerHTML='<div class="mod"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px"><h1 style="font-size:18px;font-weight:700">Reportes</h1><div id="filtros-rep">'+buildFilterUI()+'</div></div><div class="tab-nav" id="rtabs"></div><div id="rcont"><div class="spin">Cargando...</div></div></div>';

  var rtabs=$("rtabs");
  rtabs.innerHTML=TABS.map(function(t,i){return'<button class="tab-btn"'+(i===0?' class="tab-btn on"':'')+' onclick="rTab('+i+')">'+t+'</button>'}).join("");
  document.querySelectorAll(".tab-btn")[0].classList.add("on");

  window.rTab=function(i){tabActual=i;document.querySelectorAll(".tab-btn").forEach(function(b,j){b.className="tab-btn"+(j===i?" on":"")});renderRep();};
  window.setAnio=function(v){anio=v;renderRep();};
  window.setMes=function(v){mes=v;renderRep();};
  window.setModo=function(v){
    modoFiltro=v;
    if(v==='semana'){var w=getWeekRange();fechaDesde=w.desde;fechaHasta=w.hasta;}
    document.getElementById('filtros-rep').innerHTML=buildFilterUI();
    renderRep();
  };
  window.setFechaD=function(v){fechaDesde=v;fechaHasta=v;dia=v.slice(8,10);anio=v.slice(0,4);mes=v.slice(5,7);renderRep();};
  window.setDesde=function(v){fechaDesde=v;renderRep();};
  window.setHasta=function(v){fechaHasta=v;renderRep();};
  window.setDia=function(v){dia=v;renderRep();};

  function calc(){
    var ai=parseInt(anio),mi=parseInt(mes)||0,di=parseInt(dia)||0;
    function inRango(fecha){
      if(!fecha)return false;
      if(modoFiltro==='rango'||modoFiltro==='semana'){
        if(fechaDesde&&fecha<fechaDesde)return false;
        if(fechaHasta&&fecha>fechaHasta)return false;
        return true;
      }
      if(modoFiltro==='dia')return fecha===fechaDesde;
      var a=parseInt(fecha.slice(0,4)),m2=parseInt(fecha.slice(5,7)),d2=parseInt(fecha.slice(8,10));
      return a===ai&&(!mi||m2===mi)&&(!di||d2===di);
    }
    var vF=ventas.filter(function(v){return inRango(v.fecha);});
    var mF=movs.filter(function(m){return inRango(m.fecha);});

    // ── ESTADO DE RESULTADOS ──────────────────────────────────────────
    var vTot=vF.reduce(function(a,v){return a+parseFloat(v.monto_venta||0);},0);
    // Costo de ventas: desde lotes de salida tipo venta — misma fuente que el inventario
    var ticketsDelPeriodo=new Set(vF.map(function(v){return String(v.ticket);}));
    var cVen=lotesRep.filter(function(lt){
      if(lt.movimiento!=="salida"||lt.tipo!=="venta")return false;
      var ref=lt.num_ref?String(lt.num_ref).replace("V-",""):"";
      return ref&&ticketsDelPeriodo.has(ref);
    }).reduce(function(a,lt){
      return a+parseFloat(lt.cantidad||0)*parseFloat(lt.costo_unit||0);
    },0);
    var uBruta=vTot-cVen;
    // Gastos = TODOS los egresos excepto Pago Proveedores (ese es pasivo, no gasto operativo)
    var gastosSoloGastos=mF.filter(function(m){
      return m.egreso&&m.movimiento!=="Pago Proveedores"&&m.movimiento!=="Inversion";
    });
    var gastos=gastosSoloGastos.reduce(function(a,m){return a+parseFloat(m.monto||0);},0);
    var gastosMap={};
    gastosSoloGastos.forEach(function(m){
      var k=(m.concepto&&m.concepto.trim()&&m.concepto!==m.movimiento)?m.concepto.trim():m.movimiento;
      gastosMap[k]=(gastosMap[k]||0)+parseFloat(m.monto||0);
    });
    // Agregar envios del periodo como gasto devengado (aunque no se haya pagado)
    var enviosDelPeriodo=enviosRep.filter(function(e){
      var a=parseInt((e.fecha||"").slice(0,4)),m2=parseInt((e.fecha||"").slice(5,7)),d2=parseInt((e.fecha||"").slice(8,10));
      return a===ai&&(!mi||m2===mi)&&(!di||d2===di)&&parseFloat(e.costo_total||0)>0;
    });
    var gastoEnvios=enviosDelPeriodo.reduce(function(a,e){return a+parseFloat(e.costo_total||0);},0);
    if(gastoEnvios>0){gastosMap["Envíos / Repartidores"]=(gastosMap["Envíos / Repartidores"]||0)+gastoEnvios;}
    gastos+=gastoEnvios;
    var gastosDetalle=Object.keys(gastosMap).map(function(k){return{concepto:k,monto:gastosMap[k]};});
    var uNeta=uBruta-gastos;
    var cobros=mF.filter(function(m){return !m.egreso&&m.movimiento==="Venta";}).reduce(function(a,m){return a+parseFloat(m.monto||0);},0);
    var gOp=gastos;

    // ── BALANCE GENERAL ───────────────────────────────────────────────
    // Saldos de cuentas (todos los movimientos, no solo del periodo)
    var saldos={};CUENTAS.forEach(function(ct){saldos[ct.id]=0;});
    movs.forEach(function(m){saldos[m.cuenta_id]=(saldos[m.cuenta_id]||0)+(m.egreso?-parseFloat(m.monto||0):parseFloat(m.monto||0));});
    var efec=CUENTAS.reduce(function(a,ct){return a+Math.max(0,saldos[ct.id]||0);},0);
    var porCobrar=ventas.reduce(function(a,v){return a+parseFloat(v.adeudo||0);},0);
    // valInv — lógica idéntica a pestaña Inventario (todos los tipos, mismos campos)
    var stockBal={};
    CATALOGO_SKU.forEach(function(s){
      if(!stockBal[s.sku])stockBal[s.sku]={cantidad:0,costoUnit:0};
    });
    lotesRep.forEach(function(lt){
      if(!lt.sku)return;
      var ci=CATALOGO_SKU.find(function(s){return s.sku===lt.sku;});
      if(!stockBal[lt.sku])stockBal[lt.sku]={cantidad:0,costoUnit:0};
      var cant=parseFloat(lt.cantidad)||0;
      var cu=parseFloat(lt.costo_unit)||0;
      if(lt.movimiento==="entrada"){
        stockBal[lt.sku].cantidad+=cant;
        if(cu>0)stockBal[lt.sku].costoUnit=cu;
      } else {
        stockBal[lt.sku].cantidad-=cant;
      }
    });
    var valInv=Object.keys(stockBal).reduce(function(a,sku){
      var s=stockBal[sku];
      var val=s.cantidad>0?Math.max(0,s.cantidad)*s.costoUnit:0;
      return a+val;
    },0);
    var activos=efec+porCobrar+valInv;

    // Inversión socios (todos los movs)
    var inv2=movs.filter(function(m){return !m.egreso&&m.movimiento==="Inversion";}).reduce(function(a,m){return a+parseFloat(m.monto||0);},0);

    // Deuda proveedores (compras sin pagar, excluye servicios)
    var pagosMapP={};
    movs.forEach(function(m){
      if(m.movimiento==="Pago Proveedores"&&m.egreso){
        var txt=m.gasto_ticket||"";
        // Extraer todos los "Compra #N: $X" del texto
        var re=/Compra #(\d+)[^$]*\$([\d,]+\.?\d*)/g;
        var match;
        var encontrados=false;
        while((match=re.exec(txt))!==null){
          var n=parseInt(match[1]);
          var monto=parseFloat(match[2].replace(/,/g,""))||0;
          pagosMapP[n]=(pagosMapP[n]||0)+monto;
          encontrados=true;
        }
        // Si no encontró referencias específicas, aplicar monto total al movimiento
        if(!encontrados){
          // Intentar encontrar cualquier número de compra mencionado
          var reNum=/Compra #(\d+)/g;
          var nums=[];
          while((match=reNum.exec(txt))!==null) nums.push(parseInt(match[1]));
          if(nums.length===1){
            pagosMapP[nums[0]]=(pagosMapP[nums[0]]||0)+parseFloat(m.monto||0);
          }
        }
      }
    });
    // Agrupar compras por num_compra (igual que pestaña Compras)
    var gruposCompra={};
    comprasRep.forEach(function(co){
      if(co.tipo_inv==="servicio")return;
      var n=co.num_compra;
      if(!gruposCompra[n])gruposCompra[n]=0;
      gruposCompra[n]+=parseFloat(co.total||0);
    });
    var deudaProv=0;
    Object.keys(gruposCompra).forEach(function(n){
      var totalCompra=gruposCompra[n];
      var pagado=pagosMapP[parseInt(n)]||0;
      var ad=Math.max(0,totalCompra-pagado);
      if(ad>0.01)deudaProv+=ad;
    });

    // Deuda repartidores — desde envios directamente
    var pagosRepMovs=movs.filter(function(m){return m.movimiento==="Pago Repartidores"&&m.egreso;});
    var totalPagadoRep=pagosRepMovs.reduce(function(a,m){return a+parseFloat(m.monto||0);},0);
    var totalDeudaEnvios=enviosRep.reduce(function(a,e){return a+parseFloat(e.costo_total||0);},0);
    var deudaRep=Math.max(0,totalDeudaEnvios-totalPagadoRep);

    var totalPasivos=inv2+deudaProv+deudaRep;
    // ganancia del Balance = Activos - Pasivos (ecuación contable)
    // uNeta del Estado de Resultados = uBruta - gastos del periodo
    // Pueden diferir si hay gastos fuera del periodo — ambos son correctos en su contexto
    var gananciaBalance=activos-totalPasivos;

    return{vTot:vTot,cVen:cVen,uBruta:uBruta,gastos:gastos,gastosDetalle:gastosDetalle,uNeta:uNeta,cobros:cobros,gOp:gOp,
           inv2:inv2,deudaProv:deudaProv,deudaRep:deudaRep,porCobrar:porCobrar,valInv:valInv,
           saldos:saldos,efec:efec,activos:activos,pasivos:totalPasivos,ganancia:gananciaBalance,
           flujoOp:cobros-gOp,flujoNeto:cobros-gOp+inv2,vF:vF,ventas:ventas};
  }
  function kbox(l,v,c){return'<div style="background:#21262D;border:1px solid #30363D;border-radius:2px;padding:16px"><div style="font-size:9px;color:#8B949E;letter-spacing:.1em;margin-bottom:6px">'+l+'</div><div style="font-size:18px;font-weight:700;color:'+(c||"#E6EDF3")+'">'+v+'</div></div>'}

  function renderRep(){
    var rc=$("rcont");if(!rc)return;
    var d=calc();
    var pLabel=dia&&mes?(MESES[parseInt(mes)-1]+" "+dia+", "+anio):(mes?MESES[parseInt(mes)-1]+" "+anio:"AÑO "+anio);
    var html="";
    if(tabActual===0){
      html='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px">'+kbox("VENTAS",fmt(d.vTot))+kbox("UTIL. BRUTA",fmt(d.uBruta),"#00C896")+kbox("UTIL. NETA",fmt(d.uNeta),d.uNeta>=0?"#00C896":"#F85149")+'</div>';
      html+='<div class="card"><div style="font-size:10px;color:#8B949E;letter-spacing:.12em;margin-bottom:12px">ESTADO DE RESULTADOS — '+pLabel+'</div>';
      html+=srow("Ventas",fmt(d.vTot));
      html+=srow("(-) Costo de Ventas",fmt(d.cVen),"#8B949E");
      html+='<div style="margin:4px 0 8px 12px">';
      d.vF.forEach(function(v){
        var costoV=lotesRep.filter(function(lt){
          return lt.movimiento==="salida"&&lt.tipo==="venta"&&lt.num_ref===("V-"+v.ticket);
        }).reduce(function(a,lt){
          return a+parseFloat(lt.cantidad||0)*parseFloat(lt.costo_unit||0);
        },0);
        html+=srow("  #"+v.ticket+" "+(v.cliente_nombre||""),fmt(costoV),"#4A9EFF");
      });
      html+='</div>';
      html+='<div style="height:1px;background:#30363D;margin:8px 0"></div>';
      html+=srow("UTILIDAD BRUTA",fmt(d.uBruta),d.uBruta>=0?"#00C896":"#F85149",true);
      // Detalle de gastos
      if(d.gastosDetalle&&d.gastosDetalle.length){
        html+='<div style="margin:8px 0 4px 0;font-size:10px;color:#8B949E;letter-spacing:.08em">GASTOS:</div>';
        d.gastosDetalle.forEach(function(g){html+=srow(g.concepto||g.movimiento,fmt(g.monto),"#8B949E");});
      }
      html+=srow("(-) Total Gastos",fmt(d.gastos),"#8B949E")+'<div style="height:1px;background:#30363D;margin:8px 0"></div>';
      html+=srow("UTILIDAD NETA",fmt(d.uNeta),d.uNeta>=0?"#00C896":"#F85149",true)+'<div style="font-size:11px;color:#8B949E;margin-top:8px">Margen: '+(d.vTot>0?(d.uNeta/d.vTot*100).toFixed(1)+"%":"—")+'</div></div>';
      rc.innerHTML=html;
    } else if(tabActual===1){
      var patrimonio=d.activos-d.pasivos;
      html='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px">'+kbox("ACTIVOS",fmt(d.activos),"#4A9EFF")+kbox("PASIVOS",fmt(d.pasivos),"#FB923C")+kbox("PATRIMONIO",fmt(patrimonio),patrimonio>=0?"#00C896":"#F85149")+'</div>';
      html+='<div class="grid2">';
      html+='<div class="card"><div style="font-size:10px;color:#8B949E;letter-spacing:.12em;margin-bottom:12px">ACTIVOS</div>';
      CUENTAS.forEach(function(c){html+=srow(c.n,fmt(Math.max(0,d.saldos[c.id]||0)))});
      html+=srow("Por cobrar",fmt(d.porCobrar),"#FB923C")+srow("Inventario",fmt(d.valInv))+'<div style="height:1px;background:#30363D;margin:8px 0"></div>'+srow("TOTAL ACTIVOS",fmt(d.activos),"#4A9EFF",true)+'</div>';
      html+='<div class="card"><div style="font-size:10px;color:#8B949E;letter-spacing:.12em;margin-bottom:12px">PASIVOS Y CAPITAL</div>';
      html+=srow("Inversión socios",fmt(d.inv2),"#FB923C");
      html+=srow("Deuda proveedores",fmt(d.deudaProv),d.deudaProv>0?"#F85149":"#8B949E");
      html+=srow("Deuda repartidores",fmt(d.deudaRep),d.deudaRep>0?"#F85149":"#8B949E");
      html+='<div style="height:1px;background:#30363D;margin:8px 0"></div>'+srow("TOTAL PASIVOS",fmt(d.pasivos),"#F85149",true);
      html+='<div style="height:1px;background:#30363D;margin:8px 0"></div>';
      html+=srow("PATRIMONIO (Activos − Pasivos)",fmt(patrimonio),patrimonio>=0?"#00C896":"#F85149",true);
      html+=srow("UTIL. NETA P&L (periodo)",fmt(d.uNeta),d.uNeta>=0?"#00C896":"#F85149",true);
      var diff=patrimonio-d.uNeta;
      if(Math.abs(diff)>0.5){
        html+=srow("Variación de valuación inventario",fmt(Math.abs(diff)),"#E3B341",false);
      }
      html+='</div></div>';
      rc.innerHTML=html;
    } else if(tabActual===2){
      html='<div class="card"><div style="font-size:10px;color:#8B949E;letter-spacing:.12em;margin-bottom:12px">FLUJO DE EFECTIVO — '+pLabel+'</div>';
      html+=srow("Cobros de ventas",fmt(d.cobros),"#00C896")+srow("(-) Gastos operativos",fmt(d.gOp),"#8B949E")+'<div style="height:1px;background:#30363D;margin:8px 0"></div>';
      html+=srow("FLUJO OPERATIVO",fmt(d.flujoOp),d.flujoOp>=0?"#00C896":"#F85149",true)+srow("(+) Inversiones",fmt(d.inv2),"#4A9EFF")+'<div style="height:1px;background:#30363D;margin:8px 0"></div>';
      html+=srow("FLUJO NETO",fmt(d.flujoNeto),d.flujoNeto>=0?"#00C896":"#F85149",true)+'</div>';
      rc.innerHTML=html;
    } else if(tabActual===3){
      html='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">';
      [{l:"VENTAS",v:fmt(d.vTot)},{l:"COSTO",v:fmt(d.cVen),c:"#8B949E"},{l:"UTIL. BRUTA",v:fmt(d.uBruta),c:"#00C896"},{l:"GASTOS",v:fmt(d.gastos),c:"#F85149"},{l:"UTIL. NETA",v:fmt(d.uNeta),c:d.uNeta>=0?"#00C896":"#F85149"},{l:"MARGEN",v:d.vTot>0?(d.uNeta/d.vTot*100).toFixed(1)+"%":"—",c:"#E3B341"},{l:"COBRADO",v:fmt(d.cobros),c:"#00C896"},{l:"POR COBRAR",v:fmt(d.porCobrar),c:"#FB923C"},{l:"TICKETS",v:d.vF.length,c:"#4A9EFF"}].forEach(function(k){html+=kbox(k.l,k.v,k.c)});
      html+='</div>';
      rc.innerHTML=html;
    } else if(tabActual===4){
      var deudores=d.ventas.filter(function(v){return parseFloat(v.adeudo||0)>0}).sort(function(a,b){return parseFloat(b.adeudo)-parseFloat(a.adeudo)});
      html='<div style="margin-bottom:12px;font-size:12px;color:#8B949E">Total por cobrar: <span style="color:#FB923C;font-weight:700">'+fmt(d.porCobrar)+'</span></div>';
      if(!deudores.length){html+='<div class="empty">Sin deudores ✓</div>'}
      else{html+='<table><thead><tr><th>Cliente</th><th>Ticket</th><th style="text-align:right">Monto</th><th style="text-align:right">Adeudo</th></tr></thead><tbody>';deudores.forEach(function(v){html+='<tr><td>'+v.cliente_nombre+'</td><td style="color:#4A9EFF;font-weight:700">#'+v.ticket+'</td><td style="text-align:right">'+fmt(v.monto_venta)+'</td><td style="text-align:right;color:#FB923C;font-weight:700">'+fmt(v.adeudo)+'</td></tr>'});html+='</tbody></table>'}
      rc.innerHTML=html;
    } else {
      // Pasivos: proveedores con deuda (synchronous using preloaded data)
      // Also load envios for repartidor debt
      sGET("envios","order=num_envio").then(function(enviosAll){
      enviosAll=Array.isArray(enviosAll)?enviosAll:[];
      // Pagos a proveedores (compras normales)
      var pagosMap={};
      movs.forEach(function(m){
        if(m.movimiento==="Pago Proveedores"&&m.egreso){
          var _re=/Compra #(\d+)[^$]*\$([\d,]+\.?\d*)/g,_mt;
          while((_mt=_re.exec(m.gasto_ticket||""))!==null){var n=parseInt(_mt[1]);var monto=parseFloat(_mt[2].replace(/,/g,""))||0;pagosMap[n]=(pagosMap[n]||0)+monto;}
        }
      });
      // Pagos a repartidores (compras tipo servicio)
      var pagosRepMap={};
      movs.forEach(function(m){
        if(m.movimiento==="Pago Repartidores"&&m.egreso){
          var _re=/Compra #(\d+)[^$]*\$([\d,]+\.?\d*)/g,_mt;
          while((_mt=_re.exec(m.gasto_ticket||""))!==null){var n=parseInt(_mt[1]);var monto=parseFloat(_mt[2].replace(/,/g,""))||0;pagosRepMap[n]=(pagosRepMap[n]||0)+monto;}
        }
      });
      // Build repartidor debt from envios directly (si se borra envio desaparece)
      var totalPagadoReps=movs.filter(function(m){return m.movimiento==="Pago Repartidores"&&m.egreso;}).reduce(function(a,m){return a+parseFloat(m.monto||0);},0);
      var repDeuda={};
      enviosAll.filter(function(e){return parseFloat(e.costo_total||0)>0;}).forEach(function(e){
        var rep=e.repartidor||"Sin nombre";
        var costo=parseFloat(e.costo_total||0);
        if(!repDeuda[rep])repDeuda[rep]={adeudo:0,rutas:[]};
        repDeuda[rep].rutas.push({num:e.num_envio,ruta:e.num_envio,fecha:e.fecha,costo:costo,pagado:0,adeudo:costo,peds:(e.pedidos||[]).length});
      });
      // Subtract payments proportionally
      var totalEnviosCosto=enviosAll.reduce(function(a,e){return a+parseFloat(e.costo_total||0);},0);
      if(totalPagadoReps>0&&totalEnviosCosto>0){
        Object.keys(repDeuda).forEach(function(rep){
          var propPagado=totalPagadoReps*(repDeuda[rep].rutas.reduce(function(a,r){return a+r.costo;},0)/totalEnviosCosto);
          repDeuda[rep].adeudo=Math.max(0,repDeuda[rep].rutas.reduce(function(a,r){return a+r.costo;},0)-propPagado);
        });
      } else {
        Object.keys(repDeuda).forEach(function(rep){
          repDeuda[rep].adeudo=repDeuda[rep].rutas.reduce(function(a,r){return a+r.costo;},0);
        });
      }
      // Remove reps with no debt
      Object.keys(repDeuda).forEach(function(rep){if(repDeuda[rep].adeudo<0.01)delete repDeuda[rep];});
      var provDeuda={};
      comprasRep.filter(function(co){return co.tipo_inv!=="servicio";}).forEach(function(co){
        var pagado=pagosMap[co.num_compra]||0;
        var adeudo=parseFloat(co.total||0)-pagado;
        if(adeudo>0.01){
          if(!provDeuda[co.proveedor])provDeuda[co.proveedor]={adeudo:0,compras:[]};
          provDeuda[co.proveedor].adeudo+=adeudo;
          provDeuda[co.proveedor].compras.push({num:co.num_compra,adeudo:adeudo,total:co.total});
        }
      });
      var provs=Object.keys(provDeuda);
      var totalDeuda=provs.reduce(function(a,p){return a+provDeuda[p].adeudo},0);
      html='<div class="grid2">';
      html+='<div class="card"><div style="font-size:10px;color:#8B949E;letter-spacing:.12em;margin-bottom:12px">PASIVOS CON PROVEEDORES</div>';
      if(!provs.length){html+='<div style="color:#8B949E;font-size:12px">Sin deudas con proveedores ✓</div>';}
      else{
        provs.forEach(function(prov){
          var info=provDeuda[prov];
          html+='<div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #30363D">';
          html+='<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-weight:700;color:#E6EDF3">'+prov+'</span><span style="color:#F85149;font-weight:700">'+fmt(info.adeudo)+'</span></div>';
          info.compras.forEach(function(co){
            html+='<div style="display:flex;justify-content:space-between;font-size:11px;color:#8B949E;padding:2px 0"><span>Compra #'+co.num+' · total '+fmt(co.total)+'</span><span style="color:#FB923C">debe '+fmt(co.adeudo)+'</span></div>';
          });
          html+='</div>';
        });
