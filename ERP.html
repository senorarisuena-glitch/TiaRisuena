<title>ERP · Sistema de Gestión</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0D1117;color:#E6EDF3;font-family:monospace;min-height:100vh}
input,select,textarea{font-family:monospace;outline:none;color:#E6EDF3}
button{cursor:pointer;font-family:monospace}
.sidebar{width:200px;background:#161B22;border-right:1px solid #30363D;position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;z-index:10}
.main{margin-left:200px;flex:1;overflow:auto}
.mod{padding:24px}
.card{background:#161B22;border:1px solid #30363D;border-radius:2px;padding:20px;margin-bottom:16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.fi{margin-bottom:14px}
.fi label{display:block;font-size:10px;color:#8B949E;letter-spacing:.1em;margin-bottom:5px}
.fi input,.fi select,.fi textarea{width:100%;background:#0D1117;border:1px solid #30363D;border-radius:2px;padding:9px 11px;font-size:13px}
.fi-ro{background:#21262D;border:1px solid #30363D;border-radius:2px;padding:9px 11px;font-size:13px;color:#8B949E}
.btn{padding:10px 20px;border-radius:2px;font-weight:700;font-size:13px;letter-spacing:.07em;border:none}
.btn-p{background:#00C896;color:#0D1117}
.btn-o{background:transparent;border:1px solid;font-weight:700;font-size:13px;border-radius:2px;padding:10px 20px}
.btn-g{background:transparent;border:none;color:#8B949E;font-weight:700;font-size:13px;padding:10px 20px}
.btn-s{padding:5px 12px;font-size:11px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:8px 10px;font-size:10px;color:#8B949E;letter-spacing:.08em;border-bottom:1px solid #30363D;text-align:left;font-weight:700}
td{padding:8px 10px;font-size:12px;border-bottom:1px solid #30363D;vertical-align:middle}
.badge{font-size:10px;padding:2px 8px;border-radius:2px;font-weight:600;display:inline-block}
.toast{position:fixed;top:20px;right:20px;z-index:999;background:#161B22;border-radius:3px;padding:10px 18px;font-size:12px;font-weight:700;box-shadow:0 4px 20px #0006;display:none}
.empty{background:#21262D;border:1px solid #30363D;border-radius:2px;padding:40px;text-align:center;color:#8B949E}
.spin{padding:40px;text-align:center;color:#8B949E}
.tab-nav{display:flex;border-bottom:1px solid #30363D;overflow-x:auto;margin-bottom:20px}
.tab-btn{padding:9px 14px;border:none;background:transparent;color:#8B949E;font-family:monospace;font-size:11px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.tab-btn.on{color:#E6EDF3;font-weight:700;border-bottom-color:#00C896;background:#21262D}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- LOGIN -->
<div class="login-wrap" id="login-page">
  <div style="background:#161B22;border:1px solid #30363D;border-radius:4px;padding:40px;width:360px;max-width:90vw">
    <div style="text-align:center;margin-bottom:32px">
      <div style="font-size:36px;color:#00C896;margin-bottom:8px">⬡</div>
      <div style="font-size:20px;font-weight:700">ERP · Sistema de Gestión</div>
    </div>
    <div class="fi"><label>USUARIO</label><input id="lu" type="text" autofocus></div>
    <div class="fi"><label>CONTRASEÑA</label><input id="lp" type="password" onkeydown="if(event.key=='Enter')doLogin()"></div>
    <div id="lerr" style="display:none;background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.4);border-radius:2px;padding:8px 12px;font-size:11px;color:#F85149;margin-bottom:14px"></div>
    <button class="btn btn-p" style="width:100%" onclick="doLogin()">Entrar →</button>

  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <div class="sidebar">
    <div style="padding:20px 16px;border-bottom:1px solid #30363D">
      <div style="font-size:14px;font-weight:700;color:#00C896">⬡ ERP</div>
      
    </div>
    <div id="sidenav" style="flex:1;overflow:auto;padding:8px 0"></div>
    <div style="padding:12px 16px;border-top:1px solid #30363D">
      <div id="uname" style="font-size:11px;font-weight:700"></div>
      <div id="ubadge" style="margin-top:4px"></div>
      <button onclick="doLogout()" style="margin-top:8px;background:transparent;border:1px solid #30363D;border-radius:2px;padding:4px 8px;color:#8B949E;font-family:monospace;font-size:10px">Cerrar sesión</button>
    </div>
  </div>
  <div class="main" id="main"></div>
</div>

        if(!p.sku&&!p.nombre)return;

        var catFixed=(p.categoria&&tipoVals.indexOf(p.categoria)<0)?p.categoria:"";
        var idx=CATALOGO_SKU.findIndex(function(s){return s.sku===(p.sku||p.nombre);});

      });
    }
    if(cb)cb();
  });
}

/* DB layer */
function dbg(t){try{return JSON.parse(localStorage.getItem("erp_"+t)||"[]")}catch(e){return[]}}
function dbs(t,r){localStorage.setItem("erp_"+t,JSON.stringify(r))}
function dbf(rows,q){
  if(!q)return rows;
  var parts=q.split("&").filter(function(p){return/^\w+=/.test(p)});
  if(!parts.length)return rows;
  return rows.filter(function(row){
    return parts.every(function(p){
      var m=p.match(/^(\w+)=(eq|gt|lt|neq|in)\.(.+)$/);
      if(!m)return true;
      var k=m[1],op=m[2],v=m[3],rv=row[k];
      if(op==="eq")return String(rv)===String(v);
      if(op==="gt")return+rv>+v;
      if(op==="lt")return+rv<+v;
      if(op==="neq")return String(rv)!==String(v);
      if(op==="in")return v.replace(/[()]/g,"").split(",").indexOf(String(rv))>=0;
      return true;
    });
  });
}
function dbsort(rows,q){
  var m=(q||"").match(/order=([\w.]+)/);
  if(!m)return rows;
  var fields=m[1].split(",").map(function(f){var p=f.split(".");return{k:p[0],d:p[1]||"asc"}});
  return rows.slice().sort(function(a,b){
    for(var i=0;i<fields.length;i++){
      var k=fields[i].k,d=fields[i].d;
      var av=a[k],bv=b[k];
      if(!isNaN(parseFloat(av))){av=parseFloat(av)||0;bv=parseFloat(bv)||0;}
      if(av!==bv)return d==="desc"?(av>bv?-1:1):(av>bv?1:-1);
    }
    return 0;
  });
}
function sGET(t,q){
  if(IS_PROD){
    return fetch(SU+"/rest/v1/"+t+(q?"?"+q:""),{headers:{"apikey":SK,"Authorization":"Bearer "+SK}}).then(function(r){return r.json()}).catch(function(){return[]});
  }
  return Promise.resolve(dbsort(dbf(dbg(t),q),q));
}
function sPOST(t,b){
  if(IS_PROD){
    return fetch(SU+"/rest/v1/"+t,{method:"POST",headers:{"apikey":SK,"Authorization":"Bearer "+SK,"Content-Type":"application/json","Prefer":"return=representation"},body:JSON.stringify(b)}).then(function(r){return r.json().then(function(d){if(r.ok)return d;console.error("POST "+t+" error:",d);toast("Error al guardar: "+(d.message||d.hint||JSON.stringify(d)),"err");return{};});}).catch(function(e){console.error(e);return{};});
  }
  var rows=dbg(t);
  // Dedup: for movimientos, check same fecha+monto+movimiento+cuenta within 2 seconds
  if(t==="movimientos"){
    var now=Date.now();
    var dup=rows.find(function(r){
      return r.fecha===b.fecha&&String(r.monto)===String(b.monto)&&
             r.movimiento===b.movimiento&&r.cuenta===b.cuenta&&
             (!r._ts||now-r._ts<2000);
    });
    if(dup)return Promise.resolve([dup]);
  }
  // Dedup for ventas: same ticket
  if(t==="ventas"&&b.ticket){
    if(rows.find(function(r){return r.ticket===b.ticket}))return Promise.resolve([rows.find(function(r){return r.ticket===b.ticket})]);
  }
  // Dedup for seguimientos: same pedido_ticket
  if(t==="seguimientos"&&b.pedido_ticket){
    if(rows.find(function(r){return r.pedido_ticket===b.pedido_ticket}))return Promise.resolve([rows.find(function(r){return r.pedido_ticket===b.pedido_ticket})]);
  }
  var nr=Object.assign({},b,{id:b.id||Date.now(),_ts:Date.now()});
  rows.push(nr);dbs(t,rows);
  return Promise.resolve([nr]);
}
function sPATCH(t,q,b){
  if(IS_PROD){
    return fetch(SU+"/rest/v1/"+t+"?"+q,{method:"PATCH",headers:{"apikey":SK,"Authorization":"Bearer "+SK,"Content-Type":"application/json"},body:JSON.stringify(b)}).then(function(r){return r.ok}).catch(function(){return false});
  }
  var rows=dbg(t),m=q.match(/^(\w+)=eq\.(.+)$/);
  if(m)rows=rows.map(function(r){return String(r[m[1]])===String(m[2])?Object.assign({},r,b):r});
  dbs(t,rows);return Promise.resolve(true);
}
function sDEL(t,q){
  if(IS_PROD){
    return fetch(SU+"/rest/v1/"+t+"?"+q,{method:"DELETE",headers:{"apikey":SK,"Authorization":"Bearer "+SK}}).then(function(r){return r.ok}).catch(function(){return false});
  }
  var rows=dbg(t),m=q.match(/^(\w+)=eq\.(.+)$/);
  if(m)rows=rows.filter(function(r){return String(r[m[1]])!==String(m[2])});
  dbs(t,rows);return Promise.resolve(true);
}

      html+='<div style="font-size:10px;color:#8B949E;letter-spacing:.1em;margin-bottom:10px;font-weight:700">RUTAS ACTIVAS ('+rutasPend.length+')</div>';
      if(!rutasPend.length)html+='<div class="empty">Sin rutas activas.</div>';
      else{
        rutasPend.forEach(function(e){
          var eColors={en_espera:"#C084FC",en_camino:"#4A9EFF"};
          var eIcons={en_espera:"⏳",en_camino:"🚚"};
          var eCol=eColors[e.status]||"#8B949E";
          var rutaPeds=f.filter(function(p){return p.num_envio&&String(p.num_envio)===String(e.num_envio);});
          var pedTotal=rutaPeds.reduce(function(a,p){return a+(parseFloat(p.total)||0);},0);
          html+='<div style="background:#161B22;border:2px solid '+eCol+'50;border-radius:3px;padding:16px;margin-bottom:12px">';
          html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';
          html+='<div><div style="font-size:14px;font-weight:700">Ruta #'+e.num_envio+(e.ruta?' — '+e.ruta:'')+'</div>';
          html+='<div style="font-size:11px;color:#8B949E;margin-top:2px">'+e.fecha+' · <span style="color:#E6EDF3">'+e.repartidor+'</span> · '+(e.pedidos||[]).length+' pedido(s)</div></div>';
          html+='<div style="display:flex;align-items:center;gap:8px">';
          html+='<div style="background:'+eCol+'20;border:1px solid '+eCol+'60;border-radius:2px;padding:5px 12px;font-size:11px;color:'+eCol+';font-weight:700">'+(eIcons[e.status]||"")+" "+e.status.replace(/_/g," ")+'</div>';
          if(e.status==="en_espera")html+='<button class="btn btn-p btn-s" style="background:#4A9EFF;border-color:#4A9EFF" onclick="eCambiarStatus('+e.id+',&apos;en_camino&apos;)">🚚 Salió</button>';
          html+='</div></div>';
          if(rutaPeds.length){
            html+='<div style="display:flex;flex-direction:column;gap:4px;margin-bottom:10px">';
            rutaPeds.forEach(function(p){
              var pe=p.estado_envio||"preparando";
              var pColor=pe==="entregado"?"#00C896":pe==="en_camino"?"#4A9EFF":"#8B949E";
              html+='<div style="background:#21262D;border-radius:2px;padding:8px 12px;display:flex;justify-content:space-between;align-items:center">';
              html+='<div><span style="color:#4A9EFF;font-weight:700">#'+(p.ticket||"")+'</span> <span style="font-size:12px;color:#E6EDF3;margin-left:4px">'+p.nb+'</span></div>';
              html+='<div style="display:flex;align-items:center;gap:8px"><span style="color:#00C896;font-weight:700">'+fmt(p.total)+'</span>';
              if(pe==="en_camino")html+='<button onclick="pedEntreg(&apos;'+p.id+'&apos;)" style="background:transparent;border:1px solid #30363D;color:#8B949E;border-radius:2px;padding:4px 10px;font-family:monospace;font-size:10px;cursor:pointer">✅</button>';
              html+='</div></div>';
            });
            html+='</div>';
          }
          html+='<div style="display:flex;justify-content:space-between;padding-top:8px;border-top:1px solid #30363D">';
          html+='<span style="font-size:11px;color:#8B949E">Total ruta</span><span style="font-size:14px;font-weight:700;color:#00C896">'+fmt(pedTotal)+'</span></div>';
          html+='</div>';
        });
      }
    } else {
      if(!f.length)html+='<div class="empty">Sin pedidos.</div>';
      else f.forEach(function(p){html+=pedCard(p);});
    }
    html+='</div>';
    el.innerHTML=html;
  }

  function load(){
    Promise.all([
      sGET("pedidos","order=created_at.desc"),
      sGET("seguimientos","order=fecha_creado.desc"),
      sGET("envios","order=num_envio.desc"),
      sGET("ventas","order=ticket.desc")
    ]).then(function(res){
      var pedidos=Array.isArray(res[0])?res[0]:[];
      var allSegs=Array.isArray(res[1])?res[1]:[];
      var envios=Array.isArray(res[2])?res[2]:[];
      var allVentas=Array.isArray(res[3])?res[3]:[];
      var erpSegs=allSegs.filter(function(s){return s.origen==="erp"});
      var erpPeds=erpSegs.map(function(s){
        var envio=envios.find(function(e){
          return (e.pedidos||[]).some(function(p){return String(p.ticket)===String(s.pedido_ticket);});
        });
        if(!envio&&s.num_envio)envio=envios.find(function(e){return String(e.num_envio)===String(s.num_envio);});
        var estadoReal=envio?envio.status:(s.estado||"preparando");
        var ventaData=allVentas.find(function(v){return String(v.ticket)===String(s.pedido_ticket)||String(v.id)===String(s.venta_id);});
        return{
          id:"seg_"+s.id,
          nb:(s.cliente_codigo?s.cliente_codigo+" · ":"")+s.cliente,
          tel:"—",dir:"—",
          items:ventaData&&Array.isArray(ventaData.lineas)?ventaData.lineas.map(function(l){return{nb:l.desc||l.nombre,q:parseFloat(l.cant||1),p:parseFloat(l.pu||0)};}):[],
          total:s.total||ventaData&&ventaData.monto_venta||0,
          pago:"ERP",
          fecha:s.fecha_creado||hoy(),
          status:estadoReal==="entregado"?"entregado":"concretado",
          estado_envio:estadoReal,
          num_envio:envio?envio.num_envio:s.num_envio||null,
          _seg:s,origen:"erp",
          ticket:s.pedido_ticket
        };
      });
      render(pedidos.concat(erpPeds),envios);
    });
  }
  window.pedFiltro=function(f){filtro=f;load()};
  window.pedConc=function(id){
    sGET("ventas","select=ticket&order=ticket.desc&limit=1").then(function(rows){
      var maxT=rows&&rows[0]?rows[0].ticket:0;
      var ticket=maxT+1;
      sGET("pedidos","id=eq."+id).then(function(pr){
        var ped=pr&&pr[0];if(!ped)return;
        sPOST("ventas",{ticket:ticket,fecha:hoy(),cliente_id:0,cliente_nombre:ped.nb,monto_venta:ped.total||0,adeudo:ped.total||0,cobrado:0,costo_productos:0,utilidad:ped.total||0,pct_util:0,origen:"tienda",pedido_id:String(ped.id),lineas:ped.items||[]}).then(function(){
          sPOST("seguimientos",{id:String(Date.now()),pedido_id:String(ped.id),pedido_ticket:ticket,cliente:ped.nb,tel:ped.tel,dir:ped.dir,total:ped.total||0,estado:"preparando",fecha_creado:hoy(),historial:[{estado:"preparando",fecha:hoy()}]}).then(function(){
            sPATCH("pedidos","id=eq."+id,{pedido_status:"concretado"}).then(function(){toast("✓ Ticket #"+ticket+" creado");load()});
          });
        });
      });
    });
  };
  window.pedCanc=function(id){if(confirm("¿Cancelar?"))sPATCH("pedidos","id=eq."+id,{status:"cancelado"}).then(function(){toast("Cancelado","err");load()})};
  window.pedEntreg=function(id){
    var fecha=new Date().toLocaleDateString("es-MX");
    function marcarSeg(seg){
      var hist=(seg.historial||[]).concat([{estado:"entregado",fecha:fecha}]);
      sPATCH("seguimientos","id=eq."+seg.id,{estado:"entregado",historial:hist}).then(function(){
        // Also update envio if all its pedidos are entregado
        if(seg.num_envio){
          sGET("envios","order=id").then(function(envs){
            envs=Array.isArray(envs)?envs:[];
            var envio=envs.find(function(e){return String(e.num_envio)===String(seg.num_envio)});
            if(envio){
              // Check localStorage for all segs with this num_envio
              var allSegs=JSON.parse(localStorage.getItem("erp_seguimientos")||"[]");
              var linkedSegs=allSegs.filter(function(s){return String(s.num_envio)===String(seg.num_envio)});
              var allDone=linkedSegs.every(function(s){return s.id===seg.id||s.estado==="entregado"});
              if(allDone)sPATCH("envios","id=eq."+envio.id,{status:"entregado"});
            }
          });
        }
        toast("✅ Entregado");load();
      });
    }
    sGET("seguimientos","order=id").then(function(rows){
      rows=Array.isArray(rows)?rows:[];
      var segId=String(id).replace("seg_","");
      var seg=rows.find(function(r){return String(r.id)===String(segId)||String(r.pedido_id)===String(id)});
      if(seg)marcarSeg(seg);
    });
  };
  load();
  if(window._pt)clearInterval(window._pt);
  window._pt=setInterval(function(){if(modActual==="pedidos")load()},5000);
}

/* ── VENTAS ──────────────────────────────────────────────────────────── */
function rVentas(el){
  var ventas=[],clientes=[],inv=[];
  function load(){
    syncCatalogo(function(){
    recalcularAdeudos(function(){
      Promise.all([
        sGET("ventas","order=ticket.desc"),
        sGET("clientes","order=codigo"),
        sGET("compras","order=id"),
        sGET("produccion","order=id")
      ]).then(function(res){
        ventas=Array.isArray(res[0])?res[0]:[];
        clientes=Array.isArray(res[1])?res[1]:[];
        var compras=Array.isArray(res[2])?res[2]:[];
        var prodLotes=Array.isArray(res[3])?res[3]:[];
        // Calcular stock real de terminados
        var stock={};
        compras.forEach(function(co){
          if(co.tipo_inv==="servicio")return;
          var lineas=co.lineas&&co.lineas.length?co.lineas:[{nombre:co.producto_nombre,tipo_inv:co.tipo_inv,cantidad:parseFloat(co.cantidad)||0,pu:parseFloat(co.pu)||0}];
          lineas.forEach(function(l){if(!l.nombre||l.tipo_inv!=="terminado")return;if(!stock[l.nombre])stock[l.nombre]={cantidad:0,costo_unit:0};stock[l.nombre].cantidad+=parseFloat(l.cantidad)||0;if(parseFloat(l.pu)>0)stock[l.nombre].costo_unit=parseFloat(l.pu);});
        });
        prodLotes.forEach(function(p){
          if(p.producto_nombre&&p.piezas&&p.tipo_inv==="terminado"){if(!stock[p.producto_nombre])stock[p.producto_nombre]={cantidad:0,costo_unit:0};stock[p.producto_nombre].cantidad+=parseFloat(p.piezas)||0;if(parseFloat(p.costo_unitario)>0)stock[p.producto_nombre].costo_unit=parseFloat(p.costo_unitario);}
        });
        ventas.forEach(function(v){(Array.isArray(v.lineas)?v.lineas:[]).forEach(function(l){var nom=l.desc||l.nombre;if(!nom)return;if(!stock[nom])stock[nom]={cantidad:0,costo_unit:0};stock[nom].cantidad-=parseFloat(l.cant||l.cantidad||0);});});
        inv=Object.keys(stock).map(function(n){return{nombre:n,cantidad:stock[n].cantidad,costo_unit:stock[n].costo_unit};}).filter(function(x){return x.cantidad>0;}).sort(function(a,b){return a.nombre>b.nombre?1:-1;});
        renderList();
      });
    });
    });
  }
  function renderList(){
    var tot=ventas.reduce(function(a,v){return a+parseFloat(v.monto_venta||0)},0);
    var adeudo=ventas.reduce(function(a,v){return a+parseFloat(v.adeudo||0)},0);
    var html='<div class="mod">';
    html+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px">';
    html+='<div><h1 style="font-size:18px;font-weight:700">Ventas</h1><p id="vstats" style="font-size:11px;color:#8B949E;margin-top:3px">'+ventas.length+' tickets · '+fmt(tot)+' · '+fmt(adeudo)+' por cobrar</p></div>';
    html+='<button class="btn btn-p" onclick="vNueva()">+ Nueva venta</button></div>';
    html+='<input id="vbusq" placeholder="Buscar..." style="width:100%;background:#0D1117;border:1px solid #30363D;border-radius:2px;padding:8px 11px;font-size:12px;color:#E6EDF3;margin-bottom:16px;box-sizing:border-box" oninput="vFiltrar(this.value)">';
    html+='<div id="vtabla">';
    if(!ventas.length){html+='<div class="empty">Sin ventas.</div></div></div>';el.innerHTML=html;return}
    html+='<table><thead><tr><th>#</th><th>Fecha</th><th>Cliente</th><th style="text-align:right">Monto</th><th style="text-align:right">Cobrado</th><th style="text-align:right">Adeudo</th><th>Origen</th><th></th></tr></thead><tbody>';
    ventas.forEach(function(v){
      html+='<tr>';
      html+='<td style="color:#4A9EFF;font-weight:700">#'+v.ticket+'</td>';
      html+='<td style="color:#8B949E">'+v.fecha+'</td>';
      var ccod=v.cliente_codigo||'';
      var cnom=v.cliente_nombre||'';
      // Also try to find codigo from clientes list
      if(!ccod&&v.cliente_id){
        var cMatch=clientes.find(function(x){return String(x.id)===String(v.cliente_id)});
        if(cMatch)ccod=cMatch.codigo;
      }
      html+='<td>'+(ccod?'<span style="color:#C084FC;font-size:10px;font-weight:700">'+ccod+'</span> · ':'')+cnom+'</td>';
      html+='<td style="text-align:right;font-weight:700">'+fmt(v.monto_venta)+'</td>';
      html+='<td style="text-align:right;color:#00C896">'+fmt(v.cobrado||0)+'</td>';
      html+='<td style="text-align:right;color:'+(parseFloat(v.adeudo||0)>0?"#FB923C":"#8B949E")+';font-weight:700">'+fmt(v.adeudo||0)+'</td>';
      html+='<td>'+(v.origen==="tienda"?bdg("🛍 Tienda","#C084FC"):"")+'</td>';
      html+='<td><div style="display:flex;gap:6px"><button class="btn btn-o btn-s" style="border-color:#4A9EFF;color:#4A9EFF" onclick="vEdit('+v.id+')">editar</button><button class="btn btn-o btn-s" style="border-color:#F85149;color:#F85149" onclick="vDel('+v.id+')">✕</button></div></td>';
      html+='</tr>';
    });
    html+='</tbody></table></div></div>';
    el.innerHTML=html;
  }
  window.vFiltrar=function(q){
    var rows=el.querySelectorAll("tbody tr");
    rows.forEach(function(r){r.style.display=r.textContent.toLowerCase().indexOf(q.toLowerCase())>=0?"":"none"});
  };
  window.vNueva=function(){
    if(!clientes.length){
      sGET("clientes","order=codigo").then(function(d){
        clientes=Array.isArray(d)?d:[];
        vForm(null);
      });
    } else {vForm(null);}
  };
  window.vEdit=function(id){vForm(ventas.find(function(v){return v.id===id}))};
  window.vDel=function(id){sDEL("ventas","id=eq."+id).then(function(){load();toast("Eliminado","err")})};

  function vForm(ve){
    var esEd=!!ve;
    var maxT=ventas.length?Math.max.apply(null,ventas.map(function(v){return v.ticket||0})):0;
    var autoT=esEd?ve.ticket:maxT+1;
    var lineas=esEd&&ve.lineas&&ve.lineas.length?JSON.parse(JSON.stringify(ve.lineas)):[{inv_id:"",desc:"",cant:1,pu:0,cu:0}];
    var cliId=esEd?String(ve.cliente_id||""):"";
    var cliNom=esEd?ve.cliente_nombre||"":"";

    function calcTotals(){
      var tv=lineas.reduce(function(a,l){return a+(parseFloat(l.cant)||0)*(parseFloat(l.pu)||0)},0);
      var tc=lineas.reduce(function(a,l){return a+(parseFloat(l.cant)||0)*(parseFloat(l.cu)||0)},0);
      return{tv:tv,tc:tc};
    }
    function renderForm(){
      var t=calcTotals();
      var montoEl=$("vmonto");
      // Always update monto from line items total
      if(montoEl&&t.tv>0){
        montoEl.value=t.tv.toFixed(2);
      }
      var monto=montoEl?parseFloat(montoEl.value)||t.tv:t.tv;
      var util=monto-t.tc;
      if($("vresumen"))$("vresumen").innerHTML=srow("Subtotal",fmt(t.tv))+srow("Costo",fmt(t.tc),"#8B949E")+'<div style="height:1px;background:#30363D;margin:8px 0"></div>'+srow("Utilidad",fmt(util),util>=0?"#00C896":"#F85149",true)+srow("Monto cobrar",fmt(monto),"#E6EDF3",true);
      renderForm._force=renderForm._force||false;
      if($("vlineas")&&(!$("vlineas").children.length||renderForm._force)){
        renderForm._force=false;
        // Only SKUs with stock > 0 (from inv calculated in load)
        var invNombres=inv.map(function(x){return x.nombre;});
        var ventaSKUs=CATALOGO_SKU.filter(function(s){return (s.tipo==="terminado"||s.tipo==="mixto")&&invNombres.indexOf(s.sku)>=0;});
        var TIPO_VALS=["insumo","terminado","mixto","otro"];
        var cats=[];
        ventaSKUs.forEach(function(s){if(s.cat&&TIPO_VALS.indexOf(s.cat)<0&&cats.indexOf(s.cat)<0)cats.push(s.cat);});
        cats.sort();
        var inp_style="background:#0D1117;border:1px solid #30363D;border-radius:2px;padding:5px 8px;font-size:12px;color:#E6EDF3;width:100%";
        var sel_style=inp_style+";cursor:pointer";
        var lhtml="";
        lineas.forEach(function(l,i){
          var skuItem=CATALOGO_SKU.find(function(s){return s.sku===l.sku;})||null;
          var catActual=l.categoria||(skuItem?skuItem.cat:'');
          var skusEnCat=catActual?ventaSKUs.filter(function(s){return s.cat===catActual;}):ventaSKUs;
          var cu=parseFloat(l.cu||0);
          var pu=parseFloat(l.pu||0);
          var cant=parseFloat(l.cant||0);
          var tot=cant*pu;
          var util=cu>0&&pu>0?((pu-cu)/pu*100):null;
          var utilColor=util===null?"#8B949E":util>=70?"#00C896":util>=50?"#E3B341":"#F85149";
          // % descuento: pu vs precio base del catálogo (si lo tuviera), o vs precio máximo del inventario
          var precioBase=parseFloat(l.precio_base||0);
          var desc=precioBase>0&&pu<precioBase?((precioBase-pu)/precioBase*100):0;
          var descColor=desc>30?"#F85149":desc>15?"#E3B341":"#8B949E";
          lhtml+='<tr style="vertical-align:middle">';
          // Categoria
          lhtml+='<td style="padding:4px 6px"><select id="vcatsel'+i+'" onchange="vSelCat('+i+',this.value)" style="'+sel_style+';min-width:130px"><option value="">— Categoría —</option>';
          cats.forEach(function(cat){lhtml+='<option value="'+cat+'"'+(catActual===cat?' selected':'')+'>'+cat+'</option>';});
          lhtml+='</select></td>';
          // SKU
          lhtml+='<td style="padding:4px 6px"><select id="vskusel'+i+'" onchange="vSelSku('+i+',this.value)" style="'+sel_style+';min-width:110px"><option value="">— SKU —</option>';
          skusEnCat.forEach(function(s){lhtml+='<option value="'+s.sku+'"'+(l.sku===s.sku?' selected':'')+'>'+s.sku+'</option>';});
          lhtml+='</select></td>';
          // Desc (auto)
          lhtml+='<td style="padding:4px 8px;font-size:11px;color:#8B949E;white-space:nowrap" id="vdesc_lbl'+i+'">'+(skuItem?skuItem.desc:'—')+'</td>';
          // Cant
          lhtml+='<td style="padding:4px 6px"><input id="vcant'+i+'" type="number" min="0" value="'+l.cant+'" onchange="vSetLCalc('+i+',\'cant\',this.value)" style="'+inp_style+';width:65px;text-align:right"></td>';
          // Costo (readonly)
          lhtml+='<td style="padding:4px 8px;text-align:right;font-size:11px;color:#FB923C" id="vcu_lbl'+i+'">'+(cu>0?fmt(cu):'—')+'</td>';
          // Monto (P.U.)
          lhtml+='<td style="padding:4px 6px"><input id="vpu'+i+'" type="number" min="0" value="'+l.pu+'" onchange="vSetLCalc('+i+',\'pu\',this.value)" style="'+inp_style+';width:85px;text-align:right"></td>';
          // Total
          lhtml+='<td style="padding:4px 8px;text-align:right;color:#00C896;font-weight:700;white-space:nowrap" id="vtot'+i+'">'+fmt(tot)+'</td>';
          // % Util
          lhtml+='<td style="padding:4px 8px;text-align:right;font-weight:700;white-space:nowrap;color:'+utilColor+'" id="vutil'+i+'">'+(util!==null?util.toFixed(1)+"%":"—")+'</td>';
          // % Desc
          lhtml+='<td style="padding:4px 8px;text-align:right;font-size:11px;white-space:nowrap;color:'+descColor+'" id="vdesc_pct'+i+'">'+(desc>0?'-'+desc.toFixed(1)+"%":"—")+'</td>';
          lhtml+='<td style="padding:4px 4px">'+(lineas.length>1?'<button onclick="vRemLForce('+i+')" style="background:transparent;border:none;color:#F85149;cursor:pointer;font-size:14px;padding:2px 6px">✕</button>':'')+'</td></tr>';
        });
        $("vlineas").innerHTML=lhtml;
      }
    }
    var html='<div class="mod">';
    html+='<div style="display:flex;justify-content:space-between;margin-bottom:20px"><h1 style="font-size:18px;font-weight:700">'+(esEd?"Editar Ticket #"+ve.ticket:"Nueva Venta")+'</h1><button class="btn btn-g" onclick="goMod(\'ventas\')">← Cancelar</button></div>';
    html+='<div class="grid2">';
    html+='<div class="card"><div style="font-size:10px;color:#8B949E;letter-spacing:.12em;margin-bottom:12px">DATOS</div>';
    html+='<div class="fi"><label>TICKET #</label><div class="fi-ro">'+autoT+' 🔒</div></div>';
    html+=fi("FECHA",'<input id="vfecha" type="date" value="'+(esEd?ve.fecha:hoy())+'">');
    html+='<div class="fi"><label>CLIENTE *</label>';
    html+='<input id="vcliinput" type="text" placeholder="Escribe nombre o código..." autocomplete="off" value="'+cliNom+'" oninput="vCliInput(this.value)" style="width:100%;background:#0D1117;border:1px solid #30363D;border-radius:2px;padding:9px 11px;font-size:13px;color:#E6EDF3">';

    html+='</div>';
    html+=fi("MONTO TOTAL ($)",'<input id="vmonto" type="number" value="'+(esEd?ve.monto_venta:0)+'" oninput="renderVForm()">');
    html+='</div>';
    html+='<div class="card"><div style="font-size:10px;color:#8B949E;letter-spacing:.12em;margin-bottom:12px">RESUMEN</div><div id="vresumen"></div></div>';
    html+='</div>';

      var precioBase=parseFloat(lineas[i].precio_base||0);

      if(descEl){
        var desc=precioBase>0&&pu<precioBase?((precioBase-pu)/precioBase*100):0;

      var descColor=pctDesc>30?"#F85149":pctDesc>15?"#E3B341":"#8B949E";
      var pctUtilStr=pctUtil>0?pctUtil.toFixed(1)+"%":"—";
      var pctDescStr=pctDesc>0?"-"+pctDesc.toFixed(1)+"%":"—";
      var html=srow("Subtotal",fmt(tv))+srow("Costo",fmt(tc),"#8B949E");

      html+='<div style="height:1px;background:#30363D;margin:8px 0"></div>';
      html+=srow("Monto cobrar",fmt(monto),"#E6EDF3",true);
      if($("vresumen"))$("vresumen").innerHTML=html;
    }
    var _vGuardando=false;
    window.vGuardar=function(vid){
      if(_vGuardando)return;
      _vGuardando=true;
      var t=calcTotals();
      var monto=parseFloat(($("vmonto")||{}).value)||t.tv;
      if(!cliId||!cliNom.trim()){alert("Debes seleccionar un cliente de la lista");return}
      var util=monto-t.tc;
      var body={ticket:autoT,fecha:($("vfecha")||{}).value||hoy(),cliente_id:parseInt(cliId)||0,cliente_nombre:cliNom,monto_venta:monto,adeudo:esEd?ve.adeudo:monto,cobrado:esEd?ve.cobrado:0,costo_productos:t.tc,utilidad:util,pct_util:monto>0?util/monto:0,origen:"erp",lineas:lineas};
      var p=vid?sPATCH("ventas","id=eq."+vid,body):sPOST("ventas",body);
      p.then(function(res){
        // Si es nueva venta, crear seguimiento para que aparezca en Pedidos
        if(!vid){
          var ventaId=res&&Array.isArray(res)&&res[0]?res[0].id:String(Date.now());
          sPOST("seguimientos",{
            id:String(Date.now()),
            pedido_id:"erp_"+autoT,
            pedido_ticket:autoT,
            venta_id:ventaId,
            cliente:cliNom,
            cliente_codigo:cliCodigo||"",
            cliente_id:parseInt(cliId)||0,

            estado:"preparando",
            origen:"erp",
            fecha_creado:hoy(),
            historial:[{estado:"preparando",fecha:hoy()}]
          });
        }
        _vGuardando=false;load();goMod("ventas");toast(vid?"Venta actualizada":"Venta registrada");
      });
    };
    renderForm();
  }
  load();
}

/* ── RECALCULAR ADEUDOS (global) ─────────────────────────────────────── */
function recalcularAdeudos(callback){
  Promise.all([
    sGET("movimientos","order=id.asc"),
    sGET("ventas","order=id.asc")
  ]).then(function(results){
    var allMovs=Array.isArray(results[0])?results[0]:[];
    var allVentas=Array.isArray(results[1])?results[1]:[];
    var cobradoMap={};
    allMovs.forEach(function(m){
      if(!m.egreso&&m.movimiento==="Venta"&&m.gasto_ticket){
        (m.gasto_ticket||"").split(/, (?=[A-Za-z])/).forEach(function(ref){
          var mt=ref.trim().match(/Ticket #(\d+)/);
          if(mt){
            var ticket=parseInt(mt[1]);
            var amtStr=ref.replace(/,/g,"").match(/\$([\d.]+)/);
            var amt=amtStr?parseFloat(amtStr[1]):parseFloat(m.monto||0);
            cobradoMap[ticket]=(cobradoMap[ticket]||0)+amt;
          }
        });
      }
    });
    var patches=allVentas.map(function(v){
      var cobrado=parseFloat((cobradoMap[v.ticket]||0).toFixed(2));
      var adeudo=parseFloat(Math.max(0,parseFloat(v.monto_venta||0)-cobrado).toFixed(2));
      if(Math.abs(cobrado-(v.cobrado||0))>0.01||Math.abs(adeudo-(v.adeudo||0))>0.01){
        return sPATCH("ventas","id=eq."+v.id,{cobrado:cobrado,adeudo:adeudo});
      }
      return Promise.resolve();
    });
    Promise.all(patches).then(function(){if(callback)callback();});
  });
}

function rBancos(el){

    // Fix: migrate any pagosMap refs that have fmt()-style amounts ($20,000.00 -> store as number)
    if(!IS_PROD){
      var rawMovs=JSON.parse(localStorage.getItem("erp_movimientos")||"[]");
      var changed=false;
      rawMovs.forEach(function(m){
        if(m.movimiento==="Pago Proveedores"&&m.egreso&&m.gasto_ticket){
          var refs=m.gasto_ticket.split(",");
          var newRefs=refs.map(function(r){
            var match=r.trim().match(/Compra #(\d+)/);
            if(match){
              // Remove any existing amount and store clean number
              var cleanRef="Compra #"+match[1]+": $"+parseFloat(m.monto||0).toFixed(2);
              if(cleanRef!==r.trim()){changed=true;return cleanRef;}
            }
            return r;
          });
          if(changed)m.gasto_ticket=newRefs.join(", ");
        }
      });

        html+='<td style="padding:4px 8px;text-align:right;color:#00C896;font-weight:700;white-space:nowrap" id="ctot'+i+'">'+fmt((parseFloat(l.cantidad)||0)*(parseFloat(l.pu)||0))+'</td>';
        html+='<td style="padding:4px 4px">'+(lineas.length>1?'<button onclick="cRemL('+i+')" style="background:transparent;border:none;color:#F85149;cursor:pointer;font-size:14px;padding:2px 6px">✕</button>':'')+'</td>';
        html+='</tr>';
      });
