/* ── REPORTES ────────────────────────────────────────────────────────── */
function rReportes(el){
  var ventas=[],movs=[],inv=[];
  var tabActual=0;
  var hoyDate=new Date(),anio=String(hoyDate.getFullYear()),mes=String(hoyDate.getMonth()+1),dia="";
  var comprasRep=[], movsRep=[];
  var enviosRep=[], prodRepLotes=[];
  function load(){
    Promise.all([
      sGET("ventas","order=ticket"),
      sGET("movimientos","order=fecha"),
      sGET("compras","order=num_compra"),
      sGET("envios","order=num_envio"),
      sGET("produccion","order=id")
    ]).then(function(res){
      ventas=Array.isArray(res[0])?res[0]:[];
      movs=Array.isArray(res[1])?res[1]:[];
      comprasRep=Array.isArray(res[2])?res[2]:[];
      enviosRep=Array.isArray(res[3])?res[3]:[];
      prodRepLotes=Array.isArray(res[4])?res[4]:[];
      // Calcular inventario real
      var stock={};
      function ensR(n,t,cu){if(!stock[n])stock[n]={tipo:t||"insumo",cantidad:0,cu:cu||0};}
      comprasRep.forEach(function(co){
        if(co.tipo_inv==="servicio")return;
        var lineas=co.lineas&&co.lineas.length?co.lineas:[{nombre:co.producto_nombre,tipo_inv:co.tipo_inv,cantidad:parseFloat(co.cantidad)||0,pu:parseFloat(co.pu)||0}];
        lineas.forEach(function(l){if(!l.nombre)return;ensR(l.nombre,l.tipo_inv,parseFloat(l.pu)||0);stock[l.nombre].cantidad+=parseFloat(l.cantidad)||0;if(parseFloat(l.pu)>0)stock[l.nombre].cu=parseFloat(l.pu);});
      });
      prodRepLotes.forEach(function(p){
        if(p.producto_nombre&&p.piezas){ensR(p.producto_nombre,"terminado",parseFloat(p.costo_unitario)||0);stock[p.producto_nombre].cantidad+=parseFloat(p.piezas)||0;if(parseFloat(p.costo_unitario)>0)stock[p.producto_nombre].cu=parseFloat(p.costo_unitario);}
        (Array.isArray(p.insumos)?p.insumos:[]).forEach(function(ins){var n=ins.nombre;if(!n)return;ensR(n,"insumo",0);stock[n].cantidad-=parseFloat(ins.cant||ins.cantidad||0);});
      });
      ventas.forEach(function(v){
        (Array.isArray(v.lineas)?v.lineas:[]).forEach(function(l){var n=l.desc||l.nombre;if(!n)return;ensR(n,"terminado",0);stock[n].cantidad-=parseFloat(l.cant||l.cantidad||0);});
      });
      inv=Object.keys(stock).map(function(n){var s=stock[n];return{nombre:n,tipo:s.tipo,cantidad:Math.max(0,s.cantidad),costo_unit:s.cu,costo_total:Math.max(0,s.cantidad)*s.cu};});
      renderRep();
    });
  }
  var TABS=["Estado de Resultados","Balance General","Flujo de Efectivo","KPIs","Clientes Deudores","Pasivos"];

  var diasEnMes=new Date(parseInt(anio),parseInt(mes),0).getDate();
  var diasOpts='<option value="">Mes completo</option>';
  for(var d=1;d<=diasEnMes;d++){diasOpts+='<option value="'+d+'"'+(String(d)===dia?' selected':'')+'>'+d+'</option>';}
  el.innerHTML='<div class="mod"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h1 style="font-size:18px;font-weight:700">Reportes</h1><div style="display:flex;gap:8px;flex-wrap:wrap"><select id="ranio" onchange="setAnio(this.value)" style="background:#0D1117;border:1px solid #30363D;border-radius:2px;padding:8px 10px;font-size:12px;color:#E6EDF3"><option value="2026"'+(anio==="2026"?" selected":"")+'>2026</option><option value="2025"'+(anio==="2025"?" selected":"")+'>2025</option><option value="2027"'+(anio==="2027"?" selected":"")+'>2027</option></select><select id="rmes" onchange="setMes(this.value)" style="background:#0D1117;border:1px solid #30363D;border-radius:2px;padding:8px 10px;font-size:12px;color:#E6EDF3"><option value="">Año completo</option>'+MESES.map(function(m,i){return'<option value="'+(i+1)+'"'+(String(i+1)===mes?" selected":"")+'>'+m+'</option>'}).join("")+'</select><select id="rdia" onchange="setDia(this.value)" style="background:#0D1117;border:1px solid #30363D;border-radius:2px;padding:8px 10px;font-size:12px;color:#E6EDF3">'+diasOpts+'</select></div></div><div class="tab-nav" id="rtabs"></div><div id="rcont"><div class="spin">Cargando...</div></div></div>';
  var rtabs=$("rtabs");
  rtabs.innerHTML=TABS.map(function(t,i){return'<button class="tab-btn'+(i===0?" on":"")+'" onclick="rTab('+i+')">'+t+'</button>'}).join("");
  window.rTab=function(i){tabActual=i;document.querySelectorAll(".tab-btn").forEach(function(b,j){b.className="tab-btn"+(j===i?" on":"")});renderRep()};
  window.setAnio=function(v){anio=v;dia='';renderRep();};
  window.setMes=function(v){mes=v;dia='';renderRep();};
  window.setDia=function(v){dia=v;renderRep();};

  function calc(){
    var ai=parseInt(anio),mi=parseInt(mes)||0,di=parseInt(dia)||0;
    var vF=ventas.filter(function(v){var a=parseInt((v.fecha||"").slice(0,4)),m2=parseInt((v.fecha||"").slice(5,7)),d2=parseInt((v.fecha||"").slice(8,10));return a===ai&&(!mi||m2===mi)&&(!di||d2===di);});
    var mF=movs.filter(function(m){var a=parseInt((m.fecha||"").slice(0,4)),m2=parseInt((m.fecha||"").slice(5,7)),d2=parseInt((m.fecha||"").slice(8,10));return a===ai&&(!mi||m2===mi)&&(!di||d2===di);});

    // ── ESTADO DE RESULTADOS ──────────────────────────────────────────
    var vTot=vF.reduce(function(a,v){return a+parseFloat(v.monto_venta||0);},0);
    // Costo de ventas: suma de (cant × costo_unit del inventario) por línea vendida
    var cVen=vF.reduce(function(a,v){
      return a+(Array.isArray(v.lineas)?v.lineas:[]).reduce(function(b,l){
        var nom=l.desc||l.nombre||"";
        var invItem=inv.find(function(x){return x.nombre===nom;});
        var cu=invItem?parseFloat(invItem.costo_unit||0):parseFloat(l.cu||0);
        return b+(parseFloat(l.cant||l.cantidad||0)*cu);
      },0);
    },0);
    var uBruta=vTot-cVen;
    var gastosMovs=mF.filter(function(m){return m.egreso&&(m.movimiento==="Gasto"||m.movimiento==="Pago Repartidores");});
    var gastos=gastosMovs.reduce(function(a,m){return a+parseFloat(m.monto||0);},0);
    var gastosMap={};gastosMovs.forEach(function(m){var k=m.movimiento;gastosMap[k]=(gastosMap[k]||0)+parseFloat(m.monto||0);});var gastosDetalle=Object.keys(gastosMap).map(function(k){return{concepto:k,monto:gastosMap[k]};});
    var uNeta=uBruta-gastos;
    var cobros=mF.filter(function(m){return !m.egreso&&m.movimiento==="Venta";}).reduce(function(a,m){return a+parseFloat(m.monto||0);},0);
    var gOp=gastos;

    // ── BALANCE GENERAL ───────────────────────────────────────────────
    // Saldos de cuentas (todos los movimientos, no solo del periodo)
    var saldos={};CUENTAS.forEach(function(ct){saldos[ct.id]=0;});
    movs.forEach(function(m){saldos[m.cuenta_id]=(saldos[m.cuenta_id]||0)+(m.egreso?-parseFloat(m.monto||0):parseFloat(m.monto||0));});
    var efec=CUENTAS.reduce(function(a,ct){return a+Math.max(0,saldos[ct.id]||0);},0);
    var porCobrar=ventas.reduce(function(a,v){return a+parseFloat(v.adeudo||0);},0);
    var valInv=inv.reduce(function(a,i){return a+parseFloat(i.costo_total||0);},0);
    var activos=efec+porCobrar+valInv;

    // Inversión socios (todos los movs)
    var inv2=movs.filter(function(m){return !m.egreso&&m.movimiento==="Inversion";}).reduce(function(a,m){return a+parseFloat(m.monto||0);},0);

    // Deuda proveedores (compras sin pagar, excluye servicios)
    var pagosMapP={};
    movs.forEach(function(m){
      if(m.movimiento==="Pago Proveedores"&&m.egreso){
        (m.gasto_ticket||"").split(/, (?=[A-Za-z])/).forEach(function(ref){
          var mt=ref.trim().match(/Compra #(\d+)/);
          if(mt){var n=parseInt(mt[1]);var am=ref.replace(/,/g,"").match(/\$([\d.]+)/);pagosMapP[n]=(pagosMapP[n]||0)+(am?parseFloat(am[1]):parseFloat(m.monto||0));}
        });
      }
    });
    var deudaProv=comprasRep.filter(function(co){return co.tipo_inv!=="servicio";}).reduce(function(a,co){
      var ad=Math.max(0,parseFloat(co.total||0)-(pagosMapP[co.num_compra]||0));
      return a+(ad>0.01?ad:0);
    },0);

    // Deuda repartidores
    var pagosRep={};
    movs.forEach(function(m){
      if(m.movimiento==="Pago Proveedores"&&m.egreso){
        (m.gasto_ticket||"").split(/, (?=[A-Za-z])/).forEach(function(ref){
          var mt=ref.trim().match(/Compra #(\d+)/);
          if(mt){
            var envServ=comprasRep.find(function(co){return co.tipo_inv==="servicio"&&co.num_compra===parseInt(mt[1]);});
            if(envServ){var am=ref.replace(/,/g,"").match(/\$([\d.]+)/);pagosRep[envServ.num_compra]=(pagosRep[envServ.num_compra]||0)+(am?parseFloat(am[1]):parseFloat(m.monto||0));}
          }
        });
      }
    });
    var deudaRep=comprasRep.filter(function(co){return co.tipo_inv==="servicio";}).reduce(function(a,co){
      var ad=Math.max(0,parseFloat(co.total||0)-(pagosRep[co.num_compra]||0));
      return a+(ad>0.01?ad:0);
    },0);

    var totalPasivos=inv2+deudaProv+deudaRep;
    var uNetaReal=activos-totalPasivos;

    return{vTot:vTot,cVen:cVen,uBruta:uBruta,gastos:gastos,gastosDetalle:gastosDetalle,uNeta:uNeta,cobros:cobros,gOp:gOp,
           inv2:inv2,deudaProv:deudaProv,deudaRep:deudaRep,porCobrar:porCobrar,valInv:valInv,
           saldos:saldos,efec:efec,activos:activos,pasivos:totalPasivos,ganancia:uNetaReal,
           flujoOp:cobros-gOp,flujoNeto:cobros-gOp+inv2,vF:vF,ventas:ventas};
  }
  function kbox(l,v,c){return'<div style="background:#21262D;border:1px solid #30363D;border-radius:2px;padding:16px"><div style="font-size:9px;color:#8B949E;letter-spacing:.1em;margin-bottom:6px">'+l+'</div><div style="font-size:18px;font-weight:700;color:'+(c||"#E6EDF3")+'">'+v+'</div></div>'}

  function renderRep(){
    var rc=$("rcont");if(!rc)return;
    var d=calc();
    var pLabel=dia&&mes?(MESES[parseInt(mes)-1]+" "+dia+", "+anio):(mes?MESES[parseInt(mes)-1]+" "+anio:"AÑO "+anio);
    var html="";
    if(tabActual===0){
      html='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px">'+kbox("VENTAS",fmt(d.vTot))+kbox("UTIL. BRUTA",fmt(d.uBruta),"#00C896")+kbox("UTIL. NETA",fmt(d.uNeta),d.uNeta>=0?"#00C896":"#F85149")+'</div>';
      html+='<div class="card"><div style="font-size:10px;color:#8B949E;letter-spacing:.12em;margin-bottom:12px">ESTADO DE RESULTADOS — '+pLabel+'</div>';
      html+=srow("Ventas",fmt(d.vTot))+srow("(-) Costo de Ventas",fmt(d.cVen),"#8B949E")+'<div style="height:1px;background:#30363D;margin:8px 0"></div>';
      html+=srow("UTILIDAD BRUTA",fmt(d.uBruta),d.uBruta>=0?"#00C896":"#F85149",true);
      // Detalle de gastos
      if(d.gastosDetalle&&d.gastosDetalle.length){
        html+='<div style="margin:8px 0 4px 0;font-size:10px;color:#8B949E;letter-spacing:.08em">GASTOS:</div>';
        d.gastosDetalle.forEach(function(g){html+=srow(g.concepto||g.movimiento,fmt(g.monto),"#8B949E");});
      }
      html+=srow("(-) Total Gastos",fmt(d.gastos),"#8B949E")+'<div style="height:1px;background:#30363D;margin:8px 0"></div>';
      html+=srow("UTILIDAD NETA",fmt(d.uNeta),d.uNeta>=0?"#00C896":"#F85149",true)+'<div style="font-size:11px;color:#8B949E;margin-top:8px">Margen: '+(d.vTot>0?(d.uNeta/d.vTot*100).toFixed(1)+"%":"—")+'</div></div>';
      rc.innerHTML=html;
    } else if(tabActual===1){
      html='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px">'+kbox("ACTIVOS",fmt(d.activos),"#4A9EFF")+kbox("PASIVOS",fmt(d.pasivos),"#FB923C")+kbox("GANANCIA",fmt(d.ganancia),d.ganancia>=0?"#00C896":"#F85149")+'</div>';
      html+='<div class="grid2">';
      html+='<div class="card"><div style="font-size:10px;color:#8B949E;letter-spacing:.12em;margin-bottom:12px">ACTIVOS</div>';
      CUENTAS.forEach(function(c){html+=srow(c.n,fmt(Math.max(0,d.saldos[c.id]||0)))});
      html+=srow("Por cobrar",fmt(d.porCobrar),"#FB923C")+srow("Inventario",fmt(d.valInv))+'<div style="height:1px;background:#30363D;margin:8px 0"></div>'+srow("TOTAL ACTIVOS",fmt(d.activos),"#4A9EFF",true)+'</div>';
      html+='<div class="card"><div style="font-size:10px;color:#8B949E;letter-spacing:.12em;margin-bottom:12px">PASIVOS Y CAPITAL</div>';
      html+=srow("Inversión socios",fmt(d.inv2),"#FB923C");
      html+=srow("Deuda proveedores",fmt(d.deudaProv),d.deudaProv>0?"#F85149":"#8B949E");
      html+=srow("Deuda repartidores",fmt(d.deudaRep),d.deudaRep>0?"#F85149":"#8B949E");
      html+='<div style="height:1px;background:#30363D;margin:8px 0"></div>'+srow("TOTAL PASIVOS",fmt(d.pasivos),"#F85149",true)+'<div style="height:1px;background:#30363D;margin:8px 0"></div>'+srow("UTILIDAD NETA",fmt(d.ganancia),d.ganancia>=0?"#00C896":"#F85149",true)+'</div></div>';
      rc.innerHTML=html;
    } else if(tabActual===2){
      html='<div class="card"><div style="font-size:10px;color:#8B949E;letter-spacing:.12em;margin-bottom:12px">FLUJO DE EFECTIVO — '+pLabel+'</div>';
      html+=srow("Cobros de ventas",fmt(d.cobros),"#00C896")+srow("(-) Gastos operativos",fmt(d.gOp),"#8B949E")+'<div style="height:1px;background:#30363D;margin:8px 0"></div>';
      html+=srow("FLUJO OPERATIVO",fmt(d.flujoOp),d.flujoOp>=0?"#00C896":"#F85149",true)+srow("(+) Inversiones",fmt(d.inv2),"#4A9EFF")+'<div style="height:1px;background:#30363D;margin:8px 0"></div>';
      html+=srow("FLUJO NETO",fmt(d.flujoNeto),d.flujoNeto>=0?"#00C896":"#F85149",true)+'</div>';
      rc.innerHTML=html;
    } else if(tabActual===3){
      html='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">';
      [{l:"VENTAS",v:fmt(d.vTot)},{l:"COSTO",v:fmt(d.cVen),c:"#8B949E"},{l:"UTIL. BRUTA",v:fmt(d.uBruta),c:"#00C896"},{l:"GASTOS",v:fmt(d.gastos),c:"#F85149"},{l:"UTIL. NETA",v:fmt(d.uNeta),c:d.uNeta>=0?"#00C896":"#F85149"},{l:"MARGEN",v:d.vTot>0?(d.uNeta/d.vTot*100).toFixed(1)+"%":"—",c:"#E3B341"},{l:"COBRADO",v:fmt(d.cobros),c:"#00C896"},{l:"POR COBRAR",v:fmt(d.porCobrar),c:"#FB923C"},{l:"TICKETS",v:d.vF.length,c:"#4A9EFF"}].forEach(function(k){html+=kbox(k.l,k.v,k.c)});
      html+='</div>';
      rc.innerHTML=html;
    } else if(tabActual===4){
      var deudores=d.ventas.filter(function(v){return parseFloat(v.adeudo||0)>0}).sort(function(a,b){return parseFloat(b.adeudo)-parseFloat(a.adeudo)});
      html='<div style="margin-bottom:12px;font-size:12px;color:#8B949E">Total por cobrar: <span style="color:#FB923C;font-weight:700">'+fmt(d.porCobrar)+'</span></div>';
      if(!deudores.length){html+='<div class="empty">Sin deudores ✓</div>'}
      else{html+='<table><thead><tr><th>Cliente</th><th>Ticket</th><th style="text-align:right">Monto</th><th style="text-align:right">Adeudo</th></tr></thead><tbody>';deudores.forEach(function(v){html+='<tr><td>'+v.cliente_nombre+'</td><td style="color:#4A9EFF;font-weight:700">#'+v.ticket+'</td><td style="text-align:right">'+fmt(v.monto_venta)+'</td><td style="text-align:right;color:#FB923C;font-weight:700">'+fmt(v.adeudo)+'</td></tr>'});html+='</tbody></table>'}
      rc.innerHTML=html;
    } else {
      // Pasivos: proveedores con deuda (synchronous using preloaded data)
      // Also load envios for repartidor debt
      sGET("envios","order=num_envio").then(function(enviosAll){
      enviosAll=Array.isArray(enviosAll)?enviosAll:[];
      // Pagos a proveedores (compras normales)
      var pagosMap={};
      movs.forEach(function(m){
        if(m.movimiento==="Pago Proveedores"&&m.egreso){
          (m.gasto_ticket||"").split(/, (?=[A-Za-z])/).forEach(function(ref){
            var mt=ref.trim().match(/Compra #(\d+)/);
            if(mt){var n=parseInt(mt[1]);var a=ref.replace(/,/g,"").match(/\$([\d.]+)/);pagosMap[n]=(pagosMap[n]||0)+(a?parseFloat(a[1]):parseFloat(m.monto||0));}
          });
        }
      });
      // Pagos a repartidores (compras tipo servicio)
      var pagosRepMap={};
      movs.forEach(function(m){
        if(m.movimiento==="Pago Repartidores"&&m.egreso){
          (m.gasto_ticket||"").split(/, (?=[A-Za-z])/).forEach(function(ref){
            var mt=ref.trim().match(/Compra #(\d+)/);
            if(mt){var n=parseInt(mt[1]);var a=ref.replace(/,/g,"").match(/\$([\d.]+)/);pagosRepMap[n]=(pagosRepMap[n]||0)+(a?parseFloat(a[1]):parseFloat(m.monto||0));}
          });
        }
      });
      // Build repartidor debt from compras tipo servicio
      var repDeuda={};
      comprasRep.filter(function(co){return co.tipo_inv==="servicio";}).forEach(function(co){
        var pagado=pagosRepMap[co.num_compra]||0;
        var adeudo=Math.max(0,parseFloat(co.total||0)-pagado);
        if(adeudo<0.01)return;
        var rep=co.proveedor||"Sin nombre";
        // Find ruta info from desc
        var rutaMatch=(co.desc||"").match(/Ruta #(\d+)/);
        var numRuta=rutaMatch?rutaMatch[1]:null;
        var env=numRuta?enviosAll.find(function(e){return String(e.num_envio)===String(numRuta);}):null;
        var fecha=env?env.fecha:co.fecha;
        var peds=env?(env.pedidos||[]).length:0;
        if(!repDeuda[rep])repDeuda[rep]={adeudo:0,rutas:[]};
        repDeuda[rep].adeudo+=adeudo;
        repDeuda[rep].rutas.push({num:co.num_compra,ruta:numRuta,fecha:fecha,costo:parseFloat(co.total||0),pagado:pagado,adeudo:adeudo,peds:peds});
      });
      var provDeuda={};
      comprasRep.filter(function(co){return co.tipo_inv!=="servicio";}).forEach(function(co){
        var pagado=pagosMap[co.num_compra]||0;
        var adeudo=parseFloat(co.total||0)-pagado;
        if(adeudo>0.01){
          if(!provDeuda[co.proveedor])provDeuda[co.proveedor]={adeudo:0,compras:[]};
          provDeuda[co.proveedor].adeudo+=adeudo;
          provDeuda[co.proveedor].compras.push({num:co.num_compra,adeudo:adeudo,total:co.total});
        }
      });
      var provs=Object.keys(provDeuda);
      var totalDeuda=provs.reduce(function(a,p){return a+provDeuda[p].adeudo},0);
      html='<div class="grid2">';
      html+='<div class="card"><div style="font-size:10px;color:#8B949E;letter-spacing:.12em;margin-bottom:12px">PASIVOS CON PROVEEDORES</div>';
      if(!provs.length){html+='<div style="color:#8B949E;font-size:12px">Sin deudas con proveedores ✓</div>';}
      else{
        provs.forEach(function(prov){
          var info=provDeuda[prov];
          html+='<div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #30363D">';
          html+='<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-weight:700;color:#E6EDF3">'+prov+'</span><span style="color:#F85149;font-weight:700">'+fmt(info.adeudo)+'</span></div>';
          info.compras.forEach(function(co){
            html+='<div style="display:flex;justify-content:space-between;font-size:11px;color:#8B949E;padding:2px 0"><span>Compra #'+co.num+' · total '+fmt(co.total)+'</span><span style="color:#FB923C">debe '+fmt(co.adeudo)+'</span></div>';
          });
          html+='</div>';
        });
        html+='<div style="height:1px;background:#30363D;margin:8px 0"></div>';
        html+=srow("TOTAL DEUDA PROVEEDORES",fmt(totalDeuda),"#F85149",true);
      }
      html+='</div>';
      // Repartidores
      var repKeys=Object.keys(repDeuda).filter(function(r){return repDeuda[r].adeudo>0.01});
      var totalRep=repKeys.reduce(function(a,r){return a+repDeuda[r].adeudo},0);
      html+='<div class="card"><div style="font-size:10px;color:#8B949E;letter-spacing:.12em;margin-bottom:12px">REPARTIDORES</div>';
      if(!repKeys.length){html+='<div style="color:#8B949E;font-size:12px">Sin adeudos ✓</div>';}
      else{
        repKeys.forEach(function(rep){
          var info=repDeuda[rep];
          html+='<div style="margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #30363D">';
          html+='<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-weight:700;color:#E6EDF3">'+rep+'</span><span style="color:#F85149;font-weight:700">'+fmt(info.adeudo)+'</span></div>';
          info.rutas.forEach(function(r){html+='<div style="display:flex;justify-content:space-between;font-size:11px;color:#8B949E;padding:1px 0"><span>'+(r.ruta?'Ruta #'+r.ruta+' · ':'')+'Compra #'+r.num+' · '+r.fecha+(r.peds?' · '+r.peds+' ped.':'')+'</span><span style="color:#FB923C">'+fmt(r.adeudo)+'</span></div>';});
          html+='</div>';
        });
        html+='<div style="height:1px;background:#30363D;margin:8px 0"></div>';
        html+=srow("TOTAL REPARTIDORES",fmt(totalRep),"#F85149",true);
      }
      html+='</div>';
      html+='<div class="card"><div style="font-size:10px;color:#8B949E;letter-spacing:.12em;margin-bottom:12px">INVERSIÓN SOCIOS</div>';
      html+=srow("Inversión socios",fmt(d.inv2),"#FB923C");
      html+='<div style="height:1px;background:#30363D;margin:8px 0"></div>';
      html+=srow("TOTAL PASIVOS",fmt(d.pasivos+totalDeuda+totalRep),"#F85149",true);
      html+='</div></div>';
    rc.innerHTML=html;
    }); // end sGET envios
  }
  }
  load();
}

/* ── USUARIOS ────────────────────────────────────────────────────────── */
function rUsuarios(el){
  var usuarios=JSON.parse(JSON.stringify(USUARIOS));
  function renderList(){
    var html='<div class="mod"><div style="display:flex;justify-content:space-between;margin-bottom:20px"><h1 style="font-size:18px;font-weight:700">Usuarios</h1><button class="btn btn-p" onclick="usNuevo()">+ Nuevo</button></div>';
    html+='<table><thead><tr><th>Nombre</th><th>Usuario</th><th>Rol</th><th>Módulos</th><th></th></tr></thead><tbody>';
    usuarios.forEach(function(u){
      var activos=MODS.filter(function(m){return u.p[m.k]});
      html+='<tr><td style="font-weight:700">'+u.nombre+'</td><td style="color:#8B949E">@'+u.u+'</td><td>'+bdg(u.rol,u.c)+'</td>';
      html+='<td><div style="display:flex;gap:4px;flex-wrap:wrap">'+activos.map(function(m){return'<span style="font-size:10px;padding:2px 6px;border-radius:2px;background:'+m.c+'20;color:'+m.c+'">'+m.l+'</span>'}).join("")+'</div></td>';
      html+='<td><button class="btn btn-o btn-s" style="border-color:#4A9EFF;color:#4A9EFF" onclick="usEdit('+u.id+')">editar</button></td></tr>';
    });
    html+='</tbody></table></div>';
    el.innerHTML=html;
  }
  window.usNuevo=function(){usForm(null)};
  window.usEdit=function(id){usForm(usuarios.find(function(u){return u.id===id}))};
  function usForm(ue){
    var esEd=!!ue;
    var perms=esEd?Object.assign({},ue.p):{};
    var PDEF={
      admin:MODS.reduce(function(a,m){a[m.k]=1;return a},{}),
      socio:MODS.reduce(function(a,m){a[m.k]=["pedidos","ventas","clientes","reportes"].indexOf(m.k)>=0?1:0;return a},{}),
      vendedor:MODS.reduce(function(a,m){a[m.k]=["pedidos","ventas","envios"].indexOf(m.k)>=0?1:0;return a},{}),
      almacen:MODS.reduce(function(a,m){a[m.k]=["pedidos","compras","produccion","envios","inventario","productos"].indexOf(m.k)>=0?1:0;return a},{})
    };
    var RCOLORS={admin:"#00C896",socio:"#4A9EFF",vendedor:"#FB923C",almacen:"#C084FC"};
    var html='<div class="mod"><div style="display:flex;justify-content:space-between;margin-bottom:20px"><h1 style="font-size:18px;font-weight:700">'+(esEd?"Editar":"Nuevo")+' Usuario</h1><button class="btn btn-g" onclick="goMod(\'usuarios\')">← Cancelar</button></div>';
    html+='<div class="grid2"><div class="card">';
    html+=fi("NOMBRE",'<input id="usnom" type="text" value="'+(esEd?ue.nombre:"")+'" autofocus>');
    html+=fi("USUARIO",'<input id="ususu" type="text" value="'+(esEd?ue.u:"")+'">');
    html+=fi("CONTRASEÑA",'<input id="uspw" type="password" value="">');
    html+=fi("ROL",selHtml("usrol",["admin","socio","vendedor","almacen"].map(function(r){return{v:r,l:r}}),esEd?ue.rol:"vendedor"));
    html+='<button class="btn btn-o" style="border-color:#8B949E;color:#8B949E;width:100%" onclick="usAplicarRol()">Aplicar permisos del rol</button>';
    html+='</div><div class="card"><div style="font-size:10px;color:#8B949E;letter-spacing:.12em;margin-bottom:12px">MÓDULOS CON ACCESO</div><div id="usperms" style="display:grid;grid-template-columns:1fr 1fr;gap:8px"></div></div></div>';
    html+='<div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px"><button class="btn btn-g" onclick="goMod(\'usuarios\')">Cancelar</button><button class="btn btn-p" onclick="usGuardar('+(esEd?ue.id:"null")+')">'+(esEd?"Actualizar →":"Crear →")+'</button></div></div>';
    el.innerHTML=html;

    function renderPerms(){
      var pp=$("usperms");if(!pp)return;
      pp.innerHTML=MODS.map(function(m){
        var on=!!perms[m.k];
        return'<div onclick="usToggle(\''+m.k+'\')" style="display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:2px;cursor:pointer;background:'+(on?m.c+"18":"#21262D")+';border:1px solid '+(on?m.c+"50":"#30363D")+'"><span style="color:'+m.c+'">'+m.i+'</span><span style="font-size:11px;color:'+(on?"#E6EDF3":"#8B949E")+';font-weight:'+(on?700:400)+';flex:1">'+m.l+'</span><span style="color:'+(on?"#00C896":"#30363D")+'">'+(on?"✓":"○")+'</span></div>';
      }).join("");
    }
    window.usToggle=function(k){perms[k]=perms[k]?0:1;renderPerms()};
    window.usAplicarRol=function(){var r=($("usrol")||{}).value||"vendedor";perms=Object.assign({},PDEF[r]||{});renderPerms()};
    window.usGuardar=function(uid){
      var nom=($("usnom")||{}).value||"";
      var usu=($("ususu")||{}).value||"";
      var pw=($("uspw")||{}).value||"";
      if(!nom||!usu){alert("Completa nombre y usuario");return}
      var rol=($("usrol")||{}).value||"vendedor";
      var maxId=Math.max.apply(null,usuarios.map(function(u){return u.id}));
      var nuevo={id:uid||maxId+1,nombre:nom,u:usu.toLowerCase(),pw:pw||(esEd?ue.pw:"1234"),rol:rol,c:RCOLORS[rol]||"#8B949E",p:perms};
      if(uid){for(var i=0;i<usuarios.length;i++){if(usuarios[i].id===uid){usuarios[i]=nuevo;break}}for(var j=0;j<USUARIOS.length;j++){if(USUARIOS[j].id===uid){USUARIOS[j]=nuevo;break}}}
      else{usuarios.push(nuevo);USUARIOS.push(nuevo)}
      renderList();goMod("usuarios");toast(uid?"Usuario actualizado":"Usuario creado");
    };
    renderPerms();
  }
  renderList();
}


function upsertProducto(nombre,tipo,categoria){
  if(!nombre)return Promise.resolve();
  // Get ALL products and check for exact match to avoid race conditions
  return sGET("productos","order=id").then(function(todos){
    todos=Array.isArray(todos)?todos:[];
    var exact=todos.filter(function(r){return r.nombre===nombre});
    if(exact.length>0){
      // Already exists — update if missing fields
      var upd={};
      if(categoria&&!exact[0].categoria)upd.categoria=categoria;
      if(tipo&&!exact[0].tipo)upd.tipo=tipo;
      // Delete any extras beyond the first
      var extras=exact.slice(1);
      extras.forEach(function(e){sDEL("productos","id=eq."+e.id)});
      if(Object.keys(upd).length)return sPATCH("productos","id=eq."+exact[0].id,upd);
      return Promise.resolve();
    } else {
      return sPOST("productos",{nombre:nombre,tipo:tipo||"insumo",categoria:categoria||"",descripcion:""});
    }
  });
}
