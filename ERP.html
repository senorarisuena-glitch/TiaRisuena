<title>ERP</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0D1117;color:#E6EDF3;font-family:monospace;min-height:100vh}
input,select,textarea{font-family:monospace;outline:none;color:#E6EDF3}
button{cursor:pointer;font-family:monospace}
.sidebar{width:200px;background:#161B22;border-right:1px solid #30363D;position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;z-index:10}
.main{margin-left:200px;flex:1;overflow:auto}
.mod{padding:24px}
.card{background:#161B22;border:1px solid #30363D;border-radius:2px;padding:20px;margin-bottom:16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.fi{margin-bottom:14px}
.fi label{display:block;font-size:10px;color:#8B949E;letter-spacing:.1em;margin-bottom:5px}
.fi input,.fi select,.fi textarea{width:100%;background:#0D1117;border:1px solid #30363D;border-radius:2px;padding:9px 11px;font-size:13px}
.fi-ro{background:#21262D;border:1px solid #30363D;border-radius:2px;padding:9px 11px;font-size:13px;color:#8B949E}
.btn{padding:10px 20px;border-radius:2px;font-weight:700;font-size:13px;letter-spacing:.07em;border:none}
.btn-p{background:#00C896;color:#0D1117}
.btn-o{background:transparent;border:1px solid;font-weight:700;font-size:13px;border-radius:2px;padding:10px 20px}
.btn-g{background:transparent;border:none;color:#8B949E;font-weight:700;font-size:13px;padding:10px 20px}
.btn-s{padding:5px 12px;font-size:11px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:8px 10px;font-size:10px;color:#8B949E;letter-spacing:.08em;border-bottom:1px solid #30363D;text-align:left;font-weight:700}
td{padding:8px 10px;font-size:12px;border-bottom:1px solid #30363D;vertical-align:middle}
.badge{font-size:10px;padding:2px 8px;border-radius:2px;font-weight:600;display:inline-block}
.toast{position:fixed;top:20px;right:20px;z-index:999;background:#161B22;border-radius:3px;padding:10px 18px;font-size:12px;font-weight:700;box-shadow:0 4px 20px #0006;display:none}
.empty{background:#21262D;border:1px solid #30363D;border-radius:2px;padding:40px;text-align:center;color:#8B949E}
.spin{padding:40px;text-align:center;color:#8B949E}
.tab-nav{display:flex;border-bottom:1px solid #30363D;overflow-x:auto;margin-bottom:20px}
.tab-btn{padding:9px 14px;border:none;background:transparent;color:#8B949E;font-family:monospace;font-size:11px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.tab-btn.on{color:#E6EDF3;font-weight:700;border-bottom-color:#00C896;background:#21262D}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- LOGIN -->
<div class="login-wrap" id="login-page">
  <div style="background:#161B22;border:1px solid #30363D;border-radius:4px;padding:40px;width:360px;max-width:90vw">
    <div style="text-align:center;margin-bottom:32px">
      <div style="font-size:36px;color:#00C896;margin-bottom:8px">⬡</div>
      <div style="font-size:20px;font-weight:700">ERP · Sistema de Gestión</div>
    </div>
    <div class="fi"><label>USUARIO</label><input id="lu" type="text" autofocus></div>
    <div class="fi"><label>CONTRASEÑA</label><input id="lp" type="password" onkeydown="if(event.key=='Enter')doLogin()"></div>
    <div id="lerr" style="display:none;background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.4);border-radius:2px;padding:8px 12px;font-size:11px;color:#F85149;margin-bottom:14px"></div>
    <button class="btn btn-p" style="width:100%" onclick="doLogin()">Entrar →</button>

  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <div class="sidebar">
    <div style="padding:20px 16px;border-bottom:1px solid #30363D">
      <div style="font-size:14px;font-weight:700;color:#00C896">⬡ ERP</div>
      
    </div>
    <div id="sidenav" style="flex:1;overflow:auto;padding:8px 0"></div>
    <div style="padding:12px 16px;border-top:1px solid #30363D">
      <div id="uname" style="font-size:11px;font-weight:700"></div>
      <div id="ubadge" style="margin-top:4px"></div>
      <button onclick="doLogout()" style="margin-top:8px;background:transparent;border:1px solid #30363D;border-radius:2px;padding:4px 8px;color:#8B949E;font-family:monospace;font-size:10px">Cerrar sesión</button>
    </div>
  </div>
  <div class="main" id="main"></div>
</div>

var IS_PROD=true; // Force production mode

/* DB layer */
function dbg(t){try{return JSON.parse(localStorage.getItem("erp_"+t)||"[]")}catch(e){return[]}}
function dbs(t,r){localStorage.setItem("erp_"+t,JSON.stringify(r))}
function dbf(rows,q){
  if(!q)return rows;
  var parts=q.split("&").filter(function(p){return/^\w+=/.test(p)});
  if(!parts.length)return rows;
  return rows.filter(function(row){
    return parts.every(function(p){
      var m=p.match(/^(\w+)=(eq|gt|lt|neq|in)\.(.+)$/);
      if(!m)return true;
      var k=m[1],op=m[2],v=m[3],rv=row[k];
      if(op==="eq")return String(rv)===String(v);
      if(op==="gt")return+rv>+v;
      if(op==="lt")return+rv<+v;
      if(op==="neq")return String(rv)!==String(v);
      if(op==="in")return v.replace(/[()]/g,"").split(",").indexOf(String(rv))>=0;
      return true;
    });
  });
}
function dbsort(rows,q){
  var m=(q||"").match(/order=([\w.]+)/);
  if(!m)return rows;
  var fields=m[1].split(",").map(function(f){var p=f.split(".");return{k:p[0],d:p[1]||"asc"}});
  return rows.slice().sort(function(a,b){
    for(var i=0;i<fields.length;i++){
      var k=fields[i].k,d=fields[i].d;
      var av=a[k],bv=b[k];
      if(!isNaN(parseFloat(av))){av=parseFloat(av)||0;bv=parseFloat(bv)||0;}
      if(av!==bv)return d==="desc"?(av>bv?-1:1):(av>bv?1:-1);
    }
    return 0;
  });
}
function sGET(t,q){
  if(IS_PROD){
    return fetch(SU+"/rest/v1/"+t+(q?"?"+q:""),{headers:{"apikey":SK,"Authorization":"Bearer "+SK}}).then(function(r){return r.json()}).catch(function(){return[]});
  }
  return Promise.resolve(dbsort(dbf(dbg(t),q),q));
}
function sPOST(t,b){
  if(IS_PROD){
    return fetch(SU+"/rest/v1/"+t,{method:"POST",headers:{"apikey":SK,"Authorization":"Bearer "+SK,"Content-Type":"application/json","Prefer":"return=representation"},body:JSON.stringify(b)}).then(function(r){return r.json().then(function(d){if(r.ok)return d;console.error("POST "+t+" error:",d);toast("❌ Error: "+(d.message||d.hint||d.details||JSON.stringify(d)),"err");console.error("DB Error:",d);return{};});}).catch(function(e){console.error(e);return{};});
  }
  var rows=dbg(t);
  // Dedup: for movimientos, check same fecha+monto+movimiento+cuenta within 2 seconds
  if(t==="movimientos"){
    var now=Date.now();
    var dup=rows.find(function(r){
      return r.fecha===b.fecha&&String(r.monto)===String(b.monto)&&
             r.movimiento===b.movimiento&&r.cuenta===b.cuenta&&
             (!r._ts||now-r._ts<2000);
    });
    if(dup)return Promise.resolve([dup]);
  }
  // Dedup for ventas: same ticket
  if(t==="ventas"&&b.ticket){
    if(rows.find(function(r){return r.ticket===b.ticket}))return Promise.resolve([rows.find(function(r){return r.ticket===b.ticket})]);
  }
  // Dedup for seguimientos: same pedido_ticket
  if(t==="seguimientos"&&b.pedido_ticket){
    if(rows.find(function(r){return r.pedido_ticket===b.pedido_ticket}))return Promise.resolve([rows.find(function(r){return r.pedido_ticket===b.pedido_ticket})]);
  }
  var nr=Object.assign({},b,{id:b.id||Date.now(),_ts:Date.now()});
  rows.push(nr);dbs(t,rows);
  return Promise.resolve([nr]);
}
function sPATCH(t,q,b){
  if(IS_PROD){
    return fetch(SU+"/rest/v1/"+t+"?"+q,{method:"PATCH",headers:{"apikey":SK,"Authorization":"Bearer "+SK,"Content-Type":"application/json"},body:JSON.stringify(b)}).then(function(r){return r.ok}).catch(function(){return false});
  }
  var rows=dbg(t),m=q.match(/^(\w+)=eq\.(.+)$/);
  if(m)rows=rows.map(function(r){return String(r[m[1]])===String(m[2])?Object.assign({},r,b):r});
  dbs(t,rows);return Promise.resolve(true);
}
function sPostLote(body){
  // Auto-assign num_movimiento
  return sGET("lotes","select=num_movimiento&order=num_movimiento.desc&limit=1").then(function(rows){
    var last=Array.isArray(rows)&&rows[0]?parseInt(rows[0].num_movimiento)||0:0;
    body.num_movimiento=last+1;
    return sPOST("lotes",body);
  });
}
function sDEL(t,q){
  if(IS_PROD){
    return fetch(SU+"/rest/v1/"+t+"?"+q,{method:"DELETE",headers:{"apikey":SK,"Authorization":"Bearer "+SK}}).then(function(r){return r.ok}).catch(function(){return false});
  }
  var rows=dbg(t),m=q.match(/^(\w+)=eq\.(.+)$/);
  if(m)rows=rows.filter(function(r){return String(r[m[1]])!==String(m[2])});
  dbs(t,rows);return Promise.resolve(true);
}

  function load(){
    Promise.all([
      sGET("seguimientos","order=fecha_creado.desc"),
      sGET("envios","order=num_envio.desc"),
      sGET("ventas","order=ticket.desc"),
      sGET("coins_transacciones","estado=eq.pendiente&order=created_at.desc")
    ]).then(function(res){
      var allSegs=Array.isArray(res[0])?res[0]:[];
      var envios=Array.isArray(res[1])?res[1]:[];
      var allVentas=Array.isArray(res[2])?res[2]:[];
      var coinsReqs=Array.isArray(res[3])?res[3]:[];
      // Pedidos tienda = seguimientos con origen="tienda", mapeados al formato de pedCard
      var pedidos=allSegs.filter(function(s){return s.origen==="tienda";}).map(function(s){
        var st=s.pedido_ticket?"concretado":(s.estado==="cancelado"?"cancelado":"pendiente");
        return{
          id:s.id,
          nb:s.cliente||s.nb||"",
          tel:s.tel||"—",
          dir:s.dir||"—",
          items:Array.isArray(s.items)?s.items:[],
          total:s.total||0,
          pago:s.pago||s.metodo_pago||"",
          pagado:s.pagado||false,
          folio:s.folio||"",
          fecha:s.fecha_creado||hoy(),
          status:st,
          estado_envio:s.estado||"preparando",
          num_envio:s.num_envio||null,
          ticket:s.pedido_ticket||null,
          captura:s.comprobante_url||null,
          origen:"tienda"
        };
      });
      var ventaTickets=new Set(allVentas.map(function(v){return String(v.ticket);}));
      var erpSegs=allSegs.filter(function(s){return s.origen==="erp"&&s.pedido_ticket&&ventaTickets.has(String(s.pedido_ticket));});
      var erpPeds=erpSegs.map(function(s){
        var envio=envios.find(function(e){
          return (e.pedidos||[]).some(function(p){return String(p.ticket)===String(s.pedido_ticket);});
        });
        if(!envio&&s.num_envio)envio=envios.find(function(e){return String(e.num_envio)===String(s.num_envio);});
        var estadoReal=envio?envio.status:(s.estado||"preparando");
        var ventaData=allVentas.find(function(v){return String(v.ticket)===String(s.pedido_ticket)||String(v.id)===String(s.venta_id);});
        return{
          id:"seg_"+s.id,
          nb:(s.cliente_codigo?s.cliente_codigo+" · ":"")+s.cliente,
          tel:s.tel||"—",
          dir:s.dir||"—",
          items:ventaData&&Array.isArray(ventaData.lineas)?ventaData.lineas.map(function(l){return{nb:l.desc||l.nombre,q:parseFloat(l.cant||1),p:parseFloat(l.pu||0)};}):[],
          total:s.total||ventaData&&ventaData.monto_venta||0,
          pago:s.pago||"ERP",
          captura:s.comprobante_url||null,
          fecha:s.fecha_creado||hoy(),
          status:estadoReal==="entregado"?"entregado":"concretado",
          estado_envio:estadoReal,
          num_envio:envio?envio.num_envio:s.num_envio||null,
          _seg:s,origen:"erp",
          ticket:s.pedido_ticket
        };
      });
      render(pedidos.concat(erpPeds),envios,coinsReqs);  // pedidos = tienda sin concretar
    });
  }
  window.pedFiltro=function(f){filtro=f;load();};
  window.pedEntregaOficina=function(id){
    if(!confirm("¿Marcar como entregado en oficina?"))return;
    var fecha=new Date().toLocaleDateString("es-MX");
    var proms=[];
    // id puede ser "seg_XXX" (ERP) o numero (tienda)
    var isErpSeg=String(id).indexOf("seg_")===0;
    if(isErpSeg){
      // ERP: update seguimiento directly
      var segId=String(id).replace("seg_","");
      sGET("seguimientos","id=eq."+segId).then(function(segs){
        var seg=segs&&segs[0];
        if(seg){
          var hist=(seg.historial||[]).concat([{estado:"entregado",fecha:fecha,nota:"Entrega en oficina"}]);
          sPATCH("seguimientos","id=eq."+segId,{estado:"entregado",historial:hist}).then(function(){
            toast("✅ Entregado en oficina");load();
          });
        }
      });
    } else {
      // Tienda: solo actualizar seguimiento (ya no hay tabla pedidos)
      sGET("seguimientos","id=eq."+String(id)).then(function(segs){
        var seg=segs&&segs[0];
        if(seg){
          var hist=(seg.historial||[]).concat([{estado:"entregado",fecha:fecha,nota:"Entrega en oficina"}]);
          sPATCH("seguimientos","id=eq."+seg.id,{estado:"entregado",historial:hist}).then(function(){
            toast("✅ Entregado en oficina");load();
          });
        }
      });
    }
  };

function actualizarStatsCliente(cliId, monto){
  if(!cliId)return Promise.resolve();
  return sGET("clientes","id=eq."+cliId).then(function(rows){
    var cli=rows&&rows[0];if(!cli)return Promise.resolve();
    var nuevoGastado=parseFloat(cli.gastado||0)+parseFloat(monto||0);
    var nuevoPedidos=parseInt(cli.pedidos_count||0)+1;
    return sPATCH("clientes","id=eq."+cliId,{gastado:nuevoGastado,pedidos_count:nuevoPedidos});
  });
}
  window.pedConc=function(id,sinPago){
    // Leer formulario de pago (solo si no es coins)
    var cuenta=sinPago?null:($("pp_cuenta_"+id)||{}).value||"Caja Chica";
    var tipo=sinPago?null:($("pp_tipo_"+id)||{}).value||"Transferencia";
    var monto=sinPago?0:parseFloat(($("pp_monto_"+id)||{}).value)||0;

    sGET("ventas","select=ticket&order=ticket.desc&limit=1").then(function(rows){
      var maxT=rows&&rows[0]?rows[0].ticket:0;
      var ticket=maxT+1;
      sGET("seguimientos","id=eq."+id).then(function(pr){
        var ped=pr&&pr[0];if(!ped)return;
        var buscarCli=ped.cliente_id?Promise.resolve(ped.cliente_id):sGET("clientes","telefono=eq."+(ped.tel||"")+"&select=id&limit=1").then(function(r){return r&&r[0]?r[0].id:0;});
        buscarCli.then(function(cliId){
          var items=Array.isArray(ped.items)?ped.items:[];
          var totalMonto=parseFloat(ped.total)||0;

          // Obtener costos actuales del inventario para enriquecer líneas
          sGET("lotes","order=fecha,id").then(function(lotes){
            lotes=Array.isArray(lotes)?lotes:[];
            var stockCosto={};
            lotes.forEach(function(lt){
              if(!lt.sku||lt.movimiento!=="entrada")return;
              if(parseFloat(lt.costo_unit||0)>0)stockCosto[lt.sku]=parseFloat(lt.costo_unit);
            });

          var lineasEnriq=items.map(function(l){
            var qty=parseFloat(l.qty||l.quantity||l.cant||1);
            var price=parseFloat(l.price||l.unit_price||l.precio||l.precio_venta||0);
            var skuVal=l.sku||l.inv_id||"";
            var nomVal=l.nombre||l.name||l.desc||l.nb||skuVal||"";
            var cu=parseFloat(l.costo_unit||l.cu||0)||stockCosto[skuVal]||0;
            return Object.assign({},l,{sku:skuVal,nombre:nomVal,cant:qty,precio_venta:price,costo_unit:cu,utilidad_unit:price-cu});
          });

          // Si es coins, buscar el precio_mxn real de la transacción de coins
          var montoRealProm=sinPago?
            sGET("coins_transacciones","cliente_id=eq."+(cliId||0)+"&estado=eq.aprobado&order=created_at.desc&limit=1").then(function(rows){
              var ct=rows&&rows[0];
              return ct?parseFloat(ct.precio_mxn||totalMonto):totalMonto;
            }):Promise.resolve(totalMonto);

          montoRealProm.then(function(montoReal){
            var montoVenta=sinPago?montoReal:totalMonto;
            var adeudo=sinPago?0:(monto>=totalMonto?0:totalMonto-monto);
            var cobrado=sinPago?montoReal:monto||0;
          sPOST("ventas",{
            ticket:ticket,fecha:hoy(),
            cliente_id:cliId||0,
            cliente_nombre:ped.cliente||ped.nb||"",
            monto_venta:montoVenta,
            adeudo:adeudo,
            cobrado:cobrado,
            costo_productos:0,utilidad:montoVenta,pct_util:0,
            origen:"tienda",
            pedido_id:String(ped.id),
            folio_tienda:ped.folio||"",
            dir_entrega:ped.dir||"",
            metodo_pago:sinPago?"coins":tipo,
            lineas:lineasEnriq
          }).then(function(){
            // Crear lotes de salida por cada línea
            var lotesVenta=lineasEnriq.map(function(l){

  window.aprobarCoins=function(crId){

    sGET("coins_transacciones","id=eq."+crId).then(function(rows){
      var cr=rows&&rows[0];if(!cr)return;
      var clienteId=cr.cliente_id;
      var totalCoins=cr.cantidad;

      // 2. Crear movimiento en tesorería
      var cuentasMap={};CUENTAS.forEach(function(x){cuentasMap[x.n]=x.id;});
      sPOST("movimientos",{

              return r.ok;

        updateCoins.then(function(){

      if(seg)marcarSeg(seg);
    });

}

  function vForm(ve){
    var esEd=!!ve;
    var maxT=ventas.length?Math.max.apply(null,ventas.map(function(v){return v.ticket||0})):0;
    var autoT=esEd?ve.ticket:maxT+1;
    var lineas=esEd&&ve.lineas&&ve.lineas.length?JSON.parse(JSON.stringify(ve.lineas)):[{inv_id:"",desc:"",cant:1,pu:0,cu:0}];
    var cliId=esEd?String(ve.cliente_id||""):"";
    var cliNom=esEd?ve.cliente_nombre||"":"";
    var cliCodigo="";var cliTel="";var cliDir="";

    function calcTotals(){
      var tv=lineas.reduce(function(a,l){return a+(parseFloat(l.cant)||0)*(parseFloat(l.pu)||0)},0);
      var tc=lineas.reduce(function(a,l){return a+(parseFloat(l.cant)||0)*(parseFloat(l.cu)||0)},0);
      return{tv:tv,tc:tc};
    }
    function renderForm(){
      var t=calcTotals();
      var montoEl=$("vmonto");
      // Always update monto from line items total
      if(montoEl&&t.tv>0){
        montoEl.value=t.tv.toFixed(2);

          var catActual=l.categoria||(skuItem?skuItem.cat:'');
          var skusEnCat=catActual?ventaSKUs.filter(function(s){return s.cat===catActual;}):ventaSKUs;
          var cu=parseFloat(l.cu||0);
          var pu=parseFloat(l.pu||0);

          var utilColor=util===null?"#8B949E":util>=70?"#00C896":util>=50?"#E3B341":"#F85149";
          // % descuento: pu vs precio base del catálogo (si lo tuviera), o vs precio máximo del inventario
          var precioBase=parseFloat(l.precio_base||0);
          var desc=precioBase>0&&pu<precioBase?((precioBase-pu)/precioBase*100):0;

          lhtml+='<tr style="vertical-align:middle">';

          lhtml+='<td style="padding:4px 8px;text-align:right;color:#00C896;font-weight:700;white-space:nowrap" id="vtot'+i+'">'+fmt(tot)+'</td>';

          lhtml+='<td style="padding:4px 8px;text-align:right;font-weight:700;white-space:nowrap;color:'+utilColor+'" id="vutil'+i+'">'+(util!==null?util.toFixed(1)+"%":"—")+'</td>';
          // % Desc
          lhtml+='<td style="padding:4px 8px;text-align:right;font-size:11px;white-space:nowrap;color:'+descColor+'" id="vdesc_pct'+i+'">'+(desc>0?'-'+desc.toFixed(1)+"%":"—")+'</td>';

    var html='<div class="mod">';

    html+='<div class="grid2">';

    html+='<div class="fi"><label>TICKET #</label><div class="fi-ro">'+autoT+' 🔒</div></div>';
    html+=fi("FECHA",'<input id="vfecha" type="date" value="'+(esEd?ve.fecha:hoy())+'">');
    html+='<div class="fi"><label>CLIENTE *</label>';
    html+='<input id="vcliinput" type="text" placeholder="Escribe nombre o código..." autocomplete="off" value="'+cliNom+'" oninput="vCliInput(this.value)" style="width:100%;background:#0D1117;border:1px solid #30363D;border-radius:2px;padding:9px 11px;font-size:13px;color:#E6EDF3">';

    html+='</div>';
    html+=fi("MONTO TOTAL ($)",'<input id="vmonto" type="number" value="'+(esEd?ve.monto_venta:0)+'" oninput="renderVForm()">');
    var si_sel='background:#0D1117;border:1px solid #30363D;border-radius:2px;padding:7px 10px;font-size:12px;color:#E6EDF3;width:100%';
    html+=fi("MÉTODO DE PAGO",'<select id="vmetodo" style="'+si_sel+'"><option value="efectivo"'+(esEd&&ve.metodo_pago==="efectivo"?" selected":"")+'>Efectivo</option><option value="transferencia"'+(esEd&&ve.metodo_pago==="transferencia"?" selected":"")+'>Transferencia</option><option value="deposito"'+(esEd&&ve.metodo_pago==="deposito"?" selected":"")+'>Depósito</option><option value="coins"'+(esEd&&ve.metodo_pago==="coins"?" selected":"")+'>Coins</option></select>');
    html+=fi("DIR. ENTREGA",'<input id="vdir" type="text" placeholder="Dirección de entrega (opcional)" value="'+(esEd&&ve.dir_entrega?ve.dir_entrega:"")+'">');
    html+=fi("HORARIO",'<input id="vhorario" type="text" placeholder="Ej: 3-5pm" value="'+(esEd&&ve.horario_entrega?ve.horario_entrega:"")+'">');
    html+='</div>';
    html+='<div class="card"><div style="font-size:10px;color:#8B949E;letter-spacing:.12em;margin-bottom:12px">RESUMEN</div><div id="vresumen"></div></div>';
    html+='</div>';
    html+='<div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:14px"><div style="font-size:10px;color:#8B949E;letter-spacing:.12em">PRODUCTOS</div><button class="btn btn-o btn-s" style="border-color:#00C896;color:#00C896" onclick="vAddL()">+ Línea</button></div>';
    html+='<table><thead><tr><th style="min-width:130px">Categoría</th><th style="min-width:120px">SKU</th><th>Descripción</th><th style="text-align:right;min-width:70px">Cant</th><th style="text-align:right;min-width:80px">Costo</th><th style="text-align:right;min-width:90px">Monto ($)</th><th style="text-align:right;min-width:80px">Total</th><th style="text-align:right;min-width:65px">% Util</th><th style="text-align:right;min-width:65px">% Desc</th><th></th></tr></thead><tbody id="vlineas"></tbody></table></div>';
    html+='<div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px"><button class="btn btn-g" onclick="goMod(\'ventas\')">Cancelar</button><button class="btn btn-p" onclick="vGuardar('+(esEd?ve.id:"null")+')">'+(esEd?"Actualizar →":"Registrar →")+'</button></div></div>';
    el.innerHTML=html;

    window.renderVForm=renderForm;
    // Create dropdown element once
    var vcliDropEl=document.createElement("div");
    vcliDropEl.id="vclidrop_float";
    vcliDropEl.style.cssText="display:none;position:fixed;background:#161B22;border:1px solid #30363D;border-radius:2px;max-height:200px;overflow-y:auto;z-index:9999;min-width:300px;box-shadow:0 4px 20px #0008";
    document.body.appendChild(vcliDropEl);

    window.vCliInput=function(val){
      cliId="";cliNom=val;
      var dropE=document.getElementById("vclidrop_float");
      var sel=document.getElementById("vclisel");
      if(sel)sel.textContent="";
      if(!val||val.length<1){if(dropE)dropE.style.display="none";return;}
      var q=val.toLowerCase();
      var matches=clientes.filter(function(x){
        var nom=(x.nombre||"").toLowerCase();
        var cod=(x.codigo||"").toLowerCase();
        return nom.indexOf(q)>=0||cod.indexOf(q)>=0;
      }).slice(0,10);
      var drop=document.getElementById("vclidrop_float");
      if(!matches.length){if(drop)drop.style.display="none";return;}
      var drop=document.getElementById("vclidrop_float");
      if(drop){
        drop.innerHTML="";
        drop.style.display="block";
        // Position below input
        var inp2=document.getElementById("vcliinput");
        if(inp2){
          var rect=inp2.getBoundingClientRect();
          drop.style.left=rect.left+"px";
          drop.style.top=(rect.bottom+2)+"px";
          drop.style.width=rect.width+"px";
        }
        matches.forEach(function(cl){
          var row=document.createElement("div");
          row.style.cssText="padding:10px 12px;cursor:pointer;font-size:12px;border-bottom:1px solid #30363D";
          row.innerHTML='<span style="color:#C084FC;font-weight:700">'+cl.codigo+'</span> · <span style="color:#E6EDF3">'+cl.nombre+'</span>';
          row.onmousedown=function(e){
            e.preventDefault();
            cliId=String(cl.id);cliNom=cl.nombre;cliCodigo=cl.codigo;cliTel=cl.telefono||"";cliDir=cl.direccion||"";
            var inp=document.getElementById("vcliinput");
            if(inp)inp.value=cl.codigo+' · '+cl.nombre;
            drop.style.display="none";
          };
          row.onmouseover=function(){this.style.background="#21262D"};
          row.onmouseout=function(){this.style.background="transparent"};
          drop.appendChild(row);
        });
      }
    };
    window.vCliSel=function(){};
    window.vBusCod=function(){};
    setTimeout(function(){
      var inp=document.getElementById("vcliinput");
      if(inp)inp.onblur=function(){setTimeout(function(){var d=document.getElementById("vclidrop_float");if(d)d.style.display="none"},200)};
    },100);
    window.vSelInv=function(i,vid){
      var item=inv.find(function(x){return String(x.id)===String(vid)});
      lineas[i].inv_id=vid;lineas[i].desc=item?item.nombre:"";lineas[i].cu=item?item.costo_unit:0;
      renderForm();
    };
    window.vSelCat=function(i,cat){
      lineas[i].categoria=cat;
      lineas[i].sku='';
      lineas[i].desc='';
      lineas[i].cu=0;
      renderForm._force=true;renderForm();
    };
    window.vSelSku=function(i,sku){
      var item=CATALOGO_SKU.find(function(s){return s.sku===sku;})||null;
      lineas[i].sku=sku;
      lineas[i].desc=item?item.desc:'';
      lineas[i].categoria=item?item.cat:'';
      // Set cu from best (highest) inventory price for this SKU
      var bestCu=0;
      inv.forEach(function(x){if(x.nombre===sku||x.nombre===(item?item.desc:''))bestCu=Math.max(bestCu,parseFloat(x.costo_unit||0));});
      lineas[i].cu=bestCu;
      // precio_base = costo / (1 - 0.70) → price at 70% margin
      lineas[i].precio_base=bestCu>0?parseFloat((bestCu/0.30).toFixed(2)):0;
      // Update costo label immediately
      var cuLbl2=document.getElementById("vcu_lbl"+i);
      if(cuLbl2)cuLbl2.textContent=bestCu>0?fmt(bestCu):'—';
      // Update category and desc labels without full rebuild
      var catLbl=document.getElementById("vcat_lbl"+i);
      var descLbl=document.getElementById("vdesc_lbl"+i);
      if(catLbl)catLbl.textContent=item?item.cat:'—';
      if(descLbl)descLbl.textContent=item?item.desc:'—';
      // Update util indicator
      vSetLCalc(i,'pu',lineas[i].pu);
    };
    window.vDescInput=function(i,val){
      lineas[i].desc=val;
      var item=inv.find(function(x){return x.nombre===val});
      if(item){
        lineas[i].inv_id=item.id;
        lineas[i].categoria=item.categoria||"";
        lineas[i].cu=parseFloat(item.costo_unit)||0;
        // Update category label
        var lbl=document.getElementById("vcat_lbl"+i);
        if(lbl)lbl.textContent=item.categoria||"";
      }
      updateResumen();
    };
    window.vSetLDirect=function(i,k,v){lineas[i][k]=v;};
    window.vSetLCalc=function(i,k,v){
      lineas[i][k]=v;
      var cant=parseFloat(lineas[i].cant)||0;
      var pu=parseFloat(lineas[i].pu)||0;
      var cu=parseFloat(lineas[i].cu||0);
      // Total
      var tot=document.getElementById("vtot"+i);
      if(tot)tot.textContent=fmt(cant*pu);
      // Costo label
      var cuLbl=document.getElementById("vcu_lbl"+i);
      if(cuLbl)cuLbl.textContent=cu>0?fmt(cu):'—';
      // % Util
      var utilEl=document.getElementById("vutil"+i);
      if(utilEl){
        if(cu>0&&pu>0){var util=(pu-cu)/pu*100;utilEl.textContent=util.toFixed(1)+"%";utilEl.style.color=util>=70?"#00C896":util>=50?"#E3B341":"#F85149";}
        else{utilEl.textContent="—";utilEl.style.color="#8B949E";}
      }
      // % Desc vs precio_base
      var precioBase=parseFloat(lineas[i].precio_base||0);
      var descEl=document.getElementById("vdesc_pct"+i);
      if(descEl){
        var desc=precioBase>0&&pu<precioBase?((precioBase-pu)/precioBase*100):0;
        descEl.textContent=desc>0?'-'+desc.toFixed(1)+"%":"—";
        descEl.style.color=desc>30?"#F85149":desc>15?"#E3B341":"#8B949E";
      }
      updateResumen();
    };
    window.vSetL=function(i,k,v){lineas[i][k]=v;updateResumen();};
    window.vRemLForce=function(i){lineas.splice(i,1);renderForm._force=true;renderForm();};
    window.vRemL=function(i){lineas.splice(i,1);renderForm._force=true;renderForm();};
    window.vAddL=function(){lineas.push({sku:"",inv_id:"",desc:"",nota:"",categoria:"",cant:1,pu:0,cu:0});renderForm._force=true;renderForm();};
    function updateResumen(){
      var tv=lineas.reduce(function(a,l){return a+(parseFloat(l.cant)||0)*(parseFloat(l.pu)||0);},0);
      var tc=lineas.reduce(function(a,l){return a+(parseFloat(l.cant)||0)*(parseFloat(l.cu)||0);},0);
      var montoEl=$("vmonto");if(montoEl&&tv>0)montoEl.value=tv.toFixed(2);
      var monto=montoEl?parseFloat(montoEl.value)||tv:tv;
      var util=monto-tc;
      var pctUtil=monto>0?(util/monto*100):0;
      var utilColor=pctUtil>=70?"#00C896":pctUtil>=50?"#E3B341":"#F85149";
      // % descuento total (subtotal vs monto cobrar)
      var pctDesc=tv>0&&monto<tv?((tv-monto)/tv*100):0;
      var descColor=pctDesc>30?"#F85149":pctDesc>15?"#E3B341":"#8B949E";
      var pctUtilStr=pctUtil>0?pctUtil.toFixed(1)+"%":"—";
      var pctDescStr=pctDesc>0?"-"+pctDesc.toFixed(1)+"%":"—";
      var html=srow("Subtotal",fmt(tv))+srow("Costo",fmt(tc),"#8B949E");
      html+='<div style="height:1px;background:#30363D;margin:8px 0"></div>';
      html+=srow("Utilidad",fmt(util),utilColor,true);
      html+='<div style="display:flex;justify-content:space-between;margin:6px 0 2px"><span style="font-size:11px;color:#8B949E">% Utilidad</span><span style="font-size:12px;font-weight:700;color:'+utilColor+'">'+pctUtilStr+'</span></div>';
      html+='<div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:11px;color:#8B949E">% Descuento</span><span style="font-size:12px;font-weight:700;color:'+descColor+'">'+pctDescStr+'</span></div>';
      html+='<div style="height:1px;background:#30363D;margin:8px 0"></div>';
      html+=srow("Monto cobrar",fmt(monto),"#E6EDF3",true);
      if($("vresumen"))$("vresumen").innerHTML=html;
    }
    var _vGuardando=false;
    window.vGuardar=function(vid){
      if(_vGuardando)return;
      _vGuardando=true;
      var t=calcTotals();
      var monto=parseFloat(($("vmonto")||{}).value)||t.tv;
      if(!cliNom.trim()){alert("Escribe el nombre del cliente");return}
      // Validar stock
      var sinStock=lineas.filter(function(l){
        var sku=l.sku||l.inv_id||"";
        if(!sku||!l.cant)return false;
        var stock=inv.find(function(x){return x.sku===sku;});
        return stock&&(parseFloat(stock.stock||0)<parseFloat(l.cant||0));
      });
      if(sinStock.length){
        var names=sinStock.map(function(l){return l.sku||l.desc;}).join(", ");
        if(!confirm("⚠️ Stock insuficiente para: "+names+"\n¿Continuar de todas formas?"))return;
      }
      var util=monto-t.tc;
      // Enriquecer lineas con precio_venta, costo_unit y utilidad_unit proporcional
      var totalCosto=t.tc||0;
      var lineasEnriq=lineas.map(function(l){
        var precioUnit=parseFloat(l.precio||l.p||0);
        var cantUnit=parseFloat(l.cant||l.cantidad||1);
        var costoUnit=totalCosto>0&&monto>0?(totalCosto*(precioUnit*cantUnit/monto)/Math.max(cantUnit,1)):0;
        return Object.assign({},l,{
          precio_venta:parseFloat(precioUnit.toFixed(2)),
          costo_unit:parseFloat(costoUnit.toFixed(4)),
          utilidad_unit:parseFloat((precioUnit-costoUnit).toFixed(4))
        });
      });
      var body={
        ticket:autoT,
        fecha:($("vfecha")||{}).value||hoy(),
        cliente_id:parseInt(cliId)||0,
        cliente_nombre:cliNom,
        monto_venta:monto,
        adeudo:esEd?ve.adeudo:monto,
        cobrado:esEd?ve.cobrado:0,
        costo_productos:t.tc,
        utilidad:util,
        pct_util:monto>0?util/monto:0,
        origen:"erp",
        dir_entrega:($("vdir")||{}).value||"",
        horario_entrega:($("vhorario")||{}).value||"",
        metodo_pago:($("vmetodo")||{}).value||"efectivo",
        lineas:lineasEnriq
      };
      var p=vid?sPATCH("ventas","id=eq."+vid,body):sPOST("ventas",body);
      p.then(function(res){
        // Si es nueva venta, crear seguimiento para que aparezca en Pedidos
        if(!vid){
          var ventaId=res&&Array.isArray(res)&&res[0]?res[0].id:String(Date.now());
          sPOST("seguimientos",{
            id:String(Date.now()),
            pedido_id:"erp_"+autoT,
            pedido_ticket:autoT,
            venta_id:ventaId,
            cliente:cliNom,
            cliente_codigo:cliCodigo||"",
            cliente_id:parseInt(cliId)||0,
            tel:cliTel||"",
            dir:cliDir||"",
            total:monto,
            estado:"preparando",
            origen:"erp",
            fecha_creado:hoy(),
            historial:[{estado:"preparando",fecha:hoy()}]
          });
        }
        if(!vid){
          // SALIDA: cada SKU vendido
          var ventaLineas=Array.isArray(body.lineas)?body.lineas:[];
          var lotesV=ventaLineas.map(function(l){
            var sku=l.sku||l.desc||l.nombre||"";
            var cant=parseFloat(l.cant||l.cantidad||0);
            if(!sku||!cant)return Promise.resolve();
            return sPostLote({sku:sku,tipo:"venta",movimiento:"salida",ref_id:autoT,fecha:body.fecha||hoy(),cantidad:cant,costo_unit:parseFloat(l.costo_unit||l.cu||0),concepto:"Venta ticket #"+autoT,num_ref:"V-"+autoT});
          });
          Promise.all(lotesV).then(function(){_vGuardando=false;load();goMod("ventas");toast("Venta registrada");});
        } else {
          // Al editar: borrar lotes viejos de esta venta y recrear
          sDEL("lotes","tipo=eq.venta&ref_id=eq."+String(body.ticket||ve.ticket)).then(function(){
            var ventaLineas=Array.isArray(body.lineas)?body.lineas:[];
            var lotesV=ventaLineas.map(function(l){
              var sku=l.sku||l.desc||l.nombre||"";
              var cant=parseFloat(l.cant||l.cantidad||0);
              if(!sku||!cant)return Promise.resolve();
              return sPostLote({sku:sku,tipo:"venta",movimiento:"salida",ref_id:body.ticket||ve.ticket,fecha:body.fecha||hoy(),cantidad:cant,costo_unit:parseFloat(l.costo_unit||l.cu||0),concepto:"Venta ticket #"+(body.ticket||ve.ticket),num_ref:"V-"+(body.ticket||ve.ticket)});
            });
            Promise.all(lotesV).then(function(){_vGuardando=false;load();goMod("ventas");toast("Venta actualizada");});
          });
        }
      });
    };
    renderForm();
  }
  load();
}

/* ── RECALCULAR ADEUDOS (global) ─────────────────────────────────────── */
function recalcularAdeudos(callback){
  Promise.all([
    sGET("movimientos","order=id.asc"),
    sGET("ventas","order=id.asc")
  ]).then(function(results){
    var allMovs=Array.isArray(results[0])?results[0]:[];
    var allVentas=Array.isArray(results[1])?results[1]:[];
    var cobradoMap={};
    allMovs.forEach(function(m){
      if(!m.egreso&&m.movimiento==="Venta"&&m.gasto_ticket){
        (m.gasto_ticket||"").split(/, (?=[A-Za-z])/).forEach(function(ref){
          var mt=ref.trim().match(/Ticket #(\d+)/);
          if(mt){
            var ticket=parseInt(mt[1]);
            var amtStr=ref.replace(/,/g,"").match(/\$([\d.]+)/);
            var amt=amtStr?parseFloat(amtStr[1]):parseFloat(m.monto||0);
            cobradoMap[ticket]=(cobradoMap[ticket]||0)+amt;
          }
        });
      }
    });
    var patches=allVentas.map(function(v){
      var cobrado=parseFloat((cobradoMap[v.ticket]||0).toFixed(2));
      var adeudo=parseFloat(Math.max(0,parseFloat(v.monto_venta||0)-cobrado).toFixed(2));
      if(Math.abs(cobrado-(v.cobrado||0))>0.01||Math.abs(adeudo-(v.adeudo||0))>0.01){
        return sPATCH("ventas","id=eq."+v.id,{cobrado:cobrado,adeudo:adeudo});
      }
      return Promise.resolve();
    });
    Promise.all(patches).then(function(){if(callback)callback();});
  });
}

              grupos2[co.num_compra].total+=parseFloat(co.total||0);

            var conAdeudo2=Object.values(grupos2).filter(function(co){
              return co.tipo_inv==="servicio"&&((co.total-(pagosMap[co.num_compra]||0))>0.01||linkedNums2.indexOf(co.num_compra)>=0);

        });
      } else if(mov==="Venta"){

          // Al editar: incluir tickets vinculados aunque adeudo sea 0

          var wrap2=document.createElement("div");

          vs.forEach(function(v){
            // Monto preloaded si está en gasto_ticket
            var preloadMonto=parseFloat(v.adeudo||0);
            var preloadChecked=false;
            if(esEd&&me.gasto_ticket){
              var regex=new RegExp("Ticket #"+v.ticket+":[^,]*\\$([\\d,]+\\.?\\d*)");
              var match=me.gasto_ticket.match(regex);
              if(match){preloadMonto=parseFloat(match[1].replace(/,/g,""))||preloadMonto;preloadChecked=true;}
            }
            var row2=document.createElement("div");
            row2.style.cssText="display:flex;align-items:center;gap:8px;padding:8px 10px;background:"+(preloadChecked?"rgba(0,200,150,.08)":"#21262D")+";border:1px solid "+(preloadChecked?"#00C896":"#30363D")+";border-radius:2px;margin-bottom:4px;font-size:12px;cursor:pointer";
            row2.innerHTML='<input type="checkbox" id="chk_v'+v.id+'" '+(preloadChecked?"checked":"")+' style="cursor:pointer;width:14px;height:14px;accent-color:#00C896">'+
              '<div style="flex:1"><span style="color:#4A9EFF;font-weight:700">#'+v.ticket+'</span><span style="color:#8B949E;margin-left:8px">'+v.cliente_nombre+'</span></div>'+
              '<div style="display:flex;align-items:center;gap:4px"><span style="font-size:10px;color:#8B949E">Adeudo '+fmt(v.adeudo)+'</span><span style="color:#8B949E;font-size:11px">$</span>'+
              '<input type="number" id="amt_v'+v.id+'" value="'+preloadMonto.toFixed(2)+'" min="0" max="'+(Math.max(v.adeudo,preloadMonto))+'" step="0.01" style="width:90px;background:#0D1117;border:1px solid #30363D;border-radius:2px;padding:4px 6px;font-size:12px;color:#E6EDF3;text-align:right" onclick="event.stopPropagation()">'+
              '</div>';
            var chk2=row2.querySelector("input[type=checkbox]");
            var amt2=row2.querySelector("input[type=number]");

              row2.style.background=chk2.checked?"rgba(0,200,150,.08)":"#21262D";
              recalcTotal2();
            };
            chk2.onchange=updateSel2;
            amt2.oninput=function(){recalcTotal2()};
            row2.onclick=function(e){if(e.target!==chk2&&e.target!==amt2){chk2.checked=!chk2.checked;updateSel2()}};
            wrap2.appendChild(row2);
          });
          var totalRow2=document.createElement("div");
          totalRow2.style.cssText="display:flex;justify-content:space-between;padding:8px 10px;border-top:1px solid #30363D;margin-top:4px;font-size:13px;font-weight:700";
          totalRow2.innerHTML='<span style="color:#8B949E">Total a cobrar:</span><span id="btotalsel2" style="color:#00C896">$0.00</span>';
          wrap2.appendChild(totalRow2);
          bref.innerHTML="";bref.appendChild(wrap2);
          // Auto-select if only one ticket
          if(vs.length===1&&!esEd){
            var ck0=document.getElementById("chk_v"+vs[0].id);
            if(ck0){ck0.checked=true;ck0.dispatchEvent(new Event("change"));}
          }
          recalcTotal2();
          function recalcTotal2(){
            var tot2=0;
            vs.forEach(function(v){
              var ck=document.getElementById("chk_v"+v.id);
              var am=document.getElementById("amt_v"+v.id);
              if(ck&&ck.checked&&am)tot2+=parseFloat(am.value)||0;
            });
            var ts2=document.getElementById("btotalsel2");if(ts2)ts2.textContent=fmt(tot2);
            if($("bmonto"))$("bmonto").value=tot2.toFixed(2);
            var refs2=[];
            vs.forEach(function(v){
              var ck=document.getElementById("chk_v"+v.id);
              var am=document.getElementById("amt_v"+v.id);
              if(ck&&ck.checked&&am&&parseFloat(am.value)>0)refs2.push("Ticket #"+v.ticket+": $"+parseFloat(am.value).toFixed(2));
            });
            bref._refs=refs2;
            bref._ventasMap=vs.reduce(function(a,v){
              var ck=document.getElementById("chk_v"+v.id);
              var am=document.getElementById("amt_v"+v.id);
              if(ck&&ck.checked&&am)a[v.id]={ticket:v.ticket,cobrar:parseFloat(am.value)||0,adeudo:parseFloat(v.adeudo||0)};
              return a;
            },{});
          }
        });
      } else {
        bref.innerHTML="";
        var bi=document.getElementById("bref");if(bi)bi.style.display="block";
      }
    }
    $("bmov").onchange=updateRef;
    // Always trigger on load
    setTimeout(updateRef,150);
    window.bSetEg=function(val){
      egreso=val;
      $("bing").style.background=val?"transparent":"rgba(0,200,150,.2)";$("bing").style.borderColor=val?"#30363D":"#00C896";$("bing").style.color=val?"#8B949E":"#00C896";
      $("beg").style.background=val?"rgba(248,81,73,.2)":"transparent";$("beg").style.borderColor=val?"#F85149":"#30363D";$("beg").style.color=val?"#F85149":"#8B949E";
      setTimeout(function(){updateRef()},50);

      _bGuardando=true;
      var ctaId=parseInt(($("bcta")||{}).value)||1;
      var cta=CUENTAS.find(function(c){return c.id===ctaId})||{n:"?"};
      var monto=parseFloat(($("bmonto")||{}).value)||0;
      var mov=($("bmov")||{}).value||"Venta";
      // Get reference: from checkbox selection or from text input
      var brefEl=document.getElementById("brefextra");
      var gasto_ticket="";
      if(brefEl&&brefEl._refs&&brefEl._refs.length){
        gasto_ticket=brefEl._refs.join(", ");
      } else {
        gasto_ticket=($("bref")||{}).value||"";
      }
      var brefEl2=document.getElementById("brefextra");
      if(brefEl2&&brefEl2._refs&&brefEl2._refs.length){gasto_ticket=brefEl2._refs.join(", ");monto=parseFloat(($("bmonto")||{}).value)||monto;}
      var body={fecha:($("bfecha")||{}).value||hoy(),cuenta:cta.n,cuenta_id:ctaId,tipo_pago:($("btp")||{}).value||"Efectivo",movimiento:mov,gasto_ticket:gasto_ticket,concepto:($("bconc")||{}).value||"",monto:monto,egreso:egreso};
      var p=bid?sPATCH("movimientos","id=eq."+bid,body):sPOST("movimientos",body);
      p.then(function(){
        // Si es venta, actualizar adeudos de las ventas vinculadas
        var brefEl3=document.getElementById("brefextra");
        var ventasMap=brefEl3&&brefEl3._ventasMap?brefEl3._ventasMap:{};
        var ventaProms=Object.keys(ventasMap).map(function(vid){
          var vm=ventasMap[vid];
          var nuevoCobrado=vm.cobrar||0;
          var nuevoAdeudo=Math.max(0,parseFloat(vm.adeudo||0)-nuevoCobrado);
          return sPATCH("ventas","id=eq."+vid,{cobrado:nuevoCobrado,adeudo:nuevoAdeudo});
        });
        Promise.all(ventaProms).then(function(){
          recalcularAdeudos(function(){_bGuardando=false;load();goMod("bancos");toast(bid?"Movimiento actualizado":"Movimiento registrado");});
        });
      });
    };
  }
  load();
}

/* ── COMPRAS ─────────────────────────────────────────────────────────── */
function rCompras(el){
  var compras=[],productos=[];
  function load(){
    sGET("compras","order=num_compra.desc").then(function(d){compras=Array.isArray(d)?d:[];renderList()});
    sGET("productos","order=sku").then(function(d){productos=Array.isArray(d)?d:[]});
  }
  function renderList(){
    var html='<div class="mod"><div style="display:flex;justify-content:space-between;margin-bottom:20px"><h1 style="font-size:18px;font-weight:700">Compras</h1><button class="btn btn-p" onclick="cNueva()">+ Nueva compra</button></div>';
    var soloCompras=compras.filter(function(c){return c.tipo_inv!=="servicio";});
    if(!soloCompras.length){html+='<div class="empty">Sin compras.</div></div>';el.innerHTML=html;return}
    sGET("movimientos","movimiento=eq.Pago Proveedores&egreso=eq.true").then(function(pagos){
      var pagosMap={};
      (Array.isArray(pagos)?pagos:[]).forEach(function(p){
        var _re=/Compra #(\d+)[^$]*\$([\d,]+\.?\d*)/g,_m;
        while((_m=_re.exec(p.gasto_ticket||""))!==null){var n=parseInt(_m[1]);var monto=parseFloat(_m[2].replace(/,/g,""))||0;pagosMap[n]=(pagosMap[n]||0)+monto;}
      });

      // Agrupar por num_compra
      var grupos={};
      soloCompras.forEach(function(c){
        var n=c.num_compra;
        if(!grupos[n])grupos[n]=[];
        grupos[n].push(c);
      });
      var numsSorted=Object.keys(grupos).map(Number).sort(function(a,b){return b-a;});

      html+='<table><thead><tr><th>#</th><th>Fecha</th><th>Proveedor</th><th>Productos</th><th style="text-align:right">Total</th><th style="text-align:right">Adeudo</th><th></th></tr></thead><tbody>';

      numsSorted.forEach(function(n){
        var items=grupos[n];
        var rep=items[0];
        var totalCompra=items.reduce(function(a,c){return a+parseFloat(c.total||0);},0);
        var adeudo=Math.max(0,totalCompra-(pagosMap[n]||0));
        var skuList=items.map(function(c){return c.producto_nombre+'('+c.cantidad+')'}).join(', ');
        var rowId='cg_'+n;

        html+='<tr style="cursor:pointer" onclick="toggleCGroup(\''+rowId+'\')">';
        html+='<td style="color:#C084FC;font-weight:700">#'+n+'</td>';
        html+='<td style="color:#8B949E">'+rep.fecha+'</td>';
        html+='<td>'+rep.proveedor+'</td>';
        html+='<td style="font-size:11px;color:#8B949E">'+items.length+' producto(s) · <span style="color:#4A9EFF">ver detalle ▾</span></td>';
        html+='<td style="text-align:right;font-weight:700">'+fmt(totalCompra)+'</td>';
        html+='<td style="text-align:right;font-weight:700;color:'+(adeudo>0?"#FB923C":"#8B949E")+'">'+fmt(adeudo)+'</td>';
        html+='<td><div style="display:flex;gap:6px"><button class="btn btn-o btn-s" style="border-color:#4A9EFF;color:#4A9EFF" onclick="event.stopPropagation();cEditGrupo('+n+')">editar</button><button class="btn btn-o btn-s" style="border-color:#F85149;color:#F85149" onclick="event.stopPropagation();cDelGrupo('+n+')">✕</button></div></td>';
        html+='</tr>';

        // Fila expandible con detalle
        html+='<tr id="'+rowId+'" style="display:none"><td colspan="7" style="padding:0">';
        html+='<table style="width:100%;background:#0D1117;border-top:1px solid #30363D"><tbody>';
        items.forEach(function(c){
          var tc=c.tipo_inv==="terminado"?"#00C896":"#4A9EFF";
          html+='<tr>';
          html+='<td style="padding:6px 16px;color:#E6EDF3;font-size:12px">'+c.producto_nombre+'</td>';
          html+='<td style="padding:6px;color:#8B949E;font-size:11px">'+c.descripcion+'</td>';
          html+='<td style="padding:6px;text-align:right;font-size:12px">'+c.cantidad+'</td>';
          html+='<td style="padding:6px;text-align:right;font-size:12px">'+fmt(c.pu)+'</td>';
          html+='<td style="padding:6px;text-align:right;font-size:12px;font-weight:700">'+fmt(c.total)+'</td>';
          html+='<td style="padding:6px">'+bdg(c.tipo_inv==="terminado"?"📦 Venta":"⚗️ Insumo",tc)+'</td>';
          html+='<td></td>'; // editar individual removido - usar editar del grupo
          html+='</tr>';
        });
        html+='</tbody></table></td></tr>';
      });

      html+='</tbody></table></div>';
      el.innerHTML=html;

      window.toggleCGroup=function(id){
        var row=document.getElementById(id);
        if(row)row.style.display=row.style.display==='none'?'table-row':'none';
      };
      window.cEditGrupo=function(n){
        // Crear un objeto compra virtual con todas las líneas del grupo
        var items=grupos[n];
        if(!items||!items.length)return;
        var rep=items[0];
        var ceVirtual={
          id:rep.id,
          num_compra:n,
          proveedor:rep.proveedor,
          fecha:rep.fecha,
          responsable:rep.responsable,
          lineas:items.map(function(c){return{
            nombre:c.producto_nombre||'',
            desc:c.descripcion||'',
            categoria:(CATALOGO_SKU.find(function(s){return s.sku===c.producto_nombre;})||{}).cat||'',
            tipo_inv:c.tipo_inv||'insumo',
            cantidad:c.cantidad||1,
            pu:c.pu||0
          };})
        };
        cForm(ceVirtual);
      };

      window.cDelGrupo=function(n){        if(!confirm("¿Eliminar todas las líneas de la Compra #"+n+"?"))return;
        var ids=grupos[n].map(function(c){return c.id;});
        Promise.all(ids.map(function(id){
          return sDEL("compras","id=eq."+id).then(function(){
            return sDEL("lotes","tipo=eq.compra&ref_id=eq."+id);
          });
        })).then(function(){load();toast("Compra #"+n+" eliminada","err");});
      };
    });
  }
  window.cNueva=function(){cForm(null)};
  window.cEdit=function(id){cForm(compras.find(function(c){return c.id===id}))};
  window.cDel=function(id){
    if(!confirm("¿Eliminar compra? Esto revertirá el inventario."))return;
    sGET("compras","id=eq."+id).then(function(rows){
      var co=rows&&rows[0];
      sDEL("compras","id=eq."+id).then(function(){
        if(co&&co.id){
          sDEL("lotes","tipo=eq.compra&ref_id=eq."+co.id).then(function(){
            load();toast("Eliminado","err");
          });
        } else {
          load();toast("Eliminado","err");
        }

    });

    var histProvs=compras.reduce(function(a,x){if(x.proveedor&&a.indexOf(x.proveedor)<0)a.push(x.proveedor);return a},[]);

    var lineas=esEd&&ce.lineas&&ce.lineas.length?JSON.parse(JSON.stringify(ce.lineas)):[{nombre:"",desc:"",categoria:"",tipo_inv:"insumo",cantidad:1,pu:0}];

    function calcTotal(){return lineas.reduce(function(a,l){return a+(parseFloat(l.cantidad)||0)*(parseFloat(l.pu)||0)},0)}

    function renderLineas(){

      allCats.sort();

        allCats.forEach(function(cat){html+='<option value="'+cat+'"'+(catActual===cat?' selected':'')+'>'+cat+'</option>';});
        html+='</select></td>';
        html+='<td style="padding:4px 6px"><select id="cskusel'+i+'" onchange="cSelSku('+i+',this.value)" style="'+si+';min-width:110px;cursor:pointer"><option value="">— SKU —</option>';
        skusEnCat.forEach(function(s){html+='<option value="'+s.sku+'"'+(l.nombre===s.sku?' selected':'')+'>'+s.sku+'</option>';});
        html+='</select></td>';
        html+='<td style="padding:4px 8px;font-size:11px;color:#8B949E;white-space:nowrap" id="cdesc_lbl'+i+'">'+(skuItem?skuItem.desc:(l.desc||'—'))+'</td>';
        html+='<td style="padding:4px 6px"><input type="number" min="0" value="'+(l.cantidad||1)+'" onchange="cSetLCalc('+i+',this.value)" style="'+si+';width:70px;text-align:right"></td>';
        html+='<td style="padding:4px 6px"><input type="number" min="0" value="'+(l.pu||0)+'" onchange="cSetPU('+i+',this.value)" style="'+si+';width:90px;text-align:right"></td>';
        html+='<td style="padding:4px 8px;text-align:right;color:#00C896;font-weight:700;white-space:nowrap" id="ctot'+i+'">'+fmt((parseFloat(l.cantidad)||0)*(parseFloat(l.pu)||0))+'</td>';
        html+='<td style="padding:4px 4px">'+(lineas.length>1?'<button onclick="cRemL('+i+')" style="background:transparent;border:none;color:#F85149;cursor:pointer;font-size:14px;padding:2px 6px">✕</button>':'')+'</td>';
        html+='</tr>';
      });
      tbody.innerHTML=html;
      var tot=document.getElementById("ctotalval");

    }

    var html='<div class="mod"><div style="display:flex;justify-content:space-between;margin-bottom:20px"><h1 style="font-size:18px;font-weight:700">'+(esEd?"Editar":"Nueva")+' Compra #'+autoNC+'</h1><button class="btn btn-g" onclick="goMod(&apos;compras&apos;)">← Cancelar</button></div>';
    html+='<div class="grid2"><div class="card">';
    html+='<div class="fi"><label>PROVEEDOR</label><input id="cprov" list="cprovlist" value="'+(esEd?ce.proveedor||"":"") +'" placeholder="Nombre del proveedor"><datalist id="cprovlist">'+histProvs.map(function(p){return'<option value="'+p+'">'}).join("")+'</datalist></div>';
    html+=fi("FECHA",'<input id="cfecha" type="date" value="'+(esEd?ce.fecha:hoy())+'">');
    html+=fi("RESPONSABLE",'<input id="cresp" type="text" value="'+(esEd?ce.responsable||"":"")+'">');
    html+='</div><div class="card">';
    html+='<div style="font-size:10px;color:#8B949E;letter-spacing:.12em;margin-bottom:8px">TOTAL</div>';
    html+='<div id="ctotalval" style="font-size:24px;font-weight:700;color:#00C896">'+fmt(esEd?ce.total:0)+'</div>';
    html+='<div style="font-size:11px;color:#8B949E;margin-top:8px">💡 El adeudo se registra en Tesorería → Pago Proveedores</div>';
    html+='</div></div>';
    html+='<div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:12px"><div style="font-size:10px;color:#8B949E;letter-spacing:.12em">PRODUCTOS COMPRADOS</div><button class="btn btn-o btn-s" style="border-color:#00C896;color:#00C896" onclick="cAddL()">+ Línea</button></div>';
    html+='<datalist id="cprodlist"></datalist>';
    html+='<div style="overflow-x:auto"><table><thead><tr><th style="min-width:130px">Categoría</th><th style="min-width:110px">SKU</th><th>Descripción</th><th style="text-align:right;min-width:70px">Cant</th><th style="text-align:right;min-width:90px">P.U. ($)</th><th style="text-align:right;min-width:80px">Total</th><th></th></tr></thead><tbody id="clineabody"></tbody></table></div></div>';
    html+='<div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px"><button class="btn btn-g" onclick="goMod(&apos;compras&apos;)">Cancelar</button><button class="btn btn-p" onclick="cGuardar('+(esEd?ce.id:"null")+')">'+(esEd?"Actualizar →":"Registrar →")+'</button></div></div>';
    el.innerHTML=html;

    sGET("productos","order=sku").then(function(prods2){
      var dl=document.getElementById("cprodlist");
      if(dl){(prods2||[]).forEach(function(p){var o=document.createElement("option");o.value=p.nombre;dl.appendChild(o);});}
    });

    window.cSelCat=function(i,cat){lineas[i].categoria=cat;lineas[i].nombre='';lineas[i].desc='';renderLineas();};
    window.cSelSku=function(i,sku){
      lineas[i].nombre=sku;
      var item=CATALOGO_SKU.find(function(s){return s.sku===sku;})||null;
      lineas[i].desc=item?item.desc:'';
      lineas[i].tipo_inv=item?(item.tipo==='terminado'?'terminado':'insumo'):'insumo';
      if(item&&item.cat){lineas[i].categoria=item.cat;renderLineas();return;}
      var lbl=document.getElementById("cdesc_lbl"+i);
      if(lbl)lbl.textContent=item?item.desc:'—';
    };
    window.cSetLCalc=function(i,v){lineas[i].cantidad=v;var t=document.getElementById("ctot"+i);if(t)t.textContent=fmt((parseFloat(v)||0)*(parseFloat(lineas[i].pu)||0));var tot=document.getElementById("ctotalval");if(tot)tot.textContent=fmt(calcTotal());};
    window.cSetPU=function(i,v){lineas[i].pu=v;var t=document.getElementById("ctot"+i);if(t)t.textContent=fmt((parseFloat(lineas[i].cantidad)||0)*(parseFloat(v)||0));var tot=document.getElementById("ctotalval");if(tot)tot.textContent=fmt(calcTotal());};
    window.cSetL=function(i,k,v){lineas[i][k]=v;renderLineas()};
    window.cAddL=function(){lineas.push({nombre:"",sku:"",desc:"",categoria:"",tipo_inv:"insumo",cantidad:1,pu:0});renderLineas()};
    window.cRemL=function(i){lineas.splice(i,1);renderLineas()};

    var _cGuardando=false;
    window.cGuardar=function(cid){
      if(_cGuardando)return;
      _cGuardando=true;
      var prov=($("cprov")||{}).value||"";
      if(!prov.trim()){alert("Ingresa el proveedor");_cGuardando=false;return}
      var validLines=lineas.filter(function(l){return (l.nombre||l.sku||'').trim()&&parseFloat(l.cantidad)>0;});
      if(!validLines.length){alert("Agrega al menos un producto");_cGuardando=false;return}
      var total=calcTotal();

      // Siempre consultar el max actual desde DB para evitar saltos
      var ncProm=cid?Promise.resolve(autoNC):sGET("compras","order=num_compra.desc&limit=1").then(function(rows){
        return rows&&rows[0]?rows[0].num_compra+1:1;
      });

      ncProm.then(function(ncFinal){
      var body={
        num_compra:ncFinal,
        fecha:($("cfecha")||{}).value||hoy(),
        proveedor:prov,
        proveedor_id:0,
        producto_nombre:validLines.map(function(l){return l.nombre||l.sku||""}).join(", "),
        descripcion:validLines.length+" producto(s)",
        tipo_inv:validLines[0].tipo_inv||"insumo",
        cantidad:validLines.reduce(function(a,l){return a+parseFloat(l.cantidad||0)},0),
        pu:validLines.length===1?parseFloat(validLines[0].pu||0):total,
        total:total,
        responsable:($("cresp")||{}).value||""
      };
      var save=cid?sPATCH("compras","id=eq."+cid,body):sPOST("compras",body);
      save.then(function(saveRes){
        if(!cid){
          // Crear lotes ENTRADA por cada línea
          var compraId=Array.isArray(saveRes)&&saveRes[0]?saveRes[0].id:null;
          var fecha=body.fecha||hoy();
          // Validar que todos los SKUs existan en el catálogo
          var skusInvalidos=validLines.filter(function(l){
            var sku=(l.nombre||l.sku||"").trim();
            return sku&&!CATALOGO_SKU.find(function(s){return s.sku===sku||s.desc===sku;});
          });
          if(skusInvalidos.length){
            var nombres=skusInvalidos.map(function(l){return l.nombre||l.sku}).join(", ");
            alert("SKU(s) no encontrado(s) en el catálogo:\n"+nombres+"\n\nVerifica que el código sea correcto.");
            _cGuardando=false;return;
          }
          var lotesPromises=validLines.map(function(l){
            var sku=l.nombre||l.sku||"";
            var cant=parseFloat(l.cantidad)||0;
            var pu=parseFloat(l.pu)||0;
            if(!sku||!cant)return Promise.resolve();
            var ci=CATALOGO_SKU.find(function(s){return s.sku===sku||s.desc===sku;});
            return sPostLote({
              sku:sku,
              tipo:"compra",
              movimiento:"entrada",
              ref_id:compraId||0,
              fecha:fecha,
              cantidad:cant,
              costo_unit:pu,
              concepto:"Compra #"+ncFinal+" — "+(l.descripcion||sku),num_ref:"C-"+ncFinal
            });
          });
          Promise.all(lotesPromises).then(function(){
            _cGuardando=false;
            load();goMod("compras");toast("Compra #"+ncFinal+" registrada — "+validLines.length+" producto(s)");
          });
        } else {
          // Al editar grupo: borrar TODAS las filas del grupo y recrear
          var numCompra=body.num_compra;
          sGET("compras","num_compra=eq."+numCompra).then(function(allRows){
            var allIds=(allRows||[]).map(function(r){return r.id;});
            // Borrar lotes por num_ref C-XX (más confiable que ref_id)
            var delLotes=sDEL("lotes","tipo=eq.compra&num_ref=eq.C-"+numCompra);
            var delRows=Promise.all(allIds.map(function(rid){return sDEL("compras","id=eq."+rid);}));
            Promise.all([delLotes,delRows]).then(function(){
              var fecha=body.fecha||hoy();
              var insertProms=validLines.map(function(l){
                var sku=l.nombre||l.sku||"";
                var cant=parseFloat(l.cantidad)||0;
                var pu=parseFloat(l.pu)||0;
                var tot=cant*pu;
                return sPOST("compras",{
                  num_compra:numCompra,fecha:fecha,
                  proveedor:body.proveedor,proveedor_id:0,
                  producto_nombre:sku,descripcion:l.desc||sku,
                  tipo_inv:l.tipo_inv||"insumo",cantidad:cant,pu:pu,total:tot,
                  responsable:body.responsable
                }).then(function(res){
                  var newId=Array.isArray(res)&&res[0]?res[0].id:null;
                  if(!sku||!cant||!newId)return Promise.resolve();
                  return sPostLote({sku:sku,tipo:"compra",movimiento:"entrada",ref_id:newId,fecha:fecha,cantidad:cant,costo_unit:pu,concepto:"Compra #"+numCompra+" — "+(l.desc||sku),num_ref:"C-"+numCompra});
                });
              });
              Promise.all(insertProms).then(function(){
                _cGuardando=false;
                load();goMod("compras");toast("Compra #"+numCompra+" actualizada");
              });
            });
          });
        }
      }); // end save.then
      }); // end ncProm.then
    };
    renderLineas();
  }
  load();
}

/* ── PRODUCCIÓN ──────────────────────────────────────────────────────── */
function rProduccion(el){
  var prod=[],inv=[],invStock={};

  // Gramos por pieza según SKU
  function grPorSKU(sku){
    var m=sku.match(/^(\d+(?:\.\d+)?)/);
    if(m)return parseFloat(m[1]);
    if(sku.indexOf("MOZ")>=0)return 14;
    if(sku.indexOf("OZ")>=0)return 28;
    return 1;
  }

  var FLOR_INSUMO_SKUS=["R1","RP1","P1","P2","P3","P4","P5","EX1","EX2","G1","G2","I1","I2"];
  var HGP_PREFIXES=["HONGO","GUARUMO","PRERROL"];
  var FLOR_TERM_CATS=["Flor Regular","Flor Regular Plus","Flor Premium","Flor Exotica","Flor Green House","Flor Indoor"];
  var OTRO_CATS=["Extractos","Extractos Granel","Gallos","Medicina"];

  function isHGP(sku){return HGP_PREFIXES.some(function(p){return sku.indexOf(p)===0;});}

  function load(){
    sGET("produccion","order=num_lote.desc").then(function(d){prod=Array.isArray(d)?d:[];renderList();});
    syncCatalogo(function(){
      Promise.all([sGET("compras","order=id"),sGET("produccion","order=id")]).then(function(res){
        var cps=Array.isArray(res[0])?res[0]:[];
        var prds=Array.isArray(res[1])?res[1]:[];
        invStock={};
        CATALOGO_SKU.filter(function(s){return s.tipo==="insumo"||s.tipo==="mixto";}).forEach(function(s){
          if(!invStock[s.sku])invStock[s.sku]={cantidad:0,cu:0,desc:s.desc,cat:s.cat};
        });
        cps.forEach(function(co){
          if(co.tipo_inv==="servicio")return;
          var lines=co.lineas&&co.lineas.length?co.lineas:[{nombre:co.producto_nombre,tipo_inv:co.tipo_inv,cantidad:parseFloat(co.cantidad)||0,pu:parseFloat(co.pu)||0}];
          lines.forEach(function(l){
            if(!l.nombre)return;
            var ci=CATALOGO_SKU.find(function(s){return s.sku===l.nombre||s.desc===l.nombre;});
            var tipo=ci?ci.tipo:(l.tipo_inv||"insumo");
            if(tipo!=="insumo"&&tipo!=="mixto")return;
            var sku=ci?ci.sku:l.nombre;
            if(!invStock[sku])invStock[sku]={cantidad:0,cu:0,desc:ci?ci.desc:l.nombre,cat:ci?ci.cat:""};
            invStock[sku].cantidad+=parseFloat(l.cantidad)||0;
            if(parseFloat(l.pu)>0)invStock[sku].cu=parseFloat(l.pu);
          });
        });
        prds.forEach(function(p){
          (Array.isArray(p.insumos)?p.insumos:[]).forEach(function(ins){
            var sku=ins.sku||ins.nombre;if(!sku)return;
            if(!invStock[sku])invStock[sku]={cantidad:0,cu:0,desc:ins.nombre||sku,cat:""};
            invStock[sku].cantidad-=parseFloat(ins.cant||ins.cantidad||0);
          });
        });
        inv=Object.keys(invStock).map(function(s){return Object.assign({sku:s},invStock[s]);}).filter(function(x){return x.cantidad>0;});
      });
    });
  }

  function renderList(){
    var html='<div class="mod">';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">';
    html+='<h1 style="font-size:18px;font-weight:700">Producción</h1>';
    html+='<button class="btn btn-p" onclick="pNuevo()">+ Nuevo Lote</button></div>';
    if(!prod.length){html+='<div class="empty">Sin lotes registrados.</div></div>';el.innerHTML=html;return;}

    // Agrupar por num_lote
    var grupos={};
    prod.forEach(function(p){
      var n=p.num_lote;
      if(!grupos[n])grupos[n]=[];
      grupos[n].push(p);
    });
    var numsSorted=Object.keys(grupos).map(Number).sort(function(a,b){return b-a;});

    html+='<table><thead><tr><th>Lote #</th><th>Fecha</th><th>Modo</th><th>Productos</th><th style="text-align:right">Total Cant</th><th style="text-align:right">Costo Total</th><th></th></tr></thead><tbody>';

    numsSorted.forEach(function(n){
      var items=grupos[n];
      var rep=items[0];
      var mc={kilos:"#00C896",otro:"#4A9EFF"}[rep.modo_prod]||"#8B949E";
      var ml={kilos:"Kilos",otro:"Otro"}[rep.modo_prod]||"Lote";
      var totalCant=items.reduce(function(a,p){return a+parseFloat(p.piezas||0);},0);
      var totalCosto=items.reduce(function(a,p){return a+parseFloat(p.costo_total||0);},0);
      var rowId='pg_'+n;

      html+='<tr>';
      html+='<td style="color:#E3B341;font-weight:700">'+n+'</td>';
      html+='<td style="color:#8B949E">'+rep.fecha+'</td>';
      html+='<td>'+bdg(ml,mc)+'</td>';
      html+='<td style="font-size:11px;color:#8B949E">'+items.length+' producto(s) · <span style="color:#4A9EFF;cursor:pointer" onclick="togglePRow(\''+rowId+'\','+n+')">ver detalle ▾</span></td>';
      html+='<td style="text-align:right">'+totalCant+'</td>';
      html+='<td style="text-align:right;color:#FB923C">'+fmt(totalCosto)+'</td>';
      html+='<td><div style="display:flex;gap:6px">'+
        '<button class="btn btn-o btn-s" style="border-color:#4A9EFF;color:#4A9EFF" onclick="pEditGrupo('+n+')">editar</button>'+
        '<button class="btn btn-o btn-s" style="border-color:#F85149;color:#F85149" onclick="pDelGrupo('+n+')">✕</button>'+
        '</div></td>';
      html+='</tr>';
      // Fila expandible dinámica
      html+='<tr id="'+rowId+'" style="display:none"><td colspan="7" style="padding:0">';
      html+='<div id="'+rowId+'_content" style="background:#0D1117;border-top:1px solid #21262D;padding:8px 16px">';
      html+='<div style="font-size:11px;color:#8B949E">Cargando...</div>';
      html+='</div></td></tr>';
    });

    html+='</tbody></table></div>';
    el.innerHTML=html;

    window.togglePRow=function(rowId,n){
      var row=document.getElementById(rowId);
      if(!row)return;
      if(row.style.display!=='none'){row.style.display='none';return;}
      row.style.display='table-row';
      sGET("lotes","tipo=eq.produccion&ref_id=eq."+n+"&order=movimiento.desc").then(function(lotes){
        var content=document.getElementById(rowId+'_content');
        if(!content)return;
        var entradas=(lotes||[]).filter(function(l){return l.movimiento==='entrada';});
        var salidas=(lotes||[]).filter(function(l){return l.movimiento==='salida';});
        var h='<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">';
        h+='<div><div style="font-size:10px;color:#00C896;font-weight:700;margin-bottom:6px">📦 PRODUCIDOS</div><table style="width:100%"><tbody>';
        entradas.forEach(function(l){
          h+='<tr><td style="font-size:11px;color:#C084FC;font-weight:700;padding:3px 0">'+l.sku+'</td>';
          h+='<td style="font-size:11px;text-align:right;padding:3px 0">'+l.cantidad+'</td>';
          h+='<td style="font-size:11px;text-align:right;color:#8B949E;padding:3px 0">'+fmt(l.costo_unit)+'/u</td>';
          h+='<td style="font-size:11px;text-align:right;font-weight:700;color:#00C896;padding:3px 0">'+fmt(l.cantidad*l.costo_unit)+'</td></tr>';
        });
        h+='</tbody></table></div>';
        h+='<div><div style="font-size:10px;color:#FB923C;font-weight:700;margin-bottom:6px">⚗️ INSUMOS USADOS</div>';
        if(!salidas.length){h+='<div style="font-size:11px;color:#8B949E">Sin insumos</div>';}
        else{
          h+='<table style="width:100%"><tbody>';
          salidas.forEach(function(l){
            h+='<tr><td style="font-size:11px;color:#C084FC;font-weight:700;padding:3px 0">'+l.sku+'</td>';
            h+='<td style="font-size:11px;text-align:right;padding:3px 0">'+l.cantidad+'</td>';
            h+='<td style="font-size:11px;text-align:right;color:#8B949E;padding:3px 0">'+fmt(l.costo_unit)+'/u</td>';
            h+='<td style="font-size:11px;text-align:right;font-weight:700;color:#FB923C;padding:3px 0">-'+fmt(l.cantidad*l.costo_unit)+'</td></tr>';
          });
          h+='</tbody></table>';
        }
        h+='</div></div>';
        content.innerHTML=h;
      });
    };
    window.pEditGrupo=function(n){
      var items=grupos[n];
      if(!items||!items.length)return;
      var rep=items[0];
      // Cargar lotes del grupo para obtener insumos
      sGET("lotes","tipo=eq.produccion&ref_id=eq."+n+"&order=movimiento.desc").then(function(lotes){
        var entradas=(lotes||[]).filter(function(l){return l.movimiento==='entrada';});
        var salidas=(lotes||[]).filter(function(l){return l.movimiento==='salida';});
        // Construir objeto para pForm
        var ceVirtual={
          num_lote:n,
          fecha:rep.fecha,
          responsable:rep.responsable,
          modo_prod:rep.modo_prod,
          // Para modo kilos: florSKU es la primera salida no envase
          florSKU:salidas.filter(function(l){return !l.sku.match(/^(BP|BV|POMADE)/i);})[0]||null,
          // Líneas terminadas
          lineas:entradas.map(function(l){
            // Buscar envase correspondiente en salidas
            var envase=salidas.find(function(s){return s.cantidad===l.cantidad&&s.sku.match(/^(BP|BV)/i);})||null;
            return {sku:l.sku,cantidad:l.cantidad,envase:envase?envase.sku:''};
          }),
          // Para modo otro: insumos
          otroSKU:rep.modo_prod==='otro'?entradas[0]&&entradas[0].sku:'',
          otroCant:rep.modo_prod==='otro'?entradas[0]&&entradas[0].cantidad:0,
          otroInsumos:rep.modo_prod==='otro'?salidas.map(function(l){return{sku:l.sku,cantidad:l.cantidad};}):[]
        };
        pForm(ceVirtual);
      });
    };
    window.pDelGrupo=function(n){
      if(!confirm("¿Eliminar Lote #"+n+" completo?"))return;
      var items=grupos[n]||[];
      var proms=items.map(function(p){
        return sDEL("produccion","id=eq."+p.id).then(function(){
          return sDEL("lotes","tipo=eq.produccion&ref_id=eq."+p.num_lote);
        });
      });
      Promise.all(proms).then(function(){load();toast("Lote #"+n+" eliminado","err");});
    };
  }

  window.pNuevo=function(){pForm();};
  window.pDel=function(id){
    if(!confirm("¿Eliminar lote? Esto revertirá el inventario."))return;
    sGET("produccion","id=eq."+id).then(function(rows){
      var p=rows&&rows[0];
      sDEL("produccion","id=eq."+id).then(function(){
        if(p&&p.num_lote){
          sDEL("lotes","tipo=eq.produccion&ref_id=eq."+p.num_lote).then(function(){
            load();toast("Eliminado","err");
          });
        } else {
          load();toast("Eliminado","err");
        }
      });
    });
  };

  function pForm(ce){
    var esEd=!!ce;
    var autoL=esEd?ce.num_lote:(prod.length?Math.max.apply(null,prod.map(function(x){return x.num_lote||0}))+1:1);
    var modo=esEd?ce.modo_prod:"";
    var florSKU=esEd&&ce.florSKU?ce.florSKU.sku:"";
    var lineas=esEd&&ce.lineas&&ce.lineas.length?ce.lineas:[{sku:"",cantidad:0}];
    var otroSKU=esEd?ce.otroSKU||"":"",otroCant=esEd?ce.otroCant||1:1;
    var otroInsumos=esEd&&ce.otroInsumos?ce.otroInsumos:[];

    function calcGrTotal(){
      return lineas.reduce(function(a,l){
        if(!l.sku||!l.cantidad)return a;
        var gr=isHGP(l.sku)?1:grPorSKU(l.sku);
        return a+(parseFloat(l.cantidad)||0)*gr;
      },0);
    }

    function render(){
      var si="background:#0D1117;border:1px solid #30363D;border-radius:2px;padding:7px 10px;font-size:12px;color:#E6EDF3;width:100%";
      var html='<div class="mod"><div style="display:flex;justify-content:space-between;margin-bottom:20px">';
      html+='<h1 style="font-size:18px;font-weight:700">'+(esEd?'Editar':'Nuevo')+' Lote #'+autoL+'</h1>';
      html+='<button class="btn btn-g" onclick="goMod(&apos;produccion&apos;)">← Cancelar</button></div>';
      html+='<div class="card" style="max-width:760px">';
      html+=fi("FECHA",'<input id="pfecha" type="date" value="'+(esEd?ce.fecha:hoy())+'">');
      html+=fi("RESPONSABLE",'<input id="presp" type="text" value="'+(esEd?ce.responsable||'':'')+'" placeholder="Nombre del responsable">');

      // Toggle
      html+='<div class="fi"><label>¿INGRESAR EN KILOS?</label><div style="display:flex;gap:8px">';
      html+='<button onclick="pSetModo(&apos;kilos&apos;)" style="flex:1;padding:12px;border-radius:2px;font-family:monospace;font-size:12px;cursor:pointer;background:'+(modo==="kilos"?"rgba(0,200,150,.2)":"#21262D")+';border:2px solid '+(modo==="kilos"?"#00C896":"#30363D")+';color:'+(modo==="kilos"?"#00C896":"#8B949E")+'">✅ SÍ<br><small style="font-weight:400">Flor, Hongo, Guarumo, Prerrol</small></button>';
      html+='<button onclick="pSetModo(&apos;otro&apos;)" style="flex:1;padding:12px;border-radius:2px;font-family:monospace;font-size:12px;cursor:pointer;background:'+(modo==="otro"?"rgba(74,158,255,.2)":"#21262D")+';border:2px solid '+(modo==="otro"?"#4A9EFF":"#30363D")+';color:'+(modo==="otro"?"#4A9EFF":"#8B949E")+'">📦 OTRO<br><small style="font-weight:400">Extractos, Gallos, Medicina</small></button>';
      html+='</div></div>';

      if(modo==="kilos"){
        // Flor selector
        var florItems=inv.filter(function(x){return FLOR_INSUMO_SKUS.indexOf(x.sku)>=0;});
        html+='<div class="fi"><label>FLOR UTILIZADA</label>';
        html+='<select id="pflor" onchange="pSetFlor(this.value)" style="'+si+';cursor:pointer"><option value="">— Seleccionar Flor —</option>';
        florItems.forEach(function(x){html+='<option value="'+x.sku+'"'+(florSKU===x.sku?" selected":"")+'>'+x.sku+' — '+x.desc+' ('+Math.round(x.cantidad)+'g disp)</option>';});
        html+='</select></div>';

        if(florSKU){
          var stock=invStock[florSKU]?Math.round(invStock[florSKU].cantidad):0;
          var grU=calcGrTotal();
          var grR=stock-grU;
          var grc=grR<0?"#F85149":grR<100?"#E3B341":"#00C896";

          html+='<div style="background:#21262D;border-radius:2px;padding:10px 16px;margin-bottom:14px;display:flex;gap:24px;flex-wrap:wrap">';
          html+='<span style="font-size:11px;color:#8B949E">Stock flor: <b style="color:#E6EDF3">'+stock+'g</b></span>';
          html+='<span style="font-size:11px;color:#8B949E">Gramos usados: <b style="color:#FB923C" id="pgu">'+grU.toFixed(1)+'g</b></span>';
          html+='<span style="font-size:11px;color:#8B949E">Restante: <b id="pgr" style="color:'+grc+'">'+grR.toFixed(1)+'g</b></span>';
          html+='<span style="font-size:11px;color:#8B949E" id="pcosto"></span>';
          html+='</div>';

          // Lineas tabla
          html+='<div style="font-size:10px;color:#8B949E;letter-spacing:.1em;margin-bottom:8px;font-weight:700">SALIDAS (PRESENTACIONES / GRAMOS)</div>';
          html+='<div style="overflow-x:auto"><table style="width:100%"><thead><tr>';
          html+='<th>SKU</th><th style="text-align:right">Piezas/Gr</th><th style="text-align:right">Gr/u</th><th style="text-align:right">Gr total</th><th>Envase</th><th style="text-align:right">$ Flor</th><th style="text-align:right">$ Envase</th><th style="text-align:right">$/u</th>';
          html+='</tr></thead><tbody id="plin_body"></tbody></table></div>';


          // Build ALL presentations automatically from flor suffix
          // florSKU = e.g. "P1", "EX1", "G2", "I1", "R1"
          // Presentations: fixed sizes, auto-generate SKU = prefix+florSKU
          var PRES_GRANEL=[
            {gr:1,prefix:"1"},
            {gr:1.5,prefix:"1.5"},
            {gr:3.5,prefix:"3.5"},
            {gr:7,prefix:"7"},
            {gr:14,prefix:"14"},
            {gr:28,prefix:"28"},
            {gr:50,prefix:"50"},
            {gr:100,prefix:"100"}
          ];
          // Build presentation SKUs by combining prefix+florSKU
          var skuFlor=PRES_GRANEL.map(function(p){
            var sku=p.prefix+florSKU;
            var ci=CATALOGO_SKU.find(function(s){return s.sku===sku;});
            return{sku:sku,gr:p.gr,desc:ci?ci.desc:(p.gr+"g de "+florSKU),exists:!!ci};
          });
          // HGP matching this flor suffix
          var skuHGP=CATALOGO_SKU.filter(function(s){
            return s.tipo==="insumo"&&isHGP(s.sku)&&s.sku.slice(-florSKU.length)===florSKU;
          });

          // Envase SKUs
          var envaseSKUs=CATALOGO_SKU.filter(function(s){
            return s.tipo==="insumo"&&(s.cat==="Envases Flor"||s.cat==="Envases Wax");
          });

          setTimeout(function(){
            var tb=document.getElementById("plin_body");if(!tb)return;
            var si="background:#0D1117;border:1px solid #30363D;border-radius:2px;padding:4px 7px;font-size:11px;color:#E6EDF3";
            var pbody="";
            var cuFlor2=invStock[florSKU]?invStock[florSKU].cu:0;
            var envasesConStock=envaseSKUs.filter(function(e){return invStock[e.sku]&&invStock[e.sku].cantidad>0;});
            lineas.forEach(function(l,i){
              var isHGPLine=l.sku&&isHGP(l.sku);
              var presItem=skuFlor.find(function(s){return s.sku===l.sku;});
              var gr=isHGPLine?1:(presItem?presItem.gr:grPorSKU(l.sku||"1"));
              var cant=parseFloat(l.cantidad)||0;
              var grTot=cant*gr;
              var costoFlorLinea=grTot*cuFlor2;
              var envCU=l.envase&&invStock[l.envase]?invStock[l.envase].cu:0;
              var costoEnvLinea=cant*envCU;
              var costoTotalLinea=costoFlorLinea+costoEnvLinea;
              var cuUnit=cant>0?costoTotalLinea/cant:0;
              pbody+='<tr style="vertical-align:middle">';
              // SKU fijo
              pbody+='<td style="padding:6px 8px;font-weight:700;color:#E3B341;font-size:12px;white-space:nowrap">'+l.sku+'</td>';
              // Cantidad
              pbody+='<td style="padding:4px 5px"><input type="number" min="0" value="'+(l.cantidad||"")+'" placeholder="0" onchange="pSetLinCant('+i+',this.value)" style="'+si+';width:70px;text-align:right"></td>';
              // Gr/u + Gr total
              pbody+='<td style="padding:4px 6px;text-align:right;font-size:11px;color:#8B949E;white-space:nowrap">'+(l.sku?gr+'g':'—')+'</td>';
              pbody+='<td style="padding:4px 6px;text-align:right;color:#FB923C;font-weight:700;white-space:nowrap" id="plgrt'+i+'">'+grTot.toFixed(1)+'g</td>';
              // Envase select
              pbody+='<td style="padding:4px 4px"><select onchange="pSetLinEnvase('+i+',this.value)" style="'+si+';min-width:85px;cursor:pointer"><option value="">Sin env.</option>';
              envasesConStock.forEach(function(e){var disp=Math.round(invStock[e.sku].cantidad);pbody+='<option value="'+e.sku+'"'+(l.envase===e.sku?" selected":"")+'>'+e.sku+' ('+disp+')</option>';});
              pbody+='</select></td>';
              // Costo flor linea
              pbody+='<td style="padding:4px 5px;text-align:right;font-size:11px;color:#E3B341;white-space:nowrap" id="pfl_c'+i+'">'+(cant>0?fmt(costoFlorLinea):'—')+'</td>';
              // Costo envase linea
              pbody+='<td style="padding:4px 5px;text-align:right;font-size:11px;color:#C084FC;white-space:nowrap" id="penv_c'+i+'">'+(l.envase&&cant>0?fmt(costoEnvLinea):'—')+'</td>';
              // Costo unitario
              pbody+='<td style="padding:4px 5px;text-align:right;font-weight:700;color:#00C896;white-space:nowrap" id="pcu_c'+i+'">'+(cant>0?fmt(cuUnit):'—')+'</td>';
              pbody+='</tr>';
            });
            tb.innerHTML=pbody;
          },30);
        }

      } else if(modo==="otro"){
        // Extractos, Gallos, Medicina
        var otroSKUs=CATALOGO_SKU.filter(function(s){
          if(OTRO_CATS.indexOf(s.cat)<0)return false;
          if(s.cat==="Medicina")return s.tipo==="mixto"||s.tipo==="insumo";
          return s.tipo==="terminado"||s.tipo==="mixto";
        });
        var otroCatsDisp=[];
        otroSKUs.forEach(function(s){if(s.cat&&otroCatsDisp.indexOf(s.cat)<0)otroCatsDisp.push(s.cat);});
        otroCatsDisp.sort();
        html+='<div class="fi"><label>SKU A PRODUCIR</label>';
        html+='<select id="potro" onchange="pSetOtro(this.value)" style="'+si+';cursor:pointer"><option value="">— Seleccionar —</option>';
        otroCatsDisp.forEach(function(cat){
          html+='<optgroup label="'+cat+'">';
